        function renderSkillTree() {
            const coins = gameState.coins || 0;

            // Pip row for a minor node: filled dots up to current level, empty after
            function pipRow(current, max) {
                let s = '';
                for (let i = 0; i < max; i++) {
                    s += i < current
                        ? '<span style="color:#f1c40f; font-size:13px;">●</span>'
                        : '<span style="color:#444; font-size:13px;">●</span>';
                }
                return '<span style="letter-spacing:2px;">' + s + '</span>';
            }

            // Requirement chips for a major node
            function reqChips(requires) {
                return Object.entries(requires).map(([id, needed]) => {
                    const have = getSkillLevel(id);
                    const met  = have >= needed;
                    const def  = findMinorDef(id);
                    const label = (def ? def.name : id) + ' ' + needed + '/' + needed;
                    const col   = met ? '#7bed9f' : '#e74c3c';
                    return '<span style="font-size:10px; padding:2px 6px; border-radius:4px; background:#1a2a3a; color:' + col + '; margin-right:4px;">'
                        + (met ? '✓ ' : '') + (def ? def.name : id) + ' Lv' + needed
                        + '</span>';
                }).join('');
            }

            // Build each tree section
            let treesHtml = '';
            SKILL_TREE_DEFS.forEach(tree => {
                let minorCards = '';
                tree.minors.forEach(mn => {
                    const lvl  = getSkillLevel(mn.id);
                    const maxed = lvl >= mn.maxLevel;
                    const cost  = maxed ? null : mn.costs[lvl];
                    const canAfford = !maxed && coins >= cost;
                    const pips  = pipRow(lvl, mn.maxLevel);

                    const costLabel = maxed
                        ? '<span style="color:#7bed9f; font-size:11px; font-weight:bold;">MAX</span>'
                        : '<span style="font-size:11px; color:#f1c40f;">Next: 🪙' + cost + '</span>';

                    const btn = maxed
                        ? ''
                        : '<button onclick="buyMinorNode(\'' + mn.id + '\')" '
                          + (canAfford ? '' : 'disabled ')
                          + 'style="margin:0; padding:4px 10px; font-size:11px; background:'
                          + (canAfford ? '#f1c40f' : '#333') + '; color:'
                          + (canAfford ? '#1a1a2e' : '#555') + '; font-weight:bold; flex-shrink:0;">Upgrade</button>';

                    minorCards += '<div style="background:#16253a; border-radius:7px; padding:9px 11px; margin-bottom:7px;">'
                        + '<div style="display:flex; justify-content:space-between; align-items:center; gap:6px;">'
                        + '<div style="min-width:0;">'
                        + '<div style="font-size:13px; font-weight:bold;">' + mn.icon + ' ' + mn.name + '</div>'
                        + '<div style="font-size:11px; color:#aaa; margin:2px 0;">' + mn.desc + '</div>'
                        + '<div>' + pips + ' <span style="font-size:11px; color:#888;">Lv ' + lvl + '/' + mn.maxLevel + '</span></div>'
                        + '</div>'
                        + '<div style="text-align:right;">' + costLabel + '<br>' + btn + '</div>'
                        + '</div></div>';
                });

                let majorCards = '';
                tree.majors.forEach(mj => {
                    const owned   = hasTalent(mj.id);
                    const reqsMet = majorReqsMet(mj);
                    const canAfford = !owned && reqsMet && coins >= mj.cost;
                    const locked  = !owned && !reqsMet;

                    const bg     = owned   ? '#1c3a2a' : locked ? '#111a24' : '#182030';
                    const border = owned   ? 'border:1px solid #7bed9f55;'
                                 : locked  ? 'border:1px solid #333;'
                                 : canAfford ? 'border:1px solid #f1c40f55;'
                                 : 'border:1px solid #2a3a4a;';
                    const opacity = locked ? 'opacity:0.6;' : '';

                    const statusEl = owned
                        ? '<span style="font-size:12px; color:#7bed9f; font-weight:bold;">✓ Owned</span>'
                        : locked
                        ? '<span style="font-size:11px; color:#e74c3c;">🔒 Locked</span>'
                        : '<button onclick="buyMajorNode(\'' + mj.id + '\')" '
                          + (canAfford ? '' : 'disabled ')
                          + 'style="margin:0; padding:5px 12px; font-size:12px; background:'
                          + (canAfford ? '#f1c40f' : '#333') + '; color:'
                          + (canAfford ? '#1a1a2e' : '#555') + '; font-weight:bold;">Buy 🪙' + mj.cost + '</button>';

                    const reqRow = !owned
                        ? '<div style="margin-top:5px;">' + reqChips(mj.requires) + '</div>'
                        : '';

                    majorCards += '<div style="' + bg + '; ' + border + '; ' + opacity + ' border-radius:7px; padding:9px 11px; margin-bottom:7px; margin-left:14px;">'
                        + '<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:6px;">'
                        + '<div style="min-width:0;">'
                        + '<div style="font-size:12px; color:#aaa; margin-bottom:2px;">★ Major Node</div>'
                        + '<div style="font-size:13px; font-weight:bold;">' + mj.icon + ' ' + mj.name + '</div>'
                        + '<div style="font-size:11px; color:#aaa; margin-top:2px;">' + mj.desc + '</div>'
                        + reqRow
                        + '</div>'
                        + '<div style="flex-shrink:0; text-align:right;">' + statusEl + '</div>'
                        + '</div></div>';
                });

                treesHtml += '<div style="border-left:4px solid ' + tree.color + '; padding-left:10px; margin-bottom:18px;">'
                    + '<div style="font-size:15px; font-weight:bold; margin-bottom:10px; color:' + tree.color + ';">'
                    + tree.icon + ' ' + tree.name
                    + '</div>'
                    + minorCards
                    + majorCards
                    + '</div>';
            });

            const tabCoins = 'flex:1; padding:8px 12px; margin:0; background:#f1c40f; color:#1a1a2e; font-weight:bold; border-radius:6px;';
            const tabGems  = 'flex:1; padding:8px 12px; margin:0; background:#2a3a4a; color:#aaa;';

            const html = '<div class="ui-overlay"><div class="ui-panel">'
                + '<h1>Shop</h1>'
                + '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">'
                + '<button id="shopBackBtn" onclick="gameState.currentScreen=\'mainMenu\'; render();" style="padding:8px 16px; margin:0;">Back</button>'
                + '<span style="font-size:15px;">🪙 <strong style="color:#f1c40f;">' + coins + '</strong> coins</span>'
                + '</div>'
                + '<div style="display:flex; gap:8px; margin-bottom:14px;">'
                + '<button onclick="gameState.shopTab=\'coins\'; render();" style="' + tabCoins + '">🪙 Skill Tree</button>'
                + '<button onclick="gameState.shopTab=\'gems\'; render();" style="' + tabGems + '">💎 Gems</button>'
                + '</div>'
                + '<p style="font-size:11px; color:#888; margin:0 0 14px; line-height:1.4;">'
                + 'Upgrade minor nodes up to 5× for incremental gains. Unlock major nodes by meeting their minor node requirements.'
                + '</p>'
                + treesHtml
                + '</div></div>';

            mountOverlay(html);
        }

            let html = `
                <div class="ui-overlay">
                    <div class="ui-panel">
                        <h1>Shop</h1>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">

                            <button onclick="gameState.shopTab='gems'; render();" style="flex:1; padding:8px 12px; margin:0; background:#4ecdc4; color:#1a1a2e; font-weight:bold; border-radius:6px;">💎 Gems</button>

                        <p style="font-size:12px; color:#999; margin:0 0 14px;">Spend gems on special items and bonuses.</p>

            if (GEM_SHOP_ITEMS.length === 0) {
                html += `
                        <div style="text-align:center; padding:40px 20px; color:#666;">
                            <p style="font-size:14px;">Coming soon! Check back later for gem shop items.</p>
                        </div>
                `;
            } else {
                html += `<div style="display:grid; gap:10px;">`;
                GEM_SHOP_ITEMS.forEach(item => {
                    // Determine live status for each item type
                    let statusBadge = '';
                    let blocked = false;

                    if (item.id === 'energy_refill') {
                        const { current } = getEnergy();
                        if (current >= ENERGY_MAX) {
                            statusBadge = '<span style="font-size:11px; color:#7bed9f;">⚡ Already Full</span>';
                            blocked = true;
                        }
                    } else if (item.id === 'lucky_charm') {
                        if (gameState.nextCatchGuaranteed) {
                            statusBadge = '<span style="font-size:11px; color:#7bed9f;">🍀 Active</span>';
                            blocked = true;
                        }
                    } else if (item.id === 'xp_surge') {
                        if ((gameState.xpSurge || 0) > 0) {
                            statusBadge = '<span style="font-size:11px; color:#4ecdc4;">⭐ ' + gameState.xpSurge + ' battles left</span>';
                        }
                    } else if (item.id === 'coin_surge') {
                        if ((gameState.coinSurge || 0) > 0) {
                            statusBadge = '<span style="font-size:11px; color:#4ecdc4;">🪙 ' + gameState.coinSurge + ' battles left</span>';

                    } else if (item.id === 'evo_fasttrack') {

            } else if (r.isBoss) {
                headerHtml = `<h1>Boss Defeated!</h1>
                    <p style="text-align:center; color:#aaa; font-size:13px; margin-bottom:12px;">${r.creatureName} — rematch.</p>`;
            } else {
                headerHtml = `<h1 style="color:#4ecdc4;">Victory!</h1>`;
            }

            // ── Battle stats ───────────────────────────────────────────────────
            const streakColor = r.winStreak >= 5 ? '#f1c40f' : r.winStreak >= 3 ? '#f39c12' : '#aaa';
            const statsHtml = sec('Battle Stats') +
                `<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center;">` +
                    `<div style="background:#111; border-radius:6px; padding:8px 4px;">` +
                        `<div style="font-size:18px; font-weight:bold; color:#e74c3c;">${r.playerDamage || 0}</div>` +
                        `<div style="font-size:10px; color:#666;">Damage dealt</div>` +
                    `</div>` +
                    `<div style="background:#111; border-radius:6px; padding:8px 4px;">` +
                        `<div style="font-size:18px; font-weight:bold; color:#3498db;">${r.turnCount || 0}</div>` +
                        `<div style="font-size:10px; color:#666;">Turns</div>` +
                    `</div>` +
                    `<div style="background:#111; border-radius:6px; padding:8px 4px;">` +
                        `<div style="font-size:18px; font-weight:bold; color:${streakColor};">${r.winStreak || 1}</div>` +
                        `<div style="font-size:10px; color:#666;">Win streak</div>` +
                    `</div>` +
                `</div>` + endsec();

            // ── Rewards ────────────────────────────────────────────────────────
            const farmNote = (r.replayMult && r.replayMult < 1)
                ? ` <span style="font-size:10px; color:#e94560;">(${Math.round(r.replayMult * 100)}% farmed)</span>` : '';
            const coinSurgeNote = r.coinSurgeUsed
                ? ` <span style="font-size:10px; color:#4ecdc4; background:#0a2a2a; padding:1px 5px; border-radius:3px;">2× Surge</span>` : '';
            const xpSurgeNote = r.xpSurgeUsed
                ? ` <span style="font-size:10px; color:#4ecdc4; background:#0a2a2a; padding:1px 5px; border-radius:3px;">2× Surge</span>` : '';
            const gemLabel = r.gemSource === 'firstClear'
                ? ` <span style="font-size:10px; color:#f1c40f;">✦ first clear!</span>`
                : r.gemSource === 'luck' ? ` <span style="font-size:10px; color:#aaa;">lucky drop!</span>` : '';
            const noGemNote = (r.isBoss && !r.isBossFirstClear && !r.gemsEarned)
                ? `<div style="font-size:10px; color:#444; margin-top:4px; padding-left:2px;">💎 Boss gems already claimed (first clear only)</div>` : '';

            const rewardsHtml = sec('Rewards') +
                `<div style="background:#111; border-radius:8px; padding:10px 12px;">` +
                    `<div style="display:flex; align-items:center; gap:8px; padding:5px 0;">` +
                        `<span style="font-size:20px;">🪙</span>` +
                        `<span style="font-size:17px; font-weight:bold; color:#f1c40f;">+${r.coinsEarned}</span>` +
                        `<span style="font-size:11px; color:#666;">coins${farmNote}${coinSurgeNote}</span>` +
                        `<span style="font-size:11px; color:#444; margin-left:auto;">Total: ${gameState.coins}</span>` +
                    `</div>` +
                    (r.gemsEarned ? `<div style="display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid #1a1a1a;">` +
                        `<span style="font-size:20px;">💎</span>` +
                        `<span style="font-size:17px; font-weight:bold; color:#4ecdc4;">+${r.gemsEarned}</span>` +
                        `<span style="font-size:11px; color:#666;">gems${gemLabel}</span>` +
                        `<span style="font-size:11px; color:#444; margin-left:auto;">Total: ${gameState.gems}</span>` +
                    `</div>` : '') +
                    (r.creatureXP ? `<div style="display:flex; align-items:center; gap:8px; padding:5px 0; border-top:1px solid #1a1a1a;">` +
                        `<span style="font-size:20px;">⭐</span>` +
                        `<span style="font-size:17px; font-weight:bold; color:#f39c12;">+${r.creatureXP}</span>` +
                        `<span style="font-size:11px; color:#666;">XP to team${xpSurgeNote}</span>` +
                    `</div>` : '') +
                    noGemNote +
                `</div>` + endsec();

            // ── Team condition ─────────────────────────────────────────────────
            let teamRows = '';
            if (r.teamSnapshot && r.teamSnapshot.length) {
                const levelUpNames = new Set((r.leveledUp || []).map(s => s.split(' →')[0].replace(/\+/g,'')));
                r.teamSnapshot.forEach(t => {
                    const lvlUp = levelUpNames.has(t.name.replace(/\+/g,''));
                    const fainted = !t.survived;
                    const evolveReady = (r.leveledUp || []).some(s => s.includes('can evolve') && s.includes(t.name.replace(/\+/g,'')));
                    const atLevelCap = t.level >= t.levelCap;
                    const xpPct = t.xpNeeded > 0 ? Math.round(t.xp / t.xpNeeded * 100) : 100;
                    const xpFull = xpPct >= 100;
                    teamRows += `<div style="display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #111; opacity:${fainted ? '0.5' : '1'};">` +
                        `<div style="flex-shrink:0;">${spriteImg(t.baseId, 32, '', t.tier)}</div>` +
                        `<div style="flex:1; min-width:0;">` +
                            `<div style="font-size:12px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</div>` +
                            `<div style="font-size:11px; color:#666; margin-top:1px;">Lv ${t.level}${atLevelCap ? ' (max)' : ''}</div>` +
                        `</div>` +
                        `<div style="text-align:right; flex-shrink:0;">` +
                            (fainted
                                ? `<span style="font-size:11px; color:#666;">Fainted</span>`
                                : `<div style="font-size:10px; color:#aaa; margin-bottom:3px;">${xpPct}% XP</div>` +
                                  `<div style="background:#222; border-radius:3px; height:6px; width:72px; overflow:hidden; display:inline-block;">` +
                                  `<div style="background:${xpFull ? '#f1c40f' : '#4ecdc4'}; height:100%; width:${xpPct}%;"></div></div>`) +
                            (xpFull && !atLevelCap ? `<div style="font-size:10px; color:#f1c40f; font-weight:bold; margin-top:4px;">→ LEVEL UP!</div>` : '') +
                            (lvlUp  ? `<div style="font-size:10px; color:#4ecdc4; margin-top:4px;">⬆ Leveled!</div>` : '') +
                            (evolveReady ? `<div style="font-size:10px; color:#f1c40f; margin-top:4px;">✦ Ready!</div>` : '') +
                        `</div>` +
                    `</div>`;
                });
            }
            const teamHtml = teamRows ? sec('Team Condition') +
                `<div style="background:#111; border-radius:8px; padding:8px 12px;">${teamRows}</div>` + endsec() : '';

            // ── Gather result (wild only) ─────────────────────────────────────
            let catchHtml = '';
            if (isWild) {
                if (r.gathered) {
                    const catchBaseId = +Object.keys(creatureDatabase).find(k => creatureDatabase[k].name === r.creatureName);
                    const base = creatureDatabase[catchBaseId] || {};
                    const chanceNote = r.gatherChance != null
                        ? `<div style="font-size:10px; color:#3a6a44; margin-top:3px;">Gather chance was ${r.gatherChance}%</div>` : '';
                    const rankBadge = r.gatheredRank
                        ? `<span style="display:inline-block; min-width:18px; text-align:center; padding:1px 6px; border-radius:5px; background:${rankColor(r.gatheredRank)}; color:#111; font-size:12px; font-weight:bold; margin-left:6px;">${r.gatheredRank}</span>`
                        : '';
                    catchHtml = sec('🌿 Gathered!') +
                        `<div style="background:#0d2e22; border:1px solid #2ecc71; border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px;">` +
                        (catchBaseId ? spriteImg(catchBaseId, 48) : '<span style="font-size:28px;">🌿</span>') +
                        `<div>` +
                        `<div style="font-weight:bold; color:#7bed9f; font-size:14px;">${r.creatureName} gathered!${rankBadge}</div>` +
                        `<div style="font-size:11px; color:#666; margin-top:2px;">${base.element || ''} · ${base.rarity || ''} · rank ${r.gatheredRank || 'C'}</div>` +
                        chanceNote +
                        `</div></div>` + endsec();
                } else if (r.escaped) {
                    if (!r.gatherAttempted) {
                        // Player defeated the wild creature but never tried to gather it.
                        catchHtml = sec('🌿 Gather Result') +
                            `<div style="background:#1a1a2e; border:1px solid #444; border-radius:8px; padding:10px 12px; font-size:13px; color:#aaa;">` +
                            `You defeated ${r.creatureName} but didn't recruit it. To gather a creature, weaken it and tap <strong style="color:#7bed9f;">Gather</strong> before defeating it.` +
                            `</div>` + endsec();
                    } else {
                        const chanceNote = r.gatherChance != null
                            ? ` Gather chance was ${r.gatherChance}%.` : '';
                        const nearMiss = r.gatherChance >= 70
                            ? `<div style="font-size:11px; color:#f39c12; margin-top:5px;">So close! Weaken it more next time for a better chance.</div>` : '';
                        catchHtml = sec('🌿 Gather Result') +
                            `<div style="background:#2e0d0d; border:1px solid #e74c3c; border-radius:8px; padding:10px 12px; font-size:13px; color:#e74c3c;">` +
                            `${r.creatureName} slipped away!${chanceNote}` +
                            nearMiss +
                            `</div>` + endsec();
                    }
                }
            }

            // ── Floor unlocked ─────────────────────────────────────────────────
            const floorHtml = r.floorUnlocked
                ? `<div style="background:#1a2e1a; border:2px solid #f1c40f; border-radius:8px; padding:12px; text-align:center; margin-bottom:12px;">` +
                  `<div style="font-size:18px;">🗺️</div>` +
                  `<div style="font-weight:bold; color:#f1c40f; margin-top:4px;">New floor unlocked!</div>` +
                  `<div style="font-size:13px; color:#aaa; margin-top:2px;">${r.floorUnlocked}</div>` +
                  `</div>` : '';

            // Tutorial routing: named function calls only (no inline arrow fns — breaks HTML attr parsing).
            // Phase 6 = the tutorial's wild battle just finished → run completion.
            // storyClearFloor set = a boss was just beaten and a floor's story should play.
            const _tp = gameState.tutorial && !gameState.tutorial.isComplete ? gameState.tutorial.currentPhase : -1;
            const continueAction = _tp === 6 ? 'finishTutorialAfterWild()'
                                 : (r.storyClearFloor ? `showStoryClear(${r.storyClearFloor})`
                                 : "gameState.currentScreen='mainMenu'; render();");

            const html = `
                <div class="ui-overlay" style="background:transparent;">
                    <div class="ui-panel">
                        ${headerHtml}
                        <button onclick="${continueAction}" style="width:100%; margin:0 0 14px; padding:12px; font-size:14px; font-weight:bold;">Continue →</button>
                        ${statsHtml}
                        ${rewardsHtml}
                        ${teamHtml}
                        ${catchHtml}
                        ${floorHtml}
                    </div>
                </div>
            `;
            mountOverlay(html);
        }

        function updateHUD() {
            const hud = document.getElementById('bottomHUD');
            if (!hud) return;
            const screen = gameState.currentScreen;
            // Show currency bar on battle + result screens
            if (screen === 'battleMode' || screen === 'battleResult') {
                hud.style.display = 'block';
                hud.innerHTML = `🪙 <strong style="color:#f1c40f;">${gameState.coins || 0}</strong>&nbsp;&nbsp; 💎 <strong style="color:#4ecdc4;">${gameState.gems || 0}</strong>`;
            } else {
                hud.style.display = 'none';
            }
        }

        // ===== EVENT LISTENERS =====
        let pointerDownCell = null;

        function cellFromEvent(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const { pL } = battleLayouts();
            const c = Math.floor((x - pL.x) / pL.cell);
            const r = Math.floor((y - pL.y) / pL.cell);
            if (r < 0 || r >= BR.player.rows || c < 0 || c >= BR.player.cols) return null;
            return { r, c };
        }

        function playerInputAllowed() {
            return gameState.currentScreen === 'battleMode' && BR.player && BR.turn === 'player' && BR.player.phase === 'idle' && !BR.playerStunned;
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (!playerInputAllowed()) return;
            pointerDownCell = cellFromEvent(e);
        });

        canvas.addEventListener('pointerup', (e) => {
            if (!playerInputAllowed()) return;
            const S = BR.player;
            const up = cellFromEvent(e);
            const down = pointerDownCell;
            pointerDownCell = null;
            if (!up) { S.selected = null; return; }

            // Drag from one tile to an adjacent tile
            if (down && adjacent(down, up)) {
                S.selected = null;
                trySwap(S, down, up);
                return;
            }

            // Tap to select, then tap an adjacent tile to swap
            if (!S.selected) {
                S.selected = up;
            } else if (S.selected.r === up.r && S.selected.c === up.c) {
                S.selected = null;
            } else if (adjacent(S.selected, up)) {
                const s = S.selected;
                S.selected = null;
                trySwap(S, s, up);
            } else {
                S.selected = up;
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        });

        // Start game
        init();
    </script>
</body>
</html>
