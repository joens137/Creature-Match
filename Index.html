            if (key && (key !== BR._coachKey || el.textContent !== set[key])) { BR._coachKey = key; el.textContent = set[key]; }
        }

        // Battle 1: matching + power bar.
        function coachKeyBattle1() {
            const S = BR.player;
            const pb = S ? (S.powerBar || 0) : 0;
            const cap = S ? effCap(S) : POWER_CAP_BASE;
            if (pb > (BR._coachPrevPower || 0)) BR._coachSawMatch = true;
            BR._coachPrevPower = pb;

            if (BR.turn === 'ai')       return 'enemy';
            if (pb >= cap)              return 'full';
            if (pb >= cap * 0.5)        return 'charging';
            if (BR._coachSawMatch)      return 'matched';
            return 'start';
        }

        // Find a living team creature whose element is strong against the given element.
        function teamMateStrongAgainst(enemyEl) {
            const battle = gameState.currentBattle;
            for (const id of battle.teamIds) {
                if (battle.hp[id] <= 0) continue;
                const inst = gameState.creatures.find(c => c.id === id);
                if (inst && elementBeats(creatureDatabase[inst.baseId].element, enemyEl)) return inst;
            }
            return null;
        }

        // Battle 2: elements + switching. Built dynamically from the live matchup.
        function coachTextBattle2() {
            const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
            if (BR.turn === 'ai') return TUTORIAL_DATA.coach.battle2.enemy;
            const enemyEl = enemyElementOf();
            const actEl   = activeElementOf();
            if (elementBeats(actEl, enemyEl)) {
                return `✅ ${cap(actEl)} is strong against ${cap(enemyEl)} — more damage dealt, less taken. Now press the attack!`;
            }
            const mate = teamMateStrongAgainst(enemyEl);
            if (mate) {
                const mateEl = creatureDatabase[mate.baseId].element;
                return `⚠️ This ${cap(enemyEl)} enemy is strong against your ${cap(actEl)}! Tap ${creatureDatabase[mate.baseId].name} below to switch — its ${cap(mateEl)} beats ${cap(enemyEl)}.`;
            }
            return `⚠️ You're at an element disadvantage. Switch to a creature whose element is strong against ${cap(enemyEl)}.`;
        }

        const MAX_MERGE = 2; // base -> + -> ++ (final form)

        // Merge is an accumulating "feed" bar. You feed same-series creatures (any form) into a
        // keeper; each fed creature is +1 progress. When progress reaches the rarity threshold for
        // the next tier, the keeper advances a merge level (keeping its level/XP) and leftover
        // progress carries over.
        //   requirement for the NEXT tier = MERGE_REQ[rarity] * (mergeLevel + 1)
        //   base→+  : MERGE_REQ × 1     +→++ : MERGE_REQ × 2
        const MERGE_REQ = { common: 10, rare: 7, epic: 5, legendary: 2 };

        function formName(baseId, mergeLevel, evoTier) {
            return evolvedName(baseId, evoTier || 0) + '+'.repeat(mergeLevel);
        }

        // Number of creatures needed to advance from the creature's current merge level to the next.
        // Returns null if already at MAX_MERGE (no further merging).
        function mergeReqFor(creature) {
            if (!creature || creature.mergeLevel >= MAX_MERGE) return null;
            const rarity = (creatureDatabase[creature.baseId] || {}).rarity || 'common';
            const per = MERGE_REQ[rarity] || MERGE_REQ.common;
            return per * (creature.mergeLevel + 1);
        }

        // Creatures eligible to be fed into `keeper`: same baseId, any form, excluding the keeper.
        function mergeFodderFor(keeper) {
            if (!keeper) return [];
            return gameState.creatures.filter(c => c.id !== keeper.id && c.baseId === keeper.baseId);
        }

        // Feed the given fodder creatures into the keeper. Consumes the fodder, adds progress,
        // and advances merge tiers as thresholds are crossed (carrying leftover progress).
        // Keeps the keeper's level/XP. Returns the number of tiers gained.
        function feedMerge(keeperId, fodderIds) {
            const keeper = gameState.creatures.find(c => c.id === keeperId);
            if (!keeper) return 0;
            // Only same-series fodder, never the keeper itself
            const ids = (fodderIds || []).filter(id => {
                if (id === keeperId) return false;
                const f = gameState.creatures.find(c => c.id === id);
                return f && f.baseId === keeper.baseId;
            });
            if (ids.length === 0) return 0;

            // Remove fodder from inventory and clear any team slots they occupied
            gameState.creatures = gameState.creatures.filter(c => !ids.includes(c.id));
            gameState.team = gameState.team.map(id => ids.includes(id) ? null : id);

            // Apply progress and advance tiers
            keeper.mergeProgress = (keeper.mergeProgress || 0) + ids.length;
            let tiersGained = 0;
            let req = mergeReqFor(keeper);
            while (req != null && keeper.mergeProgress >= req) {
                keeper.mergeProgress -= req;
                keeper.mergeLevel++;
                tiersGained++;
                req = mergeReqFor(keeper);
            }
            // At MAX_MERGE there's no further bar — drop any overflow progress.
            if (mergeReqFor(keeper) == null) keeper.mergeProgress = 0;

            if (tiersGained > 0) addAchievement('merge', 'Merged a creature!');
            saveGameData();
            return tiersGained;
        }

        // Permanently evolve a creature that has reached its tier's level gate.
        // Bumps evoTier (new name, new sprite, +10% stats, raises the level cap). Keeps merge bonus.
        function evolveCreature(creatureId) {
            const c = gameState.creatures.find(x => x.id === creatureId);
            if (!c || !canEvolve(c)) return;
            c.evoTier = evoTierOf(c) + 1;
            c.xp = 0; // resume leveling toward the new, higher cap
            trackQuestEvent('creature_evolved', {});
            addAchievement('evolve', 'Evolved a creature!');
            saveGameData();
            render();
        }

        // ===== TEST / DEBUG HELPERS (accessed from the gear menu) =====
        // Unlock every creature in the pokedex AND add one Lv1 copy of any not yet owned,
        // so they all show up in the collection for testing.
        function testUnlockAllCreatures() {
            Object.keys(creatureDatabase).forEach(idStr => {
                const baseId = parseInt(idStr, 10);
                gameState.pokedex[baseId] = true;
                const owned = gameState.creatures.some(c => c.baseId === baseId);
                if (!owned) addCreatureToInventory(baseId);
            });
            saveGameData();
            render();
        }

        // Unlock every story level by pushing the progression frontier to the max.
        function testUnlockAllLevels() {
            gameState.currentLevel = MAX_LEVEL;
            gameState.currentFloor = floorOfLevel(MAX_LEVEL);
            saveGameData();
            render();
        }

        // Raise the main (first team slot) creature's level by 1. If it reaches its
        // evolution gate, auto-evolve it so the next press continues past the gate —
        // this lets you walk a creature through both evolutions by tapping repeatedly.
        function testLevelUpMain() {
            const mainId = (gameState.team || []).find(id => id !== null);
            const c = mainId && gameState.creatures.find(x => x.id === mainId);
            if (!c) { alert('No main creature in your team to level up.'); return; }
            if (canEvolve(c)) {
                // Sitting at the gate already — evolve first; the next press continues leveling.
                evolveCreature(c.id);
                return;
            }
            const cap = levelCapOf(c);
            if (c.level < cap) {
                c.level++;
                c.xp = 0;
            }
            // If that bump landed exactly on the gate, evolve right away so the form/sprite updates.
            if (canEvolve(c)) evolveCreature(c.id);
            else { saveGameData(); render(); }
        }

                    <button onclick="testUnlockAllCreatures();"
                        style="width:100%; margin:0 0 8px; padding:11px; font-size:13px; background:#1a4a3a; color:#7bed9f; border:1px solid #2ecc71; border-radius:8px;">
                        🐾 Unlock all creatures</button>
                    <button onclick="testUnlockAllLevels();"
                        style="width:100%; margin:0 0 8px; padding:11px; font-size:13px; background:#1a3a52; color:#74b9ff; border:1px solid #3b82c4; border-radius:8px;">
                        🗺️ Unlock all story levels</button>
                    <button onclick="testLevelUpMain(); openTestMenu();"
                        style="width:100%; margin:0 0 4px; padding:11px; font-size:13px; background:#3a2a52; color:#c9a6ff; border:1px solid #8e44ad; border-radius:8px;">

            // Tapping the dim backdrop (outside the card) closes the menu.
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            document.body.appendChild(overlay);
        }

        // ===== ACHIEVEMENTS =====
        function addAchievement(id, title) {
            if (!gameState.achievements.includes(id)) {
                gameState.achievements.push(id);
            }
        }

        function checkAchievements() {
            if (gameState.currentBattle) {
                if (gameState.currentBattle.isBoss) {
                    addAchievement('boss', 'Defeated a boss!');
                }
                if (gameState.currentBattle.playerDamage > 500) {
                    addAchievement('damage', 'Dealt over 500 damage in one battle!');
                }
            }
            
            if (gameState.creatures.length >= 5) {
                addAchievement('collector', 'Caught 5 creatures!');
            }
            if (gameState.creatures.length >= 15) {
                addAchievement('master', 'Caught 15 creatures!');
            }
        }

        // ===== RENDERING =====
        function render() {
            // Remove any existing UI overlays so screens don't stack on top of each other
            document.querySelectorAll('.ui-overlay').forEach(el => el.remove());
            // Clear energy countdown timer whenever we navigate away from main menu
            if (gameState.currentScreen !== 'mainMenu' && window._energyTimer) {
                clearInterval(window._energyTimer); window._energyTimer = null;
            }
            // Clear wild encounter timer when leaving wild screen
            if (gameState.currentScreen !== 'random' && window._wildTimer) {
                clearInterval(window._wildTimer); window._wildTimer = null;
            }
            // Clear pending summon results when leaving the summon screen
            if (gameState.currentScreen !== 'summon') {
                gameState.pendingSummonResults = null;
            }

            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Overwrite with the live floor environment for map-adjacent screens
            if (gameState.currentScreen !== 'battleMode') {
                const envScreens = ['mainMenu', 'battleResult', 'random'];
                if (envScreens.includes(gameState.currentScreen)) {
                    const floorForBg = Math.min(3, Math.max(1, gameState.mapFloor || highestFloorReached()));
                    ctx.drawImage(getFloorBackground(floorForBg, canvas.width, canvas.height), 0, 0);
                    drawFloorParticles(floorForBg, canvas.width, canvas.height);
                }
            }
            // battleMode draws its own floor background via drawBattleScene()
            
            switch(gameState.currentScreen) {
                case 'starterSelect':
                    renderStarterSelect();
                    break;
                case 'loginReward':
                    renderLoginReward();
                    break;
                case 'mainMenu':
                    renderMainMenu();
                    break;
                case 'battleMode':
                    renderBattle();
                    break;
                case 'battleResult':
                    renderBattleResult();
                    break;
                case 'collection':
                    renderCollection();
                    break;
                case 'creatureProfile':
                    renderCreatureProfile();
                    break;
                case 'gallery':
                    renderGallery();
                    break;
                case 'quests':
                    renderQuests();
                    break;
                case 'shop':
                    renderShop();
                    break;
                case 'achievements':
                    renderAchievements();
                    break;
                case 'pokedex':
                    renderPokedex();
                    break;
                case 'random':
                    renderRandom();
                    break;
                case 'summon':
                    renderSummon();
                    break;
            }
            
            updateHUD();
        }

        function renderStarterSelect() {
            const inTutorial = !!(gameState.tutorial && !gameState.tutorial.isComplete);
            const heading = inTutorial ? 'Choose who you are' : 'Choose Your Starter';

            const cards = TUTORIAL_DATA.starters.map(s => {
                const el = s.element; // 'fire' | 'water' | 'grass'
                const body = inTutorial
                    ? `<div class="starter-flavor">${s.flavorText}</div>`
                    : '';
                return `
                    <div class="starter-card ${el}" onclick="startGame('${el}')">
                        <div class="starter-sprite">${spriteImg(s.id, 72)}</div>
                        <div class="starter-info">
                            <div class="starter-name">${s.name}</div>
                            <div class="starter-elem element-${el}">${el} type</div>
                            ${body}
                        </div>
                    </div>`;
            }).join('');

            const panel = document.createElement('div');
            panel.className = 'ui-overlay';
            panel.innerHTML = `
                <div class="ui-panel starter-panel">
                    <h1>${heading}</h1>
                    ${inTutorial ? '<p class="starter-sub">Three strays. Three stories. One of them is you.</p>' : ''}
                    <div class="starter-list">${cards}</div>
                </div>
            `;
            document.body.appendChild(panel);
        }

        function renderMainMenu() {
            const maxFloor = highestFloorReached();
            if (!gameState.mapFloor || gameState.mapFloor > maxFloor) gameState.mapFloor = maxFloor;
            const f = gameState.mapFloor;
            const theme = floorThemes[f];
            const levels = levelData[f];

            // Nodes laid out boss (top) -> level 1 (bottom), winding left/right
            let nodesHtml = '';
            levels.slice().reverse().forEach((lc, i) => {
                const lvl = lc.level;
                const status = levelStatus(lvl);
                const playable = lvl <= gameState.currentLevel;
                const locked = status === 'locked';
                const size = lc.isBoss ? 76 : 58;
                const inner = lc.isBoss ? (locked ? '🔒' : '👑') : (status === 'done' ? '⭐' : status === 'current' ? String(lvl) : '🔒');
                const bg = locked ? '#3a3a3a' : theme.accent;
                const txt = locked ? '#888' : '#111';
                const pulse = status === 'current' ? 'animation: nodePulse 1.4s infinite;' : '';
                const ringHi = lc.isBoss ? 'border-color:#ffd93d;' : '';
                const shift = (i % 2 === 0) ? 'translateX(46px)' : 'translateX(-46px)';
                const onclick = playable ? `onclick="startStoryBattle(${lvl})"` : '';
                const caption = lc.isBoss ? 'BOSS' : `Lv ${lvl}`;

                // Enemy lineup pips: one colored dot per enemy, colored by element. Hidden when locked.
                let pipsHtml = '';
                if (!locked && lc.enemies && lc.enemies.length) {
                    const pips = lc.enemies.map(e => {
                        const el = (creatureDatabase[e.id] || {}).element || 'fire';
                        const col = elementColors[el] || '#888';
                        return `<span style="width:9px; height:9px; border-radius:50%; background:${col}; border:1px solid rgba(0,0,0,0.4); display:inline-block;"></span>`;
                    }).join('');
                    pipsHtml = `<div style="display:flex; gap:3px; margin-top:3px; justify-content:center;">${pips}</div>`;
                }

                nodesHtml += `
                    <div style="display:flex; flex-direction:column; align-items:center; transform:${shift};">
                        <div class="map-node" ${onclick}
                            style="width:${size}px; height:${size}px; border-radius:50%; background:${bg}; color:${txt};
                                   display:flex; align-items:center; justify-content:center; font-size:${lc.isBoss ? 32 : 22}px; font-weight:bold;
                                   border:3px solid rgba(255,255,255,0.55); ${ringHi} ${pulse} cursor:${playable ? 'pointer' : 'not-allowed'};">
                            ${inner}
                        </div>
                        <div style="font-size:10px; color:#fff; margin-top:3px; text-shadow:0 1px 2px #000;">${caption}</div>
                        ${pipsHtml}
                    </div>`;
            });

            const prevDisabled = f <= 1 ? 'disabled' : '';
            const nextDisabled = f >= maxFloor ? 'disabled' : '';
            const dailyClaimable = getDailyState().claimableToday;
            const dailyDot = dailyClaimable ? ' <span style="color:#7bed9f;">●</span>' : '';
            const dailyBg = dailyClaimable ? '#f39c12' : '#2a3a4a';
            const dailyBtn = `<button onclick="renderDailyReward();" style="flex:1; font-size:11px; padding:8px 2px; margin:0; background:${dailyBg};">⭐<br>Daily${dailyDot}</button>`;

            // Energy bar — computed before the template string to avoid nested-backtick issues
            const _e = getEnergy();
            const _ePct = (_e.current / ENERGY_MAX) * 100;
            const _eBarColor = _e.current > 10 ? '#9b8bd6' : _e.current > 5 ? '#f39c12' : '#e94560';
            const _eToday = new Date().toDateString();
            const _eAdUsed = (!gameState.energyAdRefills || gameState.energyAdRefills.date !== _eToday) ? 0 : gameState.energyAdRefills.count;
            const _eAdAvail = _eAdUsed < ENERGY_AD_MAX_DAY;
            const _eTimerLabel = _e.current >= ENERGY_MAX ? 'FULL' : '+1 in <span id="energyTimer">' + fmtMs(_e.nextRegenMs) + '</span>';
            const _eAdBtn = (_e.current < ENERGY_MAX && _eAdAvail)
                ? '<button onclick="refillEnergyAd();" style="padding:2px 8px; margin-left:6px; font-size:10px; background:#9b8bd6;">+' + ENERGY_AD_GRANT + ' Ad (' + (ENERGY_AD_MAX_DAY - _eAdUsed) + ')</button>'
                : '';
            const energyHtml = '<div style="margin-top:6px; background:rgba(0,0,0,0.35); border-radius:8px; padding:5px 12px;">'

                + '<span style="font-size:12px;">⚡</span>'

                + '<div style="background:' + _eBarColor + '; width:' + _ePct + '%; height:8px; border-radius:4px;"></div>'
                + '</div>'
                + '<span style="font-size:12px; color:#ccc; white-space:nowrap;">' + _e.current + '/' + ENERGY_MAX + '</span>'
                + _eAdBtn
                + '</div>'
                + '<div style="font-size:10px; color:#888; text-align:center; margin-top:2px;">' + _eTimerLabel + '</div>'
                + '</div>';
            
            // Login streak info
            const streakDay = gameState.loginStreak || 0;
            const LOGIN_MILESTONES = { 1: 5, 3: 15, 7: 50, 14: 100, 30: 200 };
            const nextMilestone = Object.keys(LOGIN_MILESTONES)
                .map(Number)
                .find(m => m > streakDay) || 30;
            const nextReward = LOGIN_MILESTONES[nextMilestone];
            const streakHtml = streakDay > 0 ? '<div style="margin-top:6px; background:rgba(255,193,7,0.1); border:1px solid #f39c12; border-radius:8px; padding:8px 12px; text-align:center;">'
                + '<div style="font-size:11px; color:#f39c12; font-weight:bold;">🔥 LOGIN STREAK: Day ' + streakDay + '</div>'
                + '<div style="font-size:10px; color:#ccc; margin-top:2px;">Next milestone at Day ' + nextMilestone + ': ' + nextReward + ' 💎</div>'
                + '</div>' : '';

            const panel = document.createElement('div');
            panel.className = 'ui-overlay';
            panel.style.padding = '0';
            panel.style.background = 'transparent';
            panel.innerHTML = `
                <div style="position:absolute; inset:0; background:rgba(0,0,0,0.22); display:flex; flex-direction:column;">
                    <div style="position:relative; text-align:center; padding:10px 10px 6px;">
                        <button onclick="openTestMenu()" 
                                style="position:absolute; top:8px; right:8px; background:none; border:none; color:#888; font-size:18px; cursor:pointer; padding:4px; opacity:0.6;">⚙️</button>
                        <div style="font-size:12px; color:#ddd;">Creature Match</div>
                        <div style="display:flex; align-items:center; justify-content:center; gap:14px; margin-top:4px;">
                            <button ${prevDisabled} onclick="changeMapFloor(-1)" style="padding:6px 12px; margin:0; font-size:16px;">◀</button>
                            <div style="font-size:19px; font-weight:bold; color:#fff; text-shadow:0 1px 3px #000;">${theme.deco} ${theme.name}</div>
                            <button ${nextDisabled} onclick="changeMapFloor(1)" style="padding:6px 12px; margin:0; font-size:16px;">▶</button>
                        </div>
                        <div style="font-size:11px; color:#cfcfcf; margin-top:3px;">Floor ${f} of 3 · tap a level to play${gameState.storyComplete ? ' · ✓ Story complete!' : ''}</div>
                        <div style="display:flex; justify-content:center; gap:16px; margin-top:6px; background:rgba(0,0,0,0.35); border-radius:8px; padding:5px 12px;">
                            <span style="font-size:13px;">🪙 <strong style="color:#f1c40f;">${gameState.coins || 0}</strong></span>
                            <span style="font-size:13px;">💎 <strong style="color:#4ecdc4;">${gameState.gems || 0}</strong></span>
                        </div>
                        ${energyHtml}
                        ${streakHtml}
                    </div>

                    <div style="flex:1; overflow-y:auto; padding:18px 0 24px; display:flex; flex-direction:column; gap:16px; align-items:center;">
                        ${nodesHtml}
                    </div>

                    <div style="display:flex; gap:6px; padding:8px; background:rgba(0,0,0,0.45);">
                        <button id="wildNavBtn" onclick="gameState.currentScreen='random'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0;">🎲<br>Wild</button>
                        <button id="summonNavBtn" onclick="gameState.currentScreen='summon'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0; background:#1a2a4a; color:#9b8bd6;">✨<br>Summon</button>
                        <button id="teamNavBtn" onclick="gameState.currentScreen='collection'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0;">🎒<br>Team</button>
                        <button onclick="gameState.currentScreen='quests'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0; position:relative; ${(() => { refreshQuests(); const unclaimed = getAllActiveQuests().some(q=>q.done&&!q.claimed); return unclaimed ? 'background:#1a4a2a;' : ''; })()}">📋<br>Quests${(() => { refreshQuests(); return getAllActiveQuests().some(q=>q.done&&!q.claimed) ? ' <span style="color:#7bed9f;">●</span>' : ''; })()}</button>
                        <button id="shopNavBtn" onclick="gameState.currentScreen='shop'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0;">🏪<br>Shop</button>
                        <button onclick="gameState.currentScreen='pokedex'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0;">📖<br>Dex</button>
                        <button onclick="gameState.currentScreen='achievements'; render();" style="flex:1; font-size:11px; padding:8px 2px; margin:0;">🏆<br>Goals</button>
                        ${dailyBtn}
                    </div>
                </div>
            `;
            document.body.appendChild(panel);

            // Live countdown: tick every second while on main menu
            if (window._energyTimer) clearInterval(window._energyTimer);
            window._energyTimer = setInterval(() => {
                const span = document.getElementById('energyTimer');
                if (!span) { clearInterval(window._energyTimer); return; }
                const { current, nextRegenMs } = getEnergy();
                if (current >= ENERGY_MAX) { span.textContent = ''; span.parentElement.textContent = 'FULL'; clearInterval(window._energyTimer); }
                else span.textContent = fmtMs(nextRegenMs);

        function renderBattle() {
            const battle = gameState.currentBattle;
            // Boards are drawn by the animation loop; make sure it's running (e.g. after a resize).
            if (!BR.loopId) startBattleLoop();

            // Switch buttons for each team creature (switching costs a turn)
            let switchBtns = '';
            battle.teamIds.forEach(id => {
                const c = gameState.creatures.find(x => x.id === id);
                if (!c) return;
                const base = creatureDatabase[c.baseId];
                const hp = battle.hp[id];
                const isActive = id === battle.activeId;
                const fainted = hp <= 0;
                const bg = isActive ? '#e94560' : fainted ? '#333' : '#1a3a52';
                const label = `${spriteImg(c.baseId, 20, 'vertical-align:middle; margin-right:2px;')}${fainted ? 'KO' : Math.max(0, hp)}`;
                switchBtns += `<button onclick="switchActive(${id})" ${fainted || isActive ? 'disabled' : ''}
                    style="flex:1; min-width:0; padding:6px 4px; margin:0 2px; font-size:12px; background:${bg};">${label}</button>`;
            });

            const actCreature = activeCreatureInst();
            const specs = actCreature ? ABILITIES[actCreature.baseId] : null;
            const turnReady = BR.turn === 'player' && !BR.playerStunned;

            function abBtnHtml(slot) {
                const spec = slot === 1 ? specs.a1 : specs.a2;
                const unlocked = abilityUnlocked(actCreature, slot);
                const ready = unlocked && (slot === 1 ? BR.ab1Ready : BR.ab2Ready) && turnReady;
                const sub = !unlocked ? `🔒 Unlocks at Lv ${ABILITY_UNLOCK_LV[slot]}`
                    : (ready ? describeAbilitySpec(spec, slot) : (slot === 1 ? `Match ${ARM_A1_LEN} to arm` : `Match ${ARM_A2_LEN} to arm`));
                const bg = ready ? (slot === 1 ? '#e67e22' : '#8e44ad') : '#444';
                const col = ready ? '#fff' : '#9aa3ad';
                return `<button id="abBtn${slot}" onclick="useAbility(${slot})" ${ready ? '' : 'disabled'}
                    style="flex:1; min-width:0; margin:0; padding:6px 4px; font-size:11px; line-height:1.15; background:${bg}; color:${col};">
                    <div style="font-weight:bold;">${ready ? '✨ ' : '🔒 '}${spec.name}</div>
                    <div style="font-size:9px; opacity:0.85;">${sub}</div>
                </button>`;
            }
            const abilityRow = specs
                ? `<div style="display:flex; gap:5px; margin-bottom:5px;">${abBtnHtml(1)}${abBtnHtml(2)}</div>`
                : '';

            // Team synergy chips (active element's resonance is highlighted)
            let synergyRow = '';
            const syn = battle.synergy;
            if (syn && syn.list.length) {
                const actEl = activeElementOf();
                const chips = syn.list.map(item => {
                    const isActiveEl = item.name.startsWith(elementName(actEl) + ' ');
                    const lit = isActiveEl || item.name === 'Balanced Force';
                    const bg = lit ? '#2e7d32' : '#2a3a4a';
                    const col = lit ? '#dfffe0' : '#9aa3ad';
                    return `<span title="${item.desc}" style="background:${bg}; color:${col}; font-size:9px; padding:2px 6px; border-radius:8px; white-space:nowrap;">${item.icon} ${item.name}${lit ? ' ●' : ''}</span>`;
                }).join('');
                synergyRow = `<div style="display:flex; gap:4px; margin-bottom:5px; flex-wrap:wrap; justify-content:center;">${chips}</div>`;
            }

            // Gather button row (wild battles only)
            const isWildBattle = battle.mode === 'random';
            const gatherRowHtml = isWildBattle ? (() => {
                const hpFrac = Math.max(0, battle.enemyHP / battle.enemyMaxHP);
                const rate   = gatherRate(battle.enemy.baseId, hpFrac);
                const pct    = Math.round(rate * 100);
                const rarity = creatureDatabase[battle.enemy.baseId].rarity;
                // Color the chance: green ≥60, amber ≥30, red <30
                const pctCol = pct >= 60 ? '#7bed9f' : pct >= 30 ? '#f39c12' : '#e94560';
                const canGather = BR.turn === 'player' && !BR.playerStunned && hpFrac < 1.0;
                const gatherBg = canGather ? '#1a4a2a' : '#222';
                const gatherBdr = canGather ? '#2ecc71' : '#333';
                return `<div id="gatherRow" style="display:flex; align-items:center; gap:6px; margin-bottom:5px; background:#0d1f14; border:1px solid #1a3a22; border-radius:7px; padding:5px 8px;">
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:11px; color:#7bed9f; font-weight:bold;">🌿 Gather Creature</div>
                        <div style="font-size:10px; color:#555; margin-top:1px;">${rarity} · chance: <span style="color:${pctCol}; font-weight:bold;">${pct}%</span></div>
                    </div>
                    <button id="gatherBtn" onclick="tryGather();" ${canGather ? '' : 'disabled'}
                        style="margin:0; padding:7px 14px; font-size:12px; font-weight:bold;
                               background:${gatherBg}; color:${canGather ? '#7bed9f' : '#444'};
                               border:1px solid ${gatherBdr}; border-radius:6px; flex-shrink:0;">
                        Gather
                    </button>
                </div>`;
            })() : '';

            const panel = document.createElement('div');
            panel.className = 'ui-overlay';
            panel.style.background = 'transparent';
            panel.style.pointerEvents = 'none';
            panel.innerHTML = `
                ${battle.mode === 'tutorial' ? `<div id="tutorialCoach" style="position:fixed; top:12px; left:50%; transform:translateX(-50%); background:rgba(15,52,96,0.96); border:1px solid #4ecdc4; color:#eafdfb; padding:10px 14px; border-radius:10px; max-width:min(440px,92vw); font-size:13px; line-height:1.45; text-align:center; z-index:600; box-shadow:0 4px 18px rgba(0,0,0,0.45); pointer-events:none;">${TUTORIAL_DATA.coach['battle' + (battle.tutorialBattle || 1)].start}</div>` : ''}
                <div id="battleControls" style="position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 6px 8px; border-radius: 10px; text-align: center; z-index: 500; width: min(360px, 94vw); box-sizing:border-box; pointer-events:auto;">
                    <div id="switchRow" style="display:flex; gap:4px; margin-bottom:5px;">${switchBtns}</div>
                    ${synergyRow}
                    ${abilityRow}
                    ${gatherRowHtml}
                    <div style="display:flex; gap:8px; align-items:center;">
                        <div style="flex:1; font-size:9px; color:#888; text-align:left; line-height:1.25;">⚡ Fill power bar → big attack · Match 4+ arms abilities</div>
                        <button onclick="showBattleLog();" style="margin:0; padding:6px 10px; font-size:12px; background:#1a2a3a; flex-shrink:0;" title="Battle log">📋</button>
                        ${battle.mode === 'tutorial' ? '' : `<button onclick="forfeitBattle();" style="margin:0; padding:6px 10px; font-size:12px; background:#333; flex-shrink:0;">Forfeit</button>`}
                    </div>
                </div>
            `;
            document.body.appendChild(panel);

            // Tutorial: fire the one-time gather lesson the first time the wild battle panel is up.
            const t = gameState.tutorial;
            if (t && !t.isComplete && t.pendingGatherLesson && battle.mode === 'random'
                    && !t.narrativeShown.gatherLesson) {
                t.pendingGatherLesson = false;
                t.narrativeShown.gatherLesson = true;
                saveGameData();
                requestAnimationFrame(() => showGatherLesson());
            }
        }

        function showBattleLog() {
            const battle = gameState.currentBattle;
            const log = (battle && battle.log) || [];

            const EL_ICON = { fire:'🔥', water:'💧', grass:'🌿', electric:'⚡', dark:'🌑' };
            const ei = e => (EL_ICON[e] || e);

            // Build a step-by-step formula string showing each multiplier applied
            function buildFormula(entry) {
                const steps = [];
                const mul = (val, label, color) =>
                    '<span style="color:' + color + '; font-size:11px;">× ' + val + ' ' + label + '</span>';
                // Damage-reduction step — derives the exact % from the actual pre/post values
                // rather than a separately computed percentage, so it always matches.
                const drStep = (entry) => {
                    const pre = entry.preDrDmg;
                    const post = entry.dmg;
                    const drLabel = entry.turn === 'player' ? 'enemy DEF' : 'your DEF';
                    // Prefer the true reduction fraction (deterministic from DEF); fall back to
                    // deriving it from pre/post values. The true fraction avoids the rounding
                    // jitter you'd otherwise see on small hits.
                    const pct = (entry.drFrac != null)
                        ? Math.round(entry.drFrac * 100)
                        : Math.round((pre - post) / pre * 100);
                    return '<span style="color:#ffa94d; font-size:11px;">−' + pct + '% ' + drLabel
                        + ' reduction</span> <span style="color:#888;">→ ' + post + '</span>';
                };

                if (entry.type === 'match') {
                    // Reconstruct in the SAME order as the real damage code:
                    // base → tile synergy (×1.33) → element matchup (×1.33 / ×0.75) → team synergy → DR
                    const SYN = 1.33, SE = 1.33, NVE = 0.75;
                    const base = Math.round(entry.baseAtk * entry.power / 3);
                    let running = base;
                    steps.push(
                        '<span style="color:#ccc;">' + entry.baseAtk + ' ATK</span>'
                        + ' <span style="color:#888;">×</span> '
                        + '<span style="color:#f1c40f;">' + entry.power + ' pwr</span>'
                        + ' <span style="color:#888;">÷ 3 =</span> '
                        + '<span style="color:#eee;">' + base + '</span>'
                    );

                    // Tile-creature synergy bonus (matching your creature's element)
                    if (entry.synergy) {
                        running = Math.round(running * SYN);
                        steps.push(mul(SYN.toFixed(2), ei(entry.dominantEl) + ' synergy', '#9b8bd6') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }

                    // Element matchup (applied before team synergy, matching the real code)
                    if (entry.elAdvantage === 'super') {
                        running = Math.round(running * SE);
                        steps.push(mul(SE.toFixed(2), ei(entry.dominantEl) + ' beats ' + ei(entry.defEl), '#7bed9f') + ' <span style="color:#888;">→ ' + running + '</span>');
                    } else if (entry.elAdvantage === 'resist') {
                        running = Math.round(running * NVE);
                        steps.push(mul(NVE.toFixed(2), ei(entry.defEl) + ' resists ' + ei(entry.dominantEl), '#e74c3c') + ' <span style="color:#888;">→ ' + running + '</span>');
                    } else {
                        steps.push('<span style="color:#666; font-size:11px;">' + ei(entry.dominantEl) + ' neutral vs ' + ei(entry.defEl) + '</span>');
                    }

                    // Team synergy multiplier (Twin Bond / Trinity element bonus)
                    if (entry.teamSynMult) {
                        running = Math.round(running * entry.teamSynMult);
                        steps.push(mul(entry.teamSynMult.toFixed(2), 'team synergy', '#4ecdc4') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }

                    // Empower
                    if (entry.empower) {
                        running = Math.round(running * entry.empower);
                        steps.push(mul(entry.empower.toFixed(1), 'empower', '#f39c12') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }

                    // Shield reduction
                    if (entry.shield) {
                        running = Math.round(running * (1 - entry.shield));
                        steps.push(mul('×(1−' + Math.round(entry.shield*100) + '%)', 'shield', '#74b9ff') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }

                    // DEF / damage reduction (defender's mitigation) — exact % from stored values.
                    if (entry.preDrDmg) {
                        // Anchor to the true pre-defense damage in case per-step rounding drifted.
                        if (entry.preDrDmg !== running) {
                            steps.push('<span style="color:#888; font-size:11px;">= ' + entry.preDrDmg + ' before defense</span>');
                        }
                        steps.push(drStep(entry));
                    }

                } else if (entry.type === 'ability') {
                    // Base: power × ATK (matchup uses ×1.33 / ×0.75, same constants as matches)
                    const SE = 1.33, NVE = 0.75;
                    const base = Math.round(entry.power * entry.baseAtk);
                    let running = base;
                    steps.push(
                        '<span style="color:#ccc;">' + entry.baseAtk + ' ATK</span>'
                        + ' <span style="color:#888;">×</span> '
                        + '<span style="color:#f1c40f;">' + entry.power + ' pow</span>'
                        + ' <span style="color:#888;">=</span> '
                        + '<span style="color:#eee;">' + base + '</span>'
                    );
                    if (entry.elAdvantage === 'super') {
                        running = Math.round(running * SE);
                        steps.push(mul(SE.toFixed(2), ei(entry.atkEl) + ' beats ' + ei(entry.defEl), '#7bed9f') + ' <span style="color:#888;">→ ' + running + '</span>');
                    } else if (entry.elAdvantage === 'resist') {
                        running = Math.round(running * NVE);
                        steps.push(mul(NVE.toFixed(2), ei(entry.defEl) + ' resists ' + ei(entry.atkEl), '#e74c3c') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }
                    // Fire Trinity: ability power multiplier
                    if (entry.abilityPowerMult) {
                        running = Math.round(running * entry.abilityPowerMult);
                        steps.push(mul(entry.abilityPowerMult.toFixed(2), '🔥 fire trinity', '#f39c12') + ' <span style="color:#888;">→ ' + running + '</span>');
                    }
                    // DEF / damage reduction
                    if (entry.preDrDmg) {
                        if (entry.preDrDmg !== running) {
                            steps.push('<span style="color:#888; font-size:11px;">= ' + entry.preDrDmg + ' before defense</span>');
                        }
                        steps.push(drStep(entry));
                    }
                }

                return steps.join('<span style="color:#555; margin:0 4px;">→</span>');
            }

            let rows = '';
            if (!log.length) {
                rows = '<div style="color:#888; text-align:center; padding:20px 0; font-size:13px;">No attacks yet this battle.</div>';
            } else {
                [...log].reverse().forEach((entry) => {
                    const isPlayer = entry.turn === 'player';
                    const typeLabel = entry.type === 'ability'
                        ? '<span style="color:#9b8bd6; font-size:10px;">✨ ' + (entry.abilityName || 'Ability') + '</span>'
                        : '<span style="color:#888; font-size:10px;">' + ei(entry.dominantEl || entry.atkEl) + ' match</span>';
                    const side = isPlayer
                        ? '<span style="color:#4ecdc4; font-weight:bold;">' + entry.who + '</span>'
                        : '<span style="color:#e94560; font-weight:bold;">' + entry.who + '</span>';
                    const arrow = isPlayer ? '▶' : '◀';
                    const dmgCol = isPlayer ? '#7bed9f' : '#e74c3c';

                    rows += '<div style="border-bottom:1px solid #1a2a3a; padding:8px 0;">'
                        // Header row: arrow + name + type label + damage
                        + '<div style="display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:5px;">'
                        +   '<div style="display:flex; align-items:center; gap:6px;">'
                        +     '<span style="color:' + (isPlayer ? '#4ecdc4' : '#e94560') + ';">' + arrow + '</span>'
                        +     side + '&nbsp;' + typeLabel
                        +   '</div>'
                        +   '<div style="font-size:18px; font-weight:bold; color:' + dmgCol + '; white-space:nowrap;">' + entry.dmg + ' dmg</div>'
                        + '</div>'
                        // Formula row
                        + '<div style="font-size:11px; color:#aaa; line-height:1.8; flex-wrap:wrap;">'
                        +   buildFormula(entry)
                        + '</div>'
                        + '</div>';
                });
            }

            const html = `
                <div class="ui-overlay" onclick="if(event.target===this)this.remove();">
                    <div class="ui-panel" style="width:min(440px,97vw); max-height:85vh; display:flex; flex-direction:column; padding:14px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <div>
                                <h1 style="margin:0; font-size:17px;">📋 Battle Log</h1>
                                <div style="font-size:10px; color:#555; margin-top:2px;">Newest first · tap outside to close</div>
                            </div>
                            <button onclick="this.closest('.ui-overlay').remove();" style="padding:5px 12px; margin:0; font-size:13px;">✕</button>
                        </div>
                        <div style="overflow-y:auto; flex:1; padding-right:2px;">${rows}</div>
                    </div>
                </div>`;
            mountOverlay(html);
        }

        function battleLost() {
            gameState.winStreak = 0;
            trackQuestEvent('battle_lost', {});
            const enemyName = creatureDatabase[gameState.currentBattle.enemy.baseId].name;
            gameState.lastBattleResult = { victory: false, caught: false, creatureName: enemyName, xp: 0 };
            // Roll a new wild encounter for next time (if this was a random battle)
            if (gameState.currentBattle.mode === 'random') {
                rollWildEncounter();
            }
            gameState.currentBattle = null;
            gameState.matchBoard = null;
            gameState.currentScreen = 'battleResult';
            saveGameData();
            render();
        }

        // ===== BOSS REPLAY DIMINISHING RETURNS =====
        // Gems  : awarded only on first-ever clear of a boss (permanent, never resets)
        // Coins + XP : full on first clear today, 50% on second, 25% on third+; resets at midnight

        const BOSS_FARM_MULT = [1.0, 0.5, 0.25]; // index = clears already done today (capped at last)

        function getBossReplayMult(levelNum) {
            if (!gameState.currentBattle || !gameState.currentBattle.isBoss) return 1;
            const today = new Date().toDateString();
            const farms = gameState.bossDailyFarms;
            if (!farms || farms.date !== today) return BOSS_FARM_MULT[0];
            const count = (farms.counts && farms.counts[levelNum]) || 0;
            return BOSS_FARM_MULT[Math.min(count, BOSS_FARM_MULT.length - 1)];
        }

        function recordBossClear(levelNum) {
            const today = new Date().toDateString();
            if (!gameState.bossDailyFarms || gameState.bossDailyFarms.date !== today) {
                gameState.bossDailyFarms = { date: today, counts: {} };
            }
            const c = gameState.bossDailyFarms.counts;
            c[levelNum] = (c[levelNum] || 0) + 1;
        }

        function isBossFirstEverClear(levelNum) {
            return !gameState.bossFirstClears[levelNum];
        }

        function markBossFirstClear(levelNum) {
            gameState.bossFirstClears[levelNum] = true;
        }

        // ===== QUEST SYSTEM =====
        const ELEMENTS = ['fire','water','grass','electric','dark'];

        const QUEST_POOL_DAILY = [
            { id:'win_streak',     label:'Win 3 battles in a row',               goal:3,  reward:{coins:300} },
            { id:'damage_500',     label:'Deal 500+ damage in one battle',        goal:1,  reward:{coins:200} },
            { id:'no_faint',       label:'Win without any creature fainting',     goal:1,  reward:{coins:250} },
            { id:'ability_x5',     label:'Use abilities 5 times',                 goal:5,  reward:{coins:150} },
            { id:'cascade_triple', label:'Trigger a triple cascade',              goal:1,  reward:{coins:200} },
            { id:'mono_team',      label:'Win with a same-element team',          goal:1,  reward:{coins:300} },
            { id:'catch_element',  label:'Catch 3 creatures',                     goal:3,  reward:{coins:250} },
            { id:'solo_creature',  label:'Win using only one creature',           goal:1,  reward:{coins:350} },
            { id:'win_5',          label:'Win 5 battles',                         goal:5,  reward:{coins:200} },
            { id:'boss_win',       label:'Defeat a boss',                         goal:1,  reward:{coins:400} },
            { id:'level_up',       label:'Level up a creature',                   goal:1,  reward:{coins:100} },
            { id:'all_hit',        label:'Have every party member attack and win',goal:1,  reward:{coins:350} },
            { id:'combo_2',        label:'Achieve a 2.0× combo multiplier',      goal:1,  reward:{coins:200} },
            { id:'under_3_turns',  label:'Defeat an enemy in 3 turns or fewer',  goal:1,  reward:{coins:300} },
        ];

        const QUEST_POOL_WEEKLY = [
            { id:'weekly_wins',        label:'Win 20 battles this week',               goal:20, reward:{gems:15} },
            { id:'catch_all_elements', label:'Catch one of every element this week',   goal:5,  reward:{gems:20} },
            { id:'all_bosses',         label:'Beat all 3 floor bosses this week',      goal:3,  reward:{gems:25} },
            { id:'evolve_one',         label:'Evolve a creature',                      goal:1,  reward:{gems:20} },
            { id:'synergy_wins',       label:'Win 5 battles with active team synergy', goal:5,  reward:{gems:15} },
        ];

        function questWeekKey() {
            const d = new Date(), jan1 = new Date(d.getFullYear(), 0, 1);
            return d.getFullYear() + '-W' + Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
        }

        function seededShuffle(arr, seed) {
            const a = arr.slice(); let s = (seed | 0) >>> 0;
            for (let i = a.length - 1; i > 0; i--) {
                s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
                const j = s % (i + 1); [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function refreshQuests() {
            const today = new Date().toDateString();
            const weekKey = questWeekKey();
            const q = gameState.quests;

            if (q.dailyDate !== today) {
                const seed = today.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
                const picked = seededShuffle(QUEST_POOL_DAILY, seed).slice(0, 3)
                    .map(t => ({ ...t, progress: 0, done: false, claimed: false, data: {} }));
                // Assign rotating element to catch_element quest
                const catchQ = picked.find(x => x.id === 'catch_element');
                if (catchQ) {
                    const el = ELEMENTS[seed % ELEMENTS.length];
                    catchQ.label = `Catch 3 ${el} creatures today`;
                    catchQ.data.element = el;
                }
                q.daily = picked;
                q.dailyDate = today;
            }

            if (q.weeklyDate !== weekKey) {
                const seed = weekKey.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
                const picked = seededShuffle(QUEST_POOL_WEEKLY, seed)[0];
                q.weekly = { ...picked, progress: 0, done: false, claimed: false, data: {} };
                q.weeklyDate = weekKey;
            }
        }

        function getAllActiveQuests() {
            const q = gameState.quests;
            return [...(q.daily || []), ...(q.weekly ? [q.weekly] : [])];
        }

        function advanceQuest(q, amount) {
            if (q.done || q.claimed || amount <= 0) return;
            q.progress = Math.min(q.goal, q.progress + amount);
            if (q.progress >= q.goal) q.done = true;
        }

        function claimQuest(questId) {
            const q = getAllActiveQuests().find(x => x.id === questId && x.done && !x.claimed);
            if (!q) return;
            q.claimed = true;
            if (q.reward.coins) gameState.coins = (gameState.coins || 0) + q.reward.coins;
            if (q.reward.gems)  gameState.gems  = (gameState.gems  || 0) + q.reward.gems;
            saveGameData();
            render();
        }

        function teamIsMonoElement(teamIds) {
            const els = teamIds.map(id => {
                const c = gameState.creatures.find(x => x.id === id);
                return c ? creatureDatabase[c.baseId].element : null;
            }).filter(Boolean);
            return els.length > 0 && new Set(els).size === 1;
        }

        function trackQuestEvent(eventName, payload) {
            refreshQuests();
            getAllActiveQuests().forEach(q => {
                if (q.claimed) return;
                switch (q.id) {
                    case 'win_streak':
                        if (eventName === 'battle_won' && !q.done)
                            { q.progress = Math.min(q.goal, payload.winStreak); if (q.progress >= q.goal) q.done = true; }
                        if (eventName === 'battle_lost' && !q.done) q.progress = 0;
                        break;
                    case 'damage_500':
                        if (eventName === 'battle_won' && payload.playerDamage >= 500) advanceQuest(q, 1); break;
                    case 'no_faint':
                        if (eventName === 'battle_won' && payload.allAlive) advanceQuest(q, 1); break;
                    case 'ability_x5':
                        if (eventName === 'ability_used') advanceQuest(q, 1); break;
                    case 'cascade_triple':
                        if (eventName === 'cascade' && payload.depth >= 3) advanceQuest(q, 1); break;
                    case 'mono_team':
                        if (eventName === 'battle_won' && payload.monoElement) advanceQuest(q, 1); break;
                    case 'catch_element':
                        if (eventName === 'creature_caught' && payload.element === q.data.element) advanceQuest(q, 1); break;
                    case 'solo_creature':
                        if (eventName === 'battle_won' && payload.switchCount === 0) advanceQuest(q, 1); break;
                    case 'win_5':
                        if (eventName === 'battle_won') advanceQuest(q, 1); break;
                    case 'boss_win':
                        if (eventName === 'battle_won' && payload.isBoss) advanceQuest(q, 1); break;
                    case 'level_up':
                        if (eventName === 'creature_leveled') advanceQuest(q, 1); break;
                    case 'all_hit':
                        if (eventName === 'battle_won' && payload.allMembersHit) advanceQuest(q, 1); break;
                    case 'combo_2':
                        if (eventName === 'combo' && payload.mult >= 2.0) advanceQuest(q, 1); break;
                    case 'under_3_turns':
                        if (eventName === 'battle_won' && payload.turnCount <= 3) advanceQuest(q, 1); break;
                    // Weekly
                    case 'weekly_wins':
                        if (eventName === 'battle_won') advanceQuest(q, 1); break;
                    case 'catch_all_elements':
                        if (eventName === 'creature_caught') {
                            if (!q.data.elements) q.data.elements = [];
                            if (!q.data.elements.includes(payload.element)) { q.data.elements.push(payload.element); advanceQuest(q, 1); }
                        } break;
                    case 'all_bosses':
                        if (eventName === 'battle_won' && payload.isBoss && payload.levelNum) {
                            if (!q.data.bosses) q.data.bosses = [];
                            if (!q.data.bosses.includes(payload.levelNum)) { q.data.bosses.push(payload.levelNum); advanceQuest(q, 1); }
                        } break;
                    case 'evolve_one':
                        if (eventName === 'creature_evolved') advanceQuest(q, 1); break;
                    case 'synergy_wins':
                        if (eventName === 'battle_won' && payload.hasSynergy) advanceQuest(q, 1); break;
                }
            });
        }

        function battleWon() {
            const battle = gameState.currentBattle;
            if (battle && battle.mode === 'tutorial') { tutorialBattleWon(battle); return; }
            const enemyName = creatureDatabase[battle.enemy.baseId].name;
            let result = { victory: true, caught: false, gathered: false, creatureName: enemyName, xp: 0, escaped: false };

            if (battle.mode === 'random') {
                // Wild battle: the ONLY way to recruit is pressing Gather and having it succeed
                // (handled in tryGather, which sets gatherSucceeded and ends the battle).
                // Defeating the creature never catches it.
                if (battle.gatherAttempted && battle.gatherSucceeded) {
                    result.gathered = true;
                    result.caught   = true;
                    result.gatherChance = battle.gatherChance;
                    result.gatheredRank = battle.gatheredRank;
                } else {
                    // Either no gather was attempted (player just won the fight) or the attempt failed.
                    result.escaped = true;
                    result.gatherAttempted = !!battle.gatherAttempted;
                    if (battle.gatherAttempted) {
                        result.gatherChance = battle.gatherChance;
                    }
                }
                // Generate a new wild encounter for the next battle
                rollWildEncounter();
                // Random mode does NOT advance the story level
            } else {
                // Story battle: no guaranteed catch. Progression only.
                // Only advance progression when clearing the current frontier level
                const isFrontier = battle.levelNumber === gameState.currentLevel;
                if (isFrontier) {
                    if (gameState.currentLevel < MAX_LEVEL) {
                        const prevFloor = floorOfLevel(gameState.currentLevel);
                        gameState.currentLevel++;
                        gameState.currentFloor = floorOfLevel(gameState.currentLevel);
                        gameState.mapFloor = gameState.currentFloor;
                        if (gameState.currentFloor > prevFloor) {
                            result.floorUnlocked = floorThemes[gameState.currentFloor].name;
                            // A boss was just cleared and a new floor opened — queue that floor's clear beat.
                            if (battle.isBoss && FLOOR_STORY[prevFloor]) result.storyClearFloor = prevFloor;
                        }
                    } else {
                        gameState.storyComplete = true;
                        // Final boss (floor 3) cleared — queue the story finale.
                        if (battle.isBoss && FLOOR_STORY[3]) result.storyClearFloor = 3;
                    }
                } else {
                    result.replay = true;
                }
            }

            // Boss replay tracking — must happen before reward calculations
            const levelNum = battle.levelNumber;
            const replayMult = battle.isBoss ? getBossReplayMult(levelNum) : 1;
            const isFirstEverClear = battle.isBoss ? isBossFirstEverClear(levelNum) : false;
            if (battle.isBoss) {
                recordBossClear(levelNum);
                if (isFirstEverClear) markBossFirstClear(levelNum);
            }

            // Boss fights never award the boss creature — story progression only.

            // Reward scaling by lineup size: a 3-enemy fight should pay more than a 1-enemy fight.
            // factor = 0.6 + 0.4 × count  → 1 enemy=1.0×, 2=1.4×, 3=1.8×, 4=2.2×
            const enemyCount = (battle.enemyTeam && battle.enemyTeam.length) || 1;
            const lineupMult = 0.6 + 0.4 * enemyCount;

            // Award creature XP — diminished on boss replays, boosted by training minor + mentor major + XP Surge
            const baseXP = Math.round((20 + battle.enemy.level * 6) * (battle.isBoss ? 2 : 1) * lineupMult);
            const xpSurgeActive = (gameState.xpSurge || 0) > 0;
            const creatureXP = Math.round(baseXP * replayMult * skillXpMult() * (hasTalent('mentor') ? 1.20 : 1) * (xpSurgeActive ? 2 : 1));
            if (xpSurgeActive) { gameState.xpSurge--; result.xpSurgeUsed = true; }
            result.creatureXP = creatureXP;
            result.leveledUp = grantCreatureXP(battle.teamIds, creatureXP, battle.enemy.level);

            // Award coins — diminished on boss replays, boosted by prosperity minor + treasure hunter major + Coin Surge
            // First story battle (tutorial phase 3) gets a fixed 100 coins so the player has something to spend in the shop tour.
            const isTutorialFirstStory = gameState.tutorial && !gameState.tutorial.isComplete
                && gameState.tutorial.currentPhase === 3 && battle.levelNumber === 1;
            const baseCoins = isTutorialFirstStory ? 100 : Math.round((50 + battle.enemy.level * 10) * (battle.isBoss ? 2 : 1) * lineupMult);
            const coinSurgeActive = (gameState.coinSurge || 0) > 0;
            const coinsEarned = isTutorialFirstStory ? 100 : Math.round(baseCoins * replayMult * skillCoinMult() * (hasTalent('treasure_hunter') ? 1.15 : 1) * (coinSurgeActive ? 2 : 1));
            if (coinSurgeActive) { gameState.coinSurge--; result.coinSurgeUsed = true; }
            gameState.coins = (gameState.coins || 0) + coinsEarned;
            result.coinsEarned = coinsEarned;
            result.replayMult = replayMult; // passed to UI so it can show a note when diminished
            result.isBoss = battle.isBoss;  // flag to distinguish boss from regular battles in UI

            // Award gems — bosses: first clear only (permanent). Any battle: 5% lucky drop.
            let gemsEarned = 0;
            let gemSource = null;
            if (battle.isBoss && isFirstEverClear) {
                gemsEarned += 10;
                gemSource = 'firstClear';
            }
            if (Math.random() < 0.05) {
                gemsEarned += Math.floor(Math.random() * 6) + 5;
                gemSource = gemSource || 'luck';
            }
            if (gemsEarned > 0) {
                gameState.gems = (gameState.gems || 0) + gemsEarned;
                result.gemsEarned = gemsEarned;
                result.gemSource = gemSource;
            }

            checkAchievements();

            // Update win streak and fire quest events
            gameState.winStreak = (gameState.winStreak || 0) + 1;
            trackQuestEvent('battle_won', {
                isBoss: battle.isBoss,
                playerDamage: battle.playerDamage,
                winStreak: gameState.winStreak,
                allAlive: battle.teamIds.every(id => battle.hp[id] > 0),
                monoElement: teamIsMonoElement(battle.teamIds),
                switchCount: battle.switchCount || 0,
                allMembersHit: (battle.membersHitSet || []).length >= battle.teamIds.length,
                turnCount: battle.turnCount || 0,
                levelNum: battle.levelNumber,
                hasSynergy: battle.synergy && battle.synergy.list.length > 0
            });

            // Snapshot team condition before wiping battle state
            result.teamSnapshot = battle.teamIds.map(id => {
                const c = gameState.creatures.find(x => x.id === id);
                if (!c) return null;
                let maxHp = getCreatureStats(c).hp;
                if (hasTalent('resilience')) maxHp = Math.round(maxHp * 1.10);
                const hp = Math.max(0, battle.hp[id] || 0);
                const cap = levelCapOf(c);
                const xpNeeded = c.level >= cap ? 0 : creatureXpNeeded(c.level);
                const xp = c.xp || 0;
                return {
                    creatureId: id,
                    baseId: c.baseId,
                    name: formName(c.baseId, c.mergeLevel, evoTierOf(c)),
                    level: c.level,
                    hp,
                    maxHp,
                    survived: hp > 0,
                    tier: evoTierOf(c),
                    xp,
                    xpNeeded,
                    levelCap: cap
                };
            }).filter(Boolean);
            result.playerDamage    = battle.playerDamage || 0;
            result.turnCount       = battle.turnCount || 0;
            result.winStreak       = gameState.winStreak;
            result.mode            = battle.mode;
            result.isBossFirstClear = !!(battle.isBoss && isFirstEverClear);

            gameState.lastBattleResult = result;
            gameState.currentBattle = null;
            gameState.matchBoard = null;
            gameState.currentScreen = 'battleResult';
            saveGameData();
            render();
        }

        // Adds XP to each creature in ids, leveling them up. Returns names that leveled up.
        // Level-relative XP multiplier. diff = enemyLevel - creatureLevel.
        //   same level         → 1.00 (100%)
        //   enemy higher        → bonus, +20% per level, capped at 2.00 (200%)
        //   creature higher     → penalty, −20% per level, floored at 0.10 (10%)
        const XP_GAP_SLOPE = 0.20, XP_GAP_FLOOR = 0.10, XP_GAP_CAP = 2.00;
        function xpGapMultiplier(creatureLevel, enemyLevel) {
            const diff = (enemyLevel || creatureLevel) - creatureLevel;
            const mult = 1 + diff * XP_GAP_SLOPE;
            return Math.max(XP_GAP_FLOOR, Math.min(XP_GAP_CAP, mult));
        }

        // Grants XP to each creature in `ids`. If `enemyLevel` is provided, each creature's award
        // is scaled by its own level gap to the enemy (see xpGapMultiplier); otherwise the flat
        // `amount` is applied to all (used by callers that don't have a meaningful enemy level).
        function grantCreatureXP(ids, amount, enemyLevel) {
            const leveled = [];
            let triggerAbilityOrient = false;
            ids.forEach(id => {
                const c = gameState.creatures.find(x => x.id === id);
                if (!c) return;
                const prevLevel = c.level;
                const gained = enemyLevel != null
                    ? Math.max(1, Math.round(amount * xpGapMultiplier(c.level, enemyLevel)))
                    : amount;
                c.xp = (c.xp || 0) + gained;
                let didLevel = false;
                const cap = levelCapOf(c);
                while (c.level < cap && c.xp >= creatureXpNeeded(c.level)) {
                    c.xp -= creatureXpNeeded(c.level);
                    c.level++;
                    didLevel = true;
                }
                if (c.level >= cap) c.xp = 0; // hold at the cap until evolved (or true max)
                if (didLevel) {
                    trackQuestEvent('creature_leveled', {});
                    leveled.push(`${evolvedName(c.baseId, evoTierOf(c))}${'+'.repeat(c.mergeLevel)} → Lv${c.level}`);

                    // First time any creature crosses from below Lv2 to Lv2+: queue the ability tutorial.
                    // Only fires in battle (so the ability buttons are actually on screen) and only once ever.
                    const t = gameState.tutorial;
                    const alreadySeen = t && t.narrativeShown && t.narrativeShown.abilityOrient;
                    if (!alreadySeen && prevLevel < ABILITY_UNLOCK_LV[1] && c.level >= ABILITY_UNLOCK_LV[1]
                            && gameState.currentScreen === 'battleMode') {
                        triggerAbilityOrient = true;
                    }
                }
                if (canEvolve(c)) leveled.push(`${evolvedName(c.baseId, evoTierOf(c))} can evolve!`);
            });

            // Fire the overlay after XP is fully applied so the button state is up to date.
            if (triggerAbilityOrient) {
                const t = gameState.tutorial;
                if (t && t.narrativeShown) t.narrativeShown.abilityOrient = true;
                saveGameData();
                // Defer one frame so updateBattlePanel() has refreshed the ability buttons first.
                requestAnimationFrame(() => showAbilityOrientation());
            }

            return leveled;
        }

        // Mount an overlay's HTML without wiping the canvas/HUD from the page
        function mountOverlay(html) {
            const temp = document.createElement('div');
            temp.innerHTML = html.trim();
            const overlay = temp.firstElementChild;
            document.body.appendChild(overlay);
        }

        function addToTeam(creatureId) {
            if (gameState.team.includes(creatureId)) return;
            const slot = gameState.team.indexOf(null);
            if (slot === -1) return; // team full
            gameState.team[slot] = creatureId;
            saveGameData();
            render();
        }

        function removeFromTeam(creatureId) {
            const slot = gameState.team.indexOf(creatureId);
            if (slot !== -1) gameState.team[slot] = null;
            saveGameData();
            render();
        }

        // Place a creature into a specific team slot.
        // - If the creature is already in that slot: remove it (toggle off).
        // - If the creature is elsewhere on the team and the slot is occupied: swap the two.
        // - If the creature is elsewhere on the team and the slot is empty: move it.
        // - If the creature is not on the team and the slot is empty: assign it.
        // - If the creature is not on the team and the slot is occupied: replace the occupant.
        function setTeamSlot(creatureId, slotIdx) {
            const currentSlot  = gameState.team.indexOf(creatureId);
            const slotOccupant = gameState.team[slotIdx];

            if (slotOccupant === creatureId) {
                // Clicking own current slot — toggle off
                gameState.team[slotIdx] = null;
            } else {
                // Clear creature from its current slot first
                if (currentSlot !== -1) {
                    // Swap occupant into creature's old slot (or null out if slot was empty)
                    gameState.team[currentSlot] = slotOccupant;
                }
                gameState.team[slotIdx] = creatureId;
            }

            saveGameData();
            render();
        }

        // Multi-select picker for feeding creatures into a keeper. Selection state lives here.
        let _mergeSelection = new Set();
        function renderMergePicker(keeperId) {
            const keeper = gameState.creatures.find(c => c.id === keeperId);
            if (!keeper) return;
            _mergeSelection = new Set(); // reset each time the picker opens
            _drawMergePicker(keeperId);
        }

        function toggleMergeFodder(id) {
            if (_mergeSelection.has(id)) _mergeSelection.delete(id);
            else _mergeSelection.add(id);
            // re-derive keeper from the open picker via a data attribute
            const host = document.querySelector('.merge-picker-overlay');
            if (host) _drawMergePicker(+host.getAttribute('data-keeper'));
        }

        function _drawMergePicker(keeperId) {
            document.querySelectorAll('.merge-picker-overlay').forEach(e => e.remove());
            const keeper = gameState.creatures.find(c => c.id === keeperId);
            if (!keeper) return;
            const base = creatureDatabase[keeper.baseId];
            const fodder = mergeFodderFor(keeper);
            const req = mergeReqFor(keeper);
            const prog = keeper.mergeProgress || 0;
            const selCount = _mergeSelection.size;

            // Project the resulting progress/tier after feeding the selection.
            let projProg = prog + selCount, projLevel = keeper.mergeLevel, projReq = req, tiersGained = 0;
            while (projReq != null && projProg >= projReq) {
                projProg -= projReq; projLevel++; tiersGained++;
                projReq = (projLevel >= MAX_MERGE) ? null
                    : (MERGE_REQ[base.rarity] || MERGE_REQ.common) * (projLevel + 1);
            }
            if (projReq == null) projProg = 0;
            const projForm = formName(keeper.baseId, projLevel, evoTierOf(keeper));
            const projPct = projReq ? Math.min(100, Math.round(projProg / projReq * 100)) : 100;

            const cards = fodder.map(f => {
                const sel = _mergeSelection.has(f.id);
                const onTeam = gameState.team.includes(f.id);
                return `
                    <div onclick="toggleMergeFodder(${f.id})" style="display:flex; align-items:center; gap:10px; padding:8px 10px; margin-bottom:6px; border-radius:8px; cursor:pointer;
                                background:${sel ? '#3a2a12' : '#1a1a2e'}; border:${sel ? '2px solid #e67e22' : '1px solid #333'};">
                        ${spriteImg(f.baseId, 36, '', evoTierOf(f))}
                        <div style="flex:1;">
                            <div style="font-size:13px; font-weight:bold;"><span style="display:inline-block; min-width:16px; text-align:center; padding:0 4px; border-radius:4px; background:${rankColor(rankFromRoll(f.statRoll))}; color:#111; font-size:10px; margin-right:5px;">${rankFromRoll(f.statRoll)}</span>${formName(f.baseId, f.mergeLevel, evoTierOf(f))} <span style="color:#888; font-weight:normal;">Lv${f.level}</span></div>
                            ${onTeam ? '<div style="font-size:10px; color:#e74c3c;">On your team — will be removed</div>' : ''}
                        </div>
                        <div style="font-size:18px; color:${sel ? '#e67e22' : '#444'};">${sel ? '☑' : '☐'}</div>
                    </div>`;
            }).join('');

            const confirmEnabled = selCount > 0;
            const html = `
                <div class="ui-overlay merge-picker-overlay" data-keeper="${keeperId}" style="background:rgba(8,10,20,0.9);">
                    <div class="ui-panel" style="border-color:#e67e22;">
                        <div style="text-align:center; margin-bottom:10px;">
                            <div style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#e67e22; font-weight:bold;">Feed to merge</div>
                            <div style="font-size:18px; font-weight:bold; margin-top:2px;"><span style="display:inline-block; min-width:18px; text-align:center; padding:1px 6px; border-radius:5px; background:${rankColor(rankFromRoll(keeper.statRoll))}; color:#111; font-size:13px; margin-right:6px;">${rankFromRoll(keeper.statRoll)}</span>${formName(keeper.baseId, keeper.mergeLevel, evoTierOf(keeper))}</div>
                            <div style="font-size:10px; color:#888; margin-top:3px;">Keeps its own rank — fed creatures' ranks don't carry over</div>
                        </div>

                        <div style="background:#111; border-radius:8px; padding:10px 12px; margin-bottom:12px;">
                            <div style="font-size:12px; color:#ccc; margin-bottom:6px;">After feeding ${selCount}: <strong style="color:#e67e22;">${projForm}</strong>${tiersGained > 0 ? ` <span style="color:#7bed9f;">(+${tiersGained} tier${tiersGained > 1 ? 's' : ''}!)</span>` : ''}</div>
                            <div style="background:#222; border-radius:4px; height:10px; overflow:hidden;">
                                <div style="background:linear-gradient(90deg,#e67e22,#f1c40f); height:100%; width:${projPct}%; transition:width 0.2s;"></div>
                            </div>
                            <div style="font-size:10px; color:#555; margin-top:3px; text-align:right;">${projReq ? projProg + ' / ' + projReq : 'MAX'}</div>
                        </div>

                        <div style="max-height:40vh; overflow-y:auto; margin-bottom:12px;">
                            ${cards || '<div style="font-size:12px; color:#666; text-align:center; padding:12px;">No eligible creatures.</div>'}
                        </div>

                        <button onclick="confirmMerge(${keeperId})" ${confirmEnabled ? '' : 'disabled'} style="width:100%; margin:0 0 8px; padding:12px; font-weight:bold; background:${confirmEnabled ? '#e67e22' : '#333'}; color:${confirmEnabled ? '#1a1a2e' : '#666'};">Feed ${selCount} creature${selCount === 1 ? '' : 's'}</button>
                        <button onclick="document.querySelectorAll('.merge-picker-overlay').forEach(e=>e.remove());" style="width:100%; margin:0;">Cancel</button>
                    </div>
                </div>`;
            mountOverlay(html);
        }

            const glow = q.done && !q.claimed ? 'border-color:#7bed9f; box-shadow:0 0 6px #7bed9f44;' : '';
