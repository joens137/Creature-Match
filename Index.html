        function spawnCascadeVfx(cx, cy, boardW, el, level) {
            if (!canvas) return;
            const pal = VFX_PAL[el] || VFX_PAL.fire;
            const count = 10 + level * 5;
            const fx = {
                kind: 'cascadeNova', el, level,
                startAt: performance.now(), dur: 650 + level * 100,
                cX: cx, cY: cy, cS: boardW * 0.58,
                tX: cx, tY: cy, tS: boardW * 0.58,
                parts: []
            };
            for (let i = 0; i < count; i++) {
                fx.parts.push({
                    ang: (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4,
                    spd: 0.5 + Math.random() * 1.0, sz: 0.5 + Math.random() * 0.9,
                    off: (Math.random() - 0.5), ph: Math.random(), delay: 0,
                    star: Math.random() > 0.55  // some particles are star-shaped
                });
            }
            BR.vfx.push(fx);
            if (BR.vfx.length > 10) BR.vfx.shift();
            // Screen shake — escalates with cascade level
            const shakeI = level >= 3 ? 9 : level >= 2 ? 6 : 3.5;
            const shakeDur = level >= 3 ? 380 : level >= 2 ? 280 : 180;
            triggerShake(shakeI, shakeDur);
        }

        function spawnVfx(baseId, slot, casterSide) {
            if (!canvas || !BR.player) return;
            let L; try { L = battleLayouts(); } catch (e) { return; }
            const spec = (VFX_SPECS[baseId] || {})[slot === 1 ? 'a1' : 'a2'];
            if (!spec) return;
            const caster = casterSide === 'player' ? L.pSprite : L.aiSprite;
            const target = casterSide === 'player' ? L.aiSprite : L.pSprite;
            const fx = {
                kind: spec.kind, el: spec.el, shape: spec.shape || 'orb',
                count: spec.count || 14, width: spec.width || 4, nova: !!spec.nova,
                startAt: performance.now(), dur: spec.dur || 880,
                cX: caster.cx, cY: caster.cy, cS: caster.size,
                tX: target.cx, tY: target.cy, tS: target.size,
                parts: []
            };
            for (let i = 0; i < fx.count; i++) {
                fx.parts.push({
                    ang: (i / fx.count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5,
                    spd: 0.55 + Math.random() * 0.85,
                    sz: 0.55 + Math.random() * 0.9,
                    off: (Math.random() - 0.5),
                    ph: Math.random(),
                    delay: Math.random() * 0.25
                });
            }
            BR.vfx.push(fx);
            if (BR.vfx.length > 6) BR.vfx.shift();
        }

        function glowDot(x, y, r, color, alpha) {
            if (r <= 0) return;
            ctx.globalAlpha = alpha;
            const g = ctx.createRadialGradient(x, y, 0, x, y, r);
            g.addColorStop(0, color); g.addColorStop(0.5, color); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
        }
        function starPath(cx, cy, outer, inner, points, rot) {
            ctx.beginPath();
            for (let i = 0; i < points * 2; i++) {
                const r = i % 2 ? inner : outer, a = rot + i * Math.PI / points;
                const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            }
            ctx.closePath();
        }
        // draw a small shaped particle at (x,y)
        function vfxParticle(shape, x, y, r, ang, color, glow) {
            ctx.save();
            ctx.shadowColor = glow; ctx.shadowBlur = r * 1.6; ctx.fillStyle = color;
            ctx.translate(x, y); ctx.rotate(ang);
            if (shape === 'shard') { ctx.beginPath(); ctx.moveTo(0, -r * 1.5); ctx.lineTo(r * 0.6, 0); ctx.lineTo(0, r * 1.5); ctx.lineTo(-r * 0.6, 0); ctx.closePath(); ctx.fill(); }
            else if (shape === 'leaf') { ctx.beginPath(); ctx.ellipse(0, 0, r * 0.6, r * 1.3, 0, 0, Math.PI * 2); ctx.fill(); }
            else if (shape === 'wisp') { ctx.globalAlpha = 0.85; ctx.beginPath(); ctx.ellipse(0, 0, r * 0.9, r * 1.2, 0, 0, Math.PI * 2); ctx.fill(); }
            else { ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); }
            ctx.restore();
        }

        function drawVfx(now) {
            if (!BR.vfx || !BR.vfx.length) return;
            BR.vfx = BR.vfx.filter(fx => now - fx.startAt < fx.dur);
            for (const fx of BR.vfx) {
                const t = Math.max(0, Math.min(1, (now - fx.startAt) / fx.dur));
                const pal = VFX_PAL[fx.el] || VFX_PAL.fire;
                ctx.save();
                ({
                    projectile: paintProjectile, beam: paintBeam, rain: paintRain,
                    nova: paintNova, aura: paintAura, sparkle: paintSparkle,
                    barrier: paintBarrier, spin: paintSpin,
                    cascadeNova: paintCascadeNova, impact: paintImpact
                }[fx.kind] || (() => {}))(fx, t, pal);
                ctx.restore();
            }
        }

        // ---- painters ----
        function paintProjectile(fx, t, pal) {
            const travel = 0.40;
            if (t < travel) {
                const tt = easeOut(t / travel);
                const x = lerp(fx.cX, fx.tX, tt), y = lerp(fx.cY, fx.tY, tt);
                const r = fx.tS * 0.15;
                const ang = Math.atan2(fx.tY - fx.cY, fx.tX - fx.cX);
                // elongated motion trail — 6 ghost dots
                for (let k = 1; k <= 6; k++) {
                    const bt = Math.max(0, tt - k * 0.06);
                    const fade = (1 - k / 7) * 0.55;
                    glowDot(lerp(fx.cX, fx.tX, bt), lerp(fx.cY, fx.tY, bt), r * (1 - k * 0.12), pal.glow, fade);
                }
                // bright leading particle
                glowDot(x, y, r * 2.0, pal.glow, 0.75);
                vfxParticle(fx.shape, x, y, r, ang + t * 8, pal.b, pal.glow);
                // caster charge glow fades as orb launches
                glowDot(fx.cX, fx.cY, fx.cS * 0.18 * (1 - tt), pal.a, (1 - tt) * 0.5);
            } else {
                const bt = (t - travel) / (1 - travel);
                // central impact flash
                const flashR = fx.tS * (0.35 + bt * 0.55);
                glowDot(fx.tX, fx.tY, flashR, pal.glow, (1 - bt) * 0.7);
                // star-burst impact
                if (bt < 0.3) {
                    ctx.save(); ctx.globalAlpha = (1 - bt / 0.3) * 0.9;
                    ctx.fillStyle = pal.b; ctx.shadowColor = pal.glow; ctx.shadowBlur = 12;
                    starPath(fx.tX, fx.tY, fx.tS * 0.22 * (1 - bt), fx.tS * 0.09 * (1 - bt), 6, bt * 2);
                    ctx.fill(); ctx.restore();
                }
                // scatter particles
                fx.parts.forEach(p => {
                    const d = easeOut(bt) * fx.tS * 1.05 * p.spd;
                    const x = fx.tX + Math.cos(p.ang) * d, y = fx.tY + Math.sin(p.ang) * d;
                    vfxParticle(fx.shape, x, y, fx.tS * 0.075 * p.sz * (1 - bt), p.ang + bt * 5, p.ph > 0.5 ? pal.a : pal.b, pal.glow);
                });
                if (fx.nova) novaRing(fx.tX, fx.tY, bt, fx.tS, pal);
            }
        }

        function paintBeam(fx, t, pal) {
            if (t < 0.15) {
                // charge-up glow at caster
                glowDot(fx.cX, fx.cY, fx.cS * 0.35 * (t / 0.15), pal.b, 0.85);
                return;
            }
            if (t < 0.65) {
                const flick = 0.6 + Math.random() * 0.4;
                const segs = 11;
                // outer arc (wide, faint)
                for (let strand = 0; strand < 3; strand++) {
                    const w = strand === 0 ? fx.width * 1.8 : strand === 1 ? fx.width : fx.width * 0.45;
                    const wiggle = strand === 2 ? 6 : 22;
                    ctx.beginPath(); ctx.moveTo(fx.cX, fx.cY);
                    for (let i = 1; i <= segs; i++) {
                        const f = i / segs;
                        const bx = lerp(fx.cX, fx.tX, f) + (Math.random() - 0.5) * wiggle * Math.sin(f * Math.PI);
                        const by = lerp(fx.cY, fx.tY, f) + (Math.random() - 0.5) * wiggle * Math.sin(f * Math.PI);
                        ctx.lineTo(bx, by);
                    }
                    ctx.strokeStyle = strand === 1 ? pal.b : strand === 2 ? '#fff' : pal.a;
                    ctx.lineWidth = w; ctx.globalAlpha = strand === 0 ? flick * 0.28 : flick * (strand === 2 ? 0.9 : 0.85);
                    ctx.shadowColor = pal.glow; ctx.shadowBlur = strand === 2 ? 6 : 16;
                    ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;
                // ongoing impact glow at target
                glowDot(fx.tX, fx.tY, fx.tS * 0.32, pal.glow, 0.65);
                // sparks at impact point
                if (Math.random() < 0.6) {
                    const sa = Math.random() * Math.PI * 2;
                    const sr = fx.tS * 0.25;
                    vfxParticle('shard', fx.tX + Math.cos(sa) * sr, fx.tY + Math.sin(sa) * sr, fx.tS * 0.04, sa, pal.b, pal.glow);
                }
            } else {
                const bt = (t - 0.65) / 0.35;
                const e = easeOut(bt);
                fx.parts.forEach(p => {
                    const d = e * fx.tS * 0.85 * p.spd;
                    vfxParticle('shard', fx.tX + Math.cos(p.ang) * d, fx.tY + Math.sin(p.ang) * d, fx.tS * 0.07 * p.sz * (1 - bt), p.ang, pal.b, pal.glow);
                });
                if (fx.nova) novaRing(fx.tX, fx.tY, bt, fx.tS, pal);
            }
        }

        function paintRain(fx, t, pal) {
            const fall = 0.6, topY = fx.tY - fx.tS * 2.6;
            fx.parts.forEach((p, i) => {
                const start = p.delay, ft = (t - start) / fall;
                if (ft < 0 || ft > 1) return;
                const e = easeOut(ft);
                const x = fx.tX + p.off * fx.tS * 1.2;
                const y = lerp(topY, fx.tY, e);
                // elongated drop trail
                glowDot(x, y - fx.tS * 0.15, fx.tS * 0.10, pal.glow, 0.35);
                vfxParticle(fx.shape, x, y, fx.tS * 0.135 * p.sz, p.ang + t * 5, pal.b, pal.glow);
            });
            if (t > 0.45) {
                const bt = (t - 0.45) / 0.55;
                glowDot(fx.tX, fx.tY, fx.tS * (0.32 + bt * 0.65), pal.glow, (1 - bt) * 0.65);
                if (fx.nova) novaRing(fx.tX, fx.tY, bt, fx.tS, pal);
            }
        }

        function paintNova(fx, t, pal) {
            // Two rings offset slightly for depth
            novaRing(fx.tX, fx.tY, t, fx.tS, pal);
            novaRing(fx.tX, fx.tY, Math.max(0, t - 0.08), fx.tS * 0.72, pal);
            // central flash at start
            if (t < 0.25) glowDot(fx.tX, fx.tY, fx.tS * 0.45 * (1 - t / 0.25), pal.b, (1 - t / 0.25) * 0.8);
            const e = easeOut(t);
            fx.parts.forEach(p => {
                const d = e * fx.tS * p.spd;
                const shape = p.star ? 'shard' : fx.shape;
                vfxParticle(shape, fx.tX + Math.cos(p.ang) * d, fx.tY + Math.sin(p.ang) * d,
                    fx.tS * 0.092 * p.sz * (1 - t), p.ang + t * 3, p.ph > 0.5 ? pal.a : pal.b, pal.glow);
            });
        }

        function novaRing(x, y, t, size, pal) {
            const r = size * (0.18 + easeOut(t) * 1.05);
            ctx.globalAlpha = (1 - t) * 0.9; ctx.strokeStyle = pal.b;
            ctx.lineWidth = size * 0.065 * (1 - t) + 1.2;
            ctx.shadowColor = pal.glow; ctx.shadowBlur = 14;
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0; ctx.globalAlpha = 1;
        }

        function paintAura(fx, t, pal) {
            const baseY = fx.cY + fx.cS * 0.45;
            const env = t < 0.5 ? t / 0.5 : 1 - (t - 0.5) / 0.5;
            // pulsing ellipse under caster
            ctx.globalAlpha = env * 0.85; ctx.strokeStyle = pal.b; ctx.lineWidth = 3.5;
            ctx.shadowColor = pal.glow; ctx.shadowBlur = 16;
            ctx.beginPath(); ctx.ellipse(fx.cX, baseY, fx.cS * 0.52 * (0.6 + t * 0.5), fx.cS * 0.15, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            // rising particles
            fx.parts.forEach(p => {
                const pt = (t + p.ph) % 1;
                const y = baseY - pt * fx.cS * 1.45;
                const x = fx.cX + Math.sin(pt * 7 + p.ph * 6) * fx.cS * 0.34 * (p.off * 2);
                glowDot(x, y, fx.cS * 0.075 * p.sz * (1 - pt), pal.a, (1 - pt) * 0.95);
            });
            // outer glow pulse
            glowDot(fx.cX, baseY - fx.cS * 0.5, fx.cS * 0.2 * env, pal.b, env * 0.4);
        }

        function paintSparkle(fx, t, pal) {
            const heal = '#7CFFA0';
            fx.parts.forEach(p => {
                const pt = (t + p.ph) % 1;
                const y = fx.cY + fx.cS * 0.5 - pt * fx.cS * 1.25;
                const x = fx.cX + Math.sin(pt * 4 + p.ph * 7) * fx.cS * 0.42 * (p.off * 2);
                const r = fx.cS * 0.055 * p.sz * (1 - pt * 0.55);
                if (p.ph > 0.55) {
                    ctx.globalAlpha = (1 - pt) * 0.95; ctx.strokeStyle = heal; ctx.lineWidth = r;
                    ctx.shadowColor = heal; ctx.shadowBlur = 10; ctx.beginPath();
                    ctx.moveTo(x - r * 1.4, y); ctx.lineTo(x + r * 1.4, y);
                    ctx.moveTo(x, y - r * 1.4); ctx.lineTo(x, y + r * 1.4); ctx.stroke();
                    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
                } else { glowDot(x, y, r * 1.8, p.ph > 0.28 ? heal : pal.b, (1 - pt) * 0.95); }
            });
        }

        function paintBarrier(fx, t, pal) {
            const grow = t < 0.22 ? t / 0.22 : 1;
            const fade = t > 0.72 ? 1 - (t - 0.72) / 0.28 : 1;
            const R = fx.cS * 0.64 * grow;
            ctx.translate(fx.cX, fx.cY);
            ctx.globalAlpha = fade * 0.92; ctx.shadowColor = pal.glow; ctx.shadowBlur = 18;
            // double hexagon shell
            for (const r of [R, R * 0.84]) {
                ctx.strokeStyle = r === R ? pal.b : pal.a; ctx.lineWidth = r === R ? 3 : 1.5;
                starPath(0, 0, r, r, 6, Math.PI / 6 + t * 0.65); ctx.stroke();
            }
            ctx.globalAlpha = fade * 0.18; ctx.fillStyle = pal.a;
            starPath(0, 0, R, R, 6, Math.PI / 6 + t * 0.65); ctx.fill();
            // two shimmer nodes orbiting
            ctx.globalAlpha = fade * 0.95; ctx.shadowBlur = 12;
            for (let k = 0; k < 2; k++) {
                const sa = t * Math.PI * 3 + k * Math.PI;
                glowDot(Math.cos(sa) * R, Math.sin(sa) * R, fx.cS * 0.11, pal.b, fade);
            }
            ctx.shadowBlur = 0; ctx.globalAlpha = 1;
        }

        function paintSpin(fx, t, pal) {
            const cx = fx.tX, cy = fx.tY - fx.tS * 0.5;
            const fade = t > 0.68 ? 1 - (t - 0.68) / 0.32 : 1;
            const n = 5, R = fx.tS * 0.38;
            for (let i = 0; i < n; i++) {
                const a = t * Math.PI * 4.5 + i * (Math.PI * 2 / n);
                const x = cx + Math.cos(a) * R, y = cy + Math.sin(a) * R * 0.46;
                ctx.globalAlpha = fade * 0.95; ctx.fillStyle = i % 2 ? pal.b : pal.a;
                ctx.shadowColor = pal.glow; ctx.shadowBlur = 9;
                starPath(x, y, fx.tS * 0.11, fx.tS * 0.045, 4, a + t * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }
            // central spin glow
            ctx.globalAlpha = fade * 0.55; glowDot(cx, cy, fx.tS * 0.22, pal.glow, fade * 0.55);
            ctx.globalAlpha = 1;
        }

        function paintCascadeNova(fx, t, pal) {
            // Centre flash at start
            if (t < 0.18) {
                glowDot(fx.cX, fx.cY, fx.cS * 0.55 * (1 - t / 0.18), pal.b, (1 - t / 0.18) * 0.85);
            }
            // Rings that stagger-out — one per cascade level, up to 3
            const rings = 1 + Math.min(fx.level, 2);
            for (let k = 0; k < rings; k++) {
                const offset = k * 0.14;
                const rt = Math.max(0, Math.min(1, (t - offset) / (1 - offset)));
                if (rt <= 0) continue;
                novaRing(fx.cX, fx.cY, rt, fx.cS * (0.7 + k * 0.22), pal);
            }
            // Scatter shards — some star-shaped for flair
            const e = easeOut(t);
            fx.parts.forEach(p => {
                const d = e * fx.cS * 0.95 * p.spd;
                const x = fx.cX + Math.cos(p.ang) * d, y = fx.cY + Math.sin(p.ang) * d;
                const r = fx.cS * 0.076 * p.sz * (1 - t);
                if (p.star) {
                    ctx.save(); ctx.globalAlpha = (1 - t) * 0.9; ctx.fillStyle = pal.b;
                    ctx.shadowColor = pal.glow; ctx.shadowBlur = 8;
                    starPath(x, y, r * 1.4, r * 0.55, 4, p.ang + t * 3); ctx.fill(); ctx.restore();
                } else {
                    vfxParticle('shard', x, y, r, p.ang, p.ph > 0.5 ? pal.a : pal.b, pal.glow);
                }
            });
        }

        // New: shockwave + spark burst on direct hit
        function paintImpact(fx, t, pal) {
            // Shockwave ring — expands fast, fades
            const ring = easeOut(t);
            const r = fx.tS * (0.12 + ring * 0.82);
            ctx.globalAlpha = Math.pow(1 - t, 1.4) * 0.95;
            ctx.strokeStyle = pal.b; ctx.lineWidth = fx.tS * 0.055 * (1 - t) + 1.2;
            ctx.shadowColor = pal.glow; ctx.shadowBlur = 16;
            ctx.beginPath(); ctx.arc(fx.tX, fx.tY, r, 0, Math.PI * 2); ctx.stroke();
            ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            // Bright central flash — only first 30% of duration
            if (t < 0.30) {
                const ft = t / 0.30;
                glowDot(fx.tX, fx.tY, fx.tS * 0.42 * (1 - ft), pal.b, (1 - ft) * 0.9);
                // inner white hotspot
                ctx.globalAlpha = (1 - ft) * 0.7; ctx.fillStyle = '#fff';
                ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(fx.tX, fx.tY, fx.tS * 0.12 * (1 - ft), 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            }
            // Spark particles scatter outward
            const e = easeOut(t);
            fx.parts.forEach(p => {
                const d = e * fx.tS * 0.62 * p.spd;
                vfxParticle(fx.shape, fx.tX + Math.cos(p.ang) * d, fx.tY + Math.sin(p.ang) * d,
                    fx.tS * 0.062 * p.sz * (1 - t), p.ang + t * 6, p.ph > 0.5 ? pal.a : pal.b, pal.glow);
            });
        }

        // ===== FLOOR BATTLE BACKGROUNDS =====
        // Determine which floor's environment to render for the current battle.
        function battleFloor() {
            const b = gameState.currentBattle;
            if (!b) return 1;
            if (b.levelNumber) return Math.min(3, Math.max(1, floorOfLevel(b.levelNumber)));
            // wild battles: match the enemy's element to a fitting domain, else use progress
            const el = creatureDatabase[b.enemy.baseId] ? creatureDatabase[b.enemy.baseId].element : null;
            const byEl = { grass: 1, water: 2, fire: 3, electric: 'electric', dark: 'dark' };
            return byEl[el] || Math.min(3, Math.max(1, floorOfLevel(gameState.currentLevel)));
        }

        // Static environment art is expensive, so cache one offscreen canvas per (floor,size).
        const BG_CACHE = {};
        function getFloorBackground(floor, w, h) {
            const key = floor + ':' + w + 'x' + h;
            if (BG_CACHE[key]) return BG_CACHE[key];
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            paintFloorStatic(c.getContext('2d'), floor, w, h);
            // keep the cache small (window resizes shouldn't pile up)
            const keys = Object.keys(BG_CACHE); if (keys.length > 9) delete BG_CACHE[keys[0]];
            BG_CACHE[key] = c; return c;
        }

        function _vGrad(g, w, h, stops) {
            const gr = g.createLinearGradient(0, 0, 0, h);
            stops.forEach(([o, col]) => gr.addColorStop(o, col));
            g.fillStyle = gr; g.fillRect(0, 0, w, h);
        }
        function _vignette(g, w, h, strength) {
            const vg = g.createRadialGradient(w / 2, h * 0.46, Math.min(w, h) * 0.25, w / 2, h * 0.5, Math.max(w, h) * 0.72);
            vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,' + (strength || 0.45) + ')');
            g.fillStyle = vg; g.fillRect(0, 0, w, h);
        }
        // Rolling silhouette band along the bottom (hills / ridges / reefs).
        function _ridge(g, w, h, baseY, amp, col, seed) {
            g.fillStyle = col; g.beginPath(); g.moveTo(0, h);
            g.lineTo(0, baseY);
            let s = seed || 1;
            const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
            const step = w / 7;
            for (let x = 0; x <= w + step; x += step) {
                g.lineTo(x, baseY - amp * 0.4 + rnd() * amp * (0.6 + rnd()));
            }
            g.lineTo(w, h); g.closePath(); g.fill();
        }

        function paintFloorStatic(g, floor, w, h) {
            // Floors were reordered (1=Grass, 2=Water, 3=Fire); map to the original art id.
            const artFloor = (floor === 1) ? 3 : (floor === 3) ? 1 : floor;
            if (artFloor === 2) {
                // ---- WATER DOMAIN: sunlit shallows over a deep trench ----
                _vGrad(g, w, h, [[0, '#2a86a6'], [0.4, '#15596f'], [0.78, '#0c374e'], [1, '#06212f']]);
                // descending god-rays
                g.save(); g.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 5; i++) {
                    const rx = w * (0.12 + i * 0.19), rw = w * 0.07;
                    const rg = g.createLinearGradient(rx, 0, rx - w * 0.18, h);
                    rg.addColorStop(0, 'rgba(180,235,255,0.16)'); rg.addColorStop(1, 'rgba(180,235,255,0)');
                    g.fillStyle = rg; g.beginPath();
                    g.moveTo(rx, 0); g.lineTo(rx + rw, 0); g.lineTo(rx - w * 0.12 + rw, h); g.lineTo(rx - w * 0.12, h); g.closePath(); g.fill();
                }
                g.restore();
                // coral / reef silhouettes
                _ridge(g, w, h, h * 0.84, h * 0.16, '#0a3146', 7);
                _ridge(g, w, h, h * 0.92, h * 0.10, '#06212f', 23);
                _vignette(g, w, h, 0.42);
            } else if (artFloor === 3) {
                // ---- GRASS DOMAIN: dappled forest clearing ----
                _vGrad(g, w, h, [[0, '#6fae54'], [0.38, '#3f8b3c'], [0.74, '#235e2a'], [1, '#123317']]);
                // warm canopy light from upper-left
                g.save(); g.globalCompositeOperation = 'lighter';
                const sun = g.createRadialGradient(w * 0.26, h * 0.16, 4, w * 0.26, h * 0.16, Math.max(w, h) * 0.6);
                sun.addColorStop(0, 'rgba(225,245,170,0.30)'); sun.addColorStop(1, 'rgba(225,245,170,0)');
                g.fillStyle = sun; g.fillRect(0, 0, w, h);
                g.restore();
                // distant rolling hills + foliage floor
                _ridge(g, w, h, h * 0.80, h * 0.14, '#2c6b30', 11);
                _ridge(g, w, h, h * 0.90, h * 0.12, '#184a23', 31);
                // soft tree-trunk pillars framing the sides
                g.save(); g.globalAlpha = 0.5; g.fillStyle = '#123317';
                g.fillRect(0, 0, w * 0.05, h); g.fillRect(w * 0.95, 0, w * 0.05, h); g.restore();
                _vignette(g, w, h, 0.4);
            } else if (artFloor === 'electric') {
                // ---- ELECTRIC DOMAIN: charged thunderhead arena ----
                _vGrad(g, w, h, [[0, '#241a48'], [0.4, '#2d2358'], [0.74, '#34264f'], [1, '#1b1436']]);
                // charged glow rising from the horizon
                g.save(); g.globalCompositeOperation = 'lighter';
                const eglow = g.createRadialGradient(w / 2, h * 0.97, 8, w / 2, h * 0.97, h * 0.62);
                eglow.addColorStop(0, 'rgba(255,225,90,0.32)'); eglow.addColorStop(0.5, 'rgba(245,190,60,0.12)'); eglow.addColorStop(1, 'rgba(245,190,60,0)');
                g.fillStyle = eglow; g.fillRect(0, 0, w, h);
                g.restore();
                // distant storm-cloud banks (upper + lower)
                _ridge(g, w, h, h * 0.30, h * 0.10, '#1b1638', 13);
                _ridge(g, w, h, h * 0.86, h * 0.13, '#161030', 7);
                // frozen distant lightning bolts with glow
                g.save(); g.globalCompositeOperation = 'lighter';
                g.strokeStyle = 'rgba(255,235,140,0.55)'; g.lineWidth = 2; g.shadowColor = '#ffe14d'; g.shadowBlur = 9; g.lineJoin = 'round';
                g.beginPath(); g.moveTo(w * 0.70, h * 0.10); g.lineTo(w * 0.66, h * 0.21); g.lineTo(w * 0.72, h * 0.25); g.lineTo(w * 0.67, h * 0.37); g.stroke();
                g.beginPath(); g.moveTo(w * 0.20, h * 0.14); g.lineTo(w * 0.24, h * 0.23); g.lineTo(w * 0.18, h * 0.27); g.lineTo(w * 0.225, h * 0.36); g.stroke();
                g.restore();
                // glowing cloud-edge nodes at the bolt origins
                g.save(); g.globalCompositeOperation = 'lighter'; g.fillStyle = 'rgba(255,225,120,0.7)';
                _ci(g, w * 0.70, h * 0.10, 2.6); g.fill(); _ci(g, w * 0.20, h * 0.14, 2.6); g.fill(); g.restore();
                _vignette(g, w, h, 0.46);
            } else if (artFloor === 'dark') {
                // ---- DARK DOMAIN: void / shadow realm ----
                _vGrad(g, w, h, [[0, '#1a1030'], [0.4, '#241541'], [0.74, '#190e2e'], [1, '#0c0618']]);
                // eerie violet void-glow behind the arena
                g.save(); g.globalCompositeOperation = 'lighter';
                const dglow = g.createRadialGradient(w * 0.5, h * 0.38, 6, w * 0.5, h * 0.38, Math.max(w, h) * 0.55);
                dglow.addColorStop(0, 'rgba(150,90,230,0.30)'); dglow.addColorStop(0.6, 'rgba(110,60,170,0.10)'); dglow.addColorStop(1, 'rgba(90,40,140,0)');
                g.fillStyle = dglow; g.fillRect(0, 0, w, h);
                g.restore();
                // dim void orb (eclipsed moon) high up
                g.save(); g.fillStyle = '#2a1a4a'; _ci(g, w * 0.74, h * 0.20, w * 0.13); g.fill();
                g.globalCompositeOperation = 'lighter'; g.strokeStyle = 'rgba(160,110,240,0.4)'; g.lineWidth = 2;
                _ci(g, w * 0.74, h * 0.20, w * 0.13); g.stroke(); g.restore();
                // scattered glowing stars
                g.save(); g.globalCompositeOperation = 'lighter'; g.fillStyle = 'rgba(190,150,255,0.7)';
                [[0.15, 0.12], [0.30, 0.28], [0.55, 0.10], [0.86, 0.40], [0.42, 0.42], [0.10, 0.36], [0.62, 0.32]]
                    .forEach(([sx, sy]) => { _ci(g, w * sx, h * sy, 1.4); g.fill(); });
                g.restore();
                // jagged dark crystal spires along the bottom
                _ridge(g, w, h, h * 0.82, h * 0.16, '#160b2a', 17);
                _ridge(g, w, h, h * 0.92, h * 0.12, '#0c0618', 41);
                _vignette(g, w, h, 0.55);
            } else {
                // ---- FIRE DOMAIN: volcanic caldera ----
                _vGrad(g, w, h, [[0, '#2a1110'], [0.42, '#4e1a13'], [0.76, '#8a2c14'], [1, '#c4471b']]);
                // molten glow rising from the floor
                g.save(); g.globalCompositeOperation = 'lighter';
                const glow = g.createRadialGradient(w / 2, h * 1.02, 8, w / 2, h * 1.02, h * 0.7);
                glow.addColorStop(0, 'rgba(255,150,50,0.5)'); glow.addColorStop(0.5, 'rgba(255,90,30,0.18)'); glow.addColorStop(1, 'rgba(255,90,30,0)');
                g.fillStyle = glow; g.fillRect(0, 0, w, h);
                g.restore();
                // distant volcano peaks
                g.fillStyle = '#3a140e';
                g.beginPath(); g.moveTo(w * 0.08, h * 0.62); g.lineTo(w * 0.26, h * 0.30); g.lineTo(w * 0.44, h * 0.62); g.closePath(); g.fill();
                g.beginPath(); g.moveTo(w * 0.6, h * 0.6); g.lineTo(w * 0.82, h * 0.26); g.lineTo(w * 1.02, h * 0.6); g.closePath(); g.fill();
                // glowing crater tips
                g.save(); g.globalCompositeOperation = 'lighter'; g.fillStyle = 'rgba(255,170,60,0.7)';
                _ci(g, w * 0.26, h * 0.31, 3); g.fill(); _ci(g, w * 0.82, h * 0.27, 3); g.fill(); g.restore();
                // jagged foreground rock ridges with lava seams
                _ridge(g, w, h, h * 0.86, h * 0.13, '#2a0f0a', 5);
                g.save(); g.globalCompositeOperation = 'lighter'; g.strokeStyle = 'rgba(255,120,40,0.5)'; g.lineWidth = 2;
                g.beginPath(); g.moveTo(0, h * 0.9); g.lineTo(w * 0.3, h * 0.88); g.lineTo(w * 0.55, h * 0.93); g.lineTo(w, h * 0.9); g.stroke(); g.restore();
                _vignette(g, w, h, 0.46);
            }
        }

        // Lightweight animated atmosphere drawn fresh each frame (state-free, time-driven).
        function drawFloorParticles(floor, w, h) {
            // Floors were reordered (1=Grass, 2=Water, 3=Fire); map to the original art id.
            const artFloor = (floor === 1) ? 3 : (floor === 3) ? 1 : floor;
            const t = performance.now() / 1000;
            ctx.save();
            if (artFloor === 2) { // rising bubbles
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 16; i++) {
                    const seed = i * 1.7;
                    const x = (i / 16 * w + Math.sin(t * 0.6 + seed) * 14) % w;
                    const speed = 22 + (i % 5) * 8;
                    const y = h - ((t * speed + seed * 60) % (h + 30));
                    const r = 1.6 + (i % 4) * 1.1;
                    ctx.fillStyle = 'rgba(190,235,255,0.30)'; _ci(ctx, x, y, r); ctx.fill();
                    ctx.strokeStyle = 'rgba(220,245,255,0.35)'; ctx.lineWidth = 0.7; _ci(ctx, x, y, r); ctx.stroke();
                }
            } else if (artFloor === 3) { // drifting leaves / pollen
                for (let i = 0; i < 15; i++) {
                    const seed = i * 2.3;
                    const prog = (t * (10 + (i % 4) * 5) + seed * 80) % (h + 40);
                    const y = -20 + prog;
                    const x = (i / 15 * w + Math.sin(t * 0.8 + seed) * 26 + w * 0.02) % w;
                    const r = 1.4 + (i % 3) * 0.9;
                    ctx.globalAlpha = 0.5;
                    ctx.fillStyle = (i % 3 === 0) ? '#cdeb8a' : '#7cbf4a';
                    ctx.save(); ctx.translate(x, y); ctx.rotate(t + seed);
                    ctx.beginPath(); ctx.ellipse(0, 0, r * 1.8, r, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
                ctx.globalAlpha = 1;
            } else if (artFloor === 'electric') { // flickering sparks + rare lightning flash
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 18; i++) {
                    const seed = i * 1.9;
                    const x = (i / 18 * w + Math.sin(t * 1.5 + seed) * 22) % w;
                    const speed = 30 + (i % 5) * 12;
                    const y = h - ((t * speed + seed * 55) % (h + 30));
                    const flick = Math.sin(t * 14 + seed);
                    if (flick < 0.3) continue; // sparks blink in and out
                    const r = 1.0 + (i % 3) * 0.7;
                    ctx.fillStyle = 'rgba(255,' + (220 + Math.round(flick * 35)) + ',90,' + (0.5 + flick * 0.4) + ')';
                    ctx.save(); ctx.translate(x, y); ctx.rotate(0.6);
                    ctx.fillRect(-r * 0.4, -r * 1.6, r * 0.8, r * 3.2); ctx.restore();
                }
                // occasional full-screen lightning flash
                const strike = Math.sin(t * 0.7 + 1.3);
                if (strike > 0.984) {
                    ctx.fillStyle = 'rgba(255,245,200,' + ((strike - 0.984) / 0.016) * 0.13 + ')';
                    ctx.fillRect(0, 0, w, h);
                }
            } else if (artFloor === 'dark') { // slow drifting void wisps
                for (let i = 0; i < 16; i++) {
                    const seed = i * 2.1;
                    const speed = 8 + (i % 4) * 4;
                    const y = h - ((t * speed + seed * 70) % (h + 40));
                    const x = (i / 16 * w + Math.sin(t * 0.5 + seed) * 30) % w;
                    const pulse = 0.5 + 0.5 * Math.sin(t * 2 + seed);
                    const r = 1.6 + (i % 3) * 1.2;
                    ctx.globalAlpha = 0.4 + pulse * 0.4;
                    ctx.fillStyle = (i % 4 === 0) ? '#c9a6ff' : '#8a5fd0';
                    ctx.beginPath(); ctx.ellipse(x, y, r * 0.8, r * 1.3, 0, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = 1;
            } else { // rising embers
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 18; i++) {
                    const seed = i * 1.3;
                    const speed = 26 + (i % 6) * 10;
                    const y = h - ((t * speed + seed * 50) % (h + 30));
                    const x = (i / 18 * w + Math.sin(t * 1.2 + seed) * 18) % w;
                    const flick = 0.5 + 0.5 * Math.sin(t * 6 + seed);
                    const r = 1.1 + (i % 3) * 0.8;
                    ctx.fillStyle = 'rgba(255,' + (140 + Math.round(flick * 80)) + ',50,' + (0.45 + flick * 0.4) + ')';
                    _ci(ctx, x, y, r); ctx.fill();
                }
            }
            ctx.restore();
        }

        // A soft glowing platform that grounds each creature in the arena.
        function drawArenaPlatform(cx, cy, rx, floor) {
            const palette = { 1: ['rgba(255,150,60,0.30)', 'rgba(255,120,40,0)'],
                              2: ['rgba(150,220,255,0.28)', 'rgba(120,200,255,0)'],
                              3: ['rgba(180,235,140,0.28)', 'rgba(150,210,110,0)'],
                              electric: ['rgba(255,225,90,0.30)', 'rgba(245,200,60,0)'],
                              dark: ['rgba(170,110,255,0.30)', 'rgba(140,80,220,0)'] }[floor] || ['rgba(255,255,255,0.2)', 'rgba(255,255,255,0)'];
            ctx.save();
            const gp = ctx.createRadialGradient(cx, cy, 2, cx, cy, rx);
            gp.addColorStop(0, palette[0]); gp.addColorStop(1, palette[1]);
            ctx.fillStyle = gp; _el(ctx, cx, cy, rx, rx * 0.32); ctx.fill();
            ctx.restore();
        }

        function drawBattleScene() {
            const floor = battleFloor();
            ctx.drawImage(getFloorBackground(floor, canvas.width, canvas.height), 0, 0);
            drawFloorParticles(floor, canvas.width, canvas.height);
            const battle = gameState.currentBattle;
            if (!battle || !BR.player) return;
            const { aiL, pL, aiSprite, pSprite, powerLane } = battleLayouts();
            const enemy = creatureDatabase[battle.enemy.baseId];
            const enemyMax = battle.enemyMaxHP;

            const actMax = act ? getCreatureStats(act).hp : 1;

            drawArenaPlatform(pSprite.cx, pSprite.cy + pSprite.size * 0.42, pSprite.size * 0.52, floor);

            // ---- BACK LAYER: creature sprites (drawn first so oversized/winged forms extend
            //      behind the boards and HP nameplates rather than being shrunk to fit) ----
            drawCreatureInBattle('ai', battle.enemy.baseId, aiSprite, battle.enemyHP, enemyMax, enemy.name, battle.enemy.level, 0, powerLane, 'back');
            if (actBase) drawCreatureInBattle('player', act.baseId, pSprite, actHP, actMax, evolvedName(act.baseId, evoTierOf(act)), act.level, evoTierOf(act), powerLane, 'back');

            // ---- board backing panels (over the sprite edges, under the tiles) ----
            ctx.save();
            ctx.fillStyle = 'rgba(8,12,24,0.42)';
            const padB = 7;
            roundRect(aiL.x - padB, aiL.y - padB, aiL.w + padB * 2, aiL.h + padB * 2, 10); ctx.fill();
            roundRect(pL.x - padB, pL.y - padB, pL.w + padB * 2, pL.h + padB * 2, 10); ctx.fill();
            ctx.restore();
            drawBoardLockTag(aiL, BR.ai, 'ENEMY', '#ff9b9b');
            drawBoard(BR.ai, aiL, false);

            ctx.fillStyle = BR.turn === 'player' ? '#4ecdc4' : '#e94560';
            ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            const midY = (aiL.y + aiL.h + pL.y) / 2;

            if (BR.turn === 'player' && BR.playerStunned) { turnLabel = '✦ Stunned! Turn skipped'; ctx.fillStyle = '#c77dff'; }
            if (BR.doubleStrikeReady) { turnLabel = '⚡⚡ Double Strike!'; ctx.fillStyle = '#ffd700'; }
            if (BR.enemyDoubleStrikeCharging || BR.enemyDoubleStrikeReady) {
                // Show a warning on enemy's "turn" display even when it's player's turn

                ctx.fillText('⚡⚡ Enemy charging!', aiL.x + aiL.w / 2, midY - 14);
                ctx.restore();
            }
            ctx.fillText(turnLabel, aiL.x + aiL.w / 2, midY);

            // ── Status badges: draw small icons above/below boards ────────────
            ctx.font = '10px Arial'; ctx.textBaseline = 'middle';
            let aiBadges = [], playerBadges = [];
            if (BR.enemyPoison > 0)     aiBadges.push('☠×' + BR.enemyPoison);
            if (BR.enemyBurnTicks > 0)  aiBadges.push('🔥×' + BR.enemyBurnTicks);
            if (BR.enemyTileLockTurns > 0) aiBadges.push('🔒×' + BR.enemyTileLockTurns);
            if (BR.enemyReflect > 0)    aiBadges.push('↩refl');
            if (BR.doubleStrikeCharging || BR.doubleStrikeReady) playerBadges.push('⚡⚡');
            if (BR.playerPoison > 0)    playerBadges.push('☠×' + BR.playerPoison);
            if (BR.playerBurnTicks > 0) playerBadges.push('🔥×' + BR.playerBurnTicks);
            if (BR.playerTileLockTurns > 0) playerBadges.push('🔒×' + BR.playerTileLockTurns);
            if (BR.playerReflect > 0)   playerBadges.push('↩refl');
            if (aiBadges.length) {
                ctx.fillStyle = '#ffcc44'; ctx.textAlign = 'left';
                ctx.fillText(aiBadges.join('  '), aiL.x + 2, aiL.y - 14);
            }
            if (playerBadges.length) {
                ctx.fillStyle = '#ff9b9b'; ctx.textAlign = 'left';
                ctx.fillText(playerBadges.join('  '), pL.x + 2, pL.y - 14);
            }

            // cascade banner — pops in and fades between the boards
            if (BR.cascadeBanner) {
                const CBAN_MS = 950;
                const et = (performance.now() - BR.cascadeBanner.at) / CBAN_MS;
                if (et < 1) {
                    const lvl = BR.cascadeBanner.level;
                    const palCols = ['#f39c12','#e67e22','#e74c3c','#c0392b','#8e44ad'];
                    const col = palCols[Math.min(lvl - 1, palCols.length - 1)];
                    // bounce-in scale: overshoot then settle
                    const scaleT = Math.min(et / 0.18, 1);
                    const bounce = scaleT < 0.6 ? 1.4 - scaleT * 0.67 : 1.0 + (1 - scaleT) * 0.12;
                    const alpha = et > 0.6 ? 1 - (et - 0.6) / 0.4 : 1;
                    const bx = aiL.x + aiL.w / 2, by = midY - 18;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(bx, by); ctx.scale(bounce, bounce);
                    ctx.font = `bold ${13 + lvl * 2}px Arial`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const tw = ctx.measureText(BR.cascadeBanner.text).width + 20;
                    ctx.fillStyle = 'rgba(0,0,0,0.75)';
                    roundRect(-tw / 2, -14, tw, 28, 8); ctx.fill();
                    ctx.fillStyle = col;
                    ctx.shadowColor = col; ctx.shadowBlur = 10;
                    ctx.fillText(BR.cascadeBanner.text, 0, 0);

            drawBoardLockTag(pL, BR.player, 'YOU', '#8be8df');
            drawBoard(BR.player, pL, BR.turn === 'player');

            // ---- FRONT LAYER: creature nameplates, power gauges, and floaters drawn on top of
            //      the boards so HP stays readable even when a big sprite overlaps the board ----
            drawCreatureInBattle('ai', battle.enemy.baseId, aiSprite, battle.enemyHP, enemyMax, enemy.name, battle.enemy.level, 0, powerLane, 'front');
            if (actBase) drawCreatureInBattle('player', act.baseId, pSprite, actHP, actMax, evolvedName(act.baseId, evoTierOf(act)), act.level, evoTierOf(act), powerLane, 'front');

            // ---- enemy lineup strip (multi-enemy story battles), on top ----
            if (battle.enemyTeam && battle.enemyTeam.length > 1) {
                drawEnemyLineup(battle, aiSprite);
            }

            // ability VFX render above creatures & boards
            drawVfx(performance.now());

            // Enemy ability announcement banner (fades over ~1.6s)
            if (BR.enemyAbilityFlash) {
                const BANNER_MS = 1600;
                const e = (performance.now() - BR.enemyAbilityFlash.at) / BANNER_MS;
                if (e < 1) {
                    const alpha = e < 0.7 ? 1 : 1 - (e - 0.7) / 0.3;
                    const by = midY - 26 - Math.min(1, e * 3) * 6;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    const txt = `⚡ Enemy used ${BR.enemyAbilityFlash.name}!`;
                    ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const tw = ctx.measureText(txt).width + 18;
                    const bx = aiL.x + aiL.w / 2;
                    ctx.fillStyle = 'rgba(120,20,40,0.92)';
                    roundRect(bx - tw / 2, by - 12, tw, 24, 8); ctx.fill();
                    ctx.fillStyle = '#ffd0d8';
                    ctx.fillText(txt, bx, by);
                    ctx.restore();
                } else {
                    BR.enemyAbilityFlash = null;
                }
            }

            // Victory text when enemy is fainting (drawn last so it appears on top)
            if (BR.enemyFainting) {
                const b = gameState.currentBattle;
                const isFinalEnemy = !b || !b.enemyTeam || b.enemyIndex >= b.enemyTeam.length - 1;
                const now = performance.now();
                const elapsed = now - BR.enemyFaintAt;
                const t = Math.min(1, elapsed / 1200);
                const scaleT = Math.min(t / 0.4, 1); // pop in first 0.4s
                const bounce = scaleT < 0.7 ? 1 + (0.7 - scaleT) * 0.4 : 1;
                const fadeIn = Math.min(1, t / 0.3);
                const fadeOut = t > 0.7 ? 1 - (t - 0.7) / 0.3 : 1;
                const alpha = fadeIn * fadeOut;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(bounce, bounce);
                ctx.font = 'bold 80px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ff6b6b'; ctx.shadowBlur = 20;
                // Mid-lineup faints show "DOWN!"; only the last enemy shows VICTORY.
                ctx.fillText(isFinalEnemy ? 'VICTORY!' : 'DOWN!', 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // ---- Restore shake transform ----
            ctx.restore();

            // ---- Power release flash (full-canvas edge bloom, drawn outside shake) ----
            if (BR.powerFlash) {
                const now = performance.now();
                const et = (now - BR.powerFlash.at) / 380;
                if (et < 1) {
                    const pal = VFX_PAL[BR.powerFlash.el] || VFX_PAL.fire;
                    const alpha = et < 0.12 ? et / 0.12 : (1 - et) * 0.9;
                    // edge vignette bloom from screen border inward
                    ctx.save();
                    const grad = ctx.createRadialGradient(
                        canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.3,
                        canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.85
                    );
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(1, pal.glow + Math.round(alpha * 220).toString(16).padStart(2, '0'));
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.fillStyle = grad; ctx.globalAlpha = alpha * 0.65;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                } else {
                    BR.powerFlash = null;
                }
            }
        }

        function startBattleLoop() {
            stopBattleLoop();
            const step = () => {
                if (gameState.currentScreen !== 'battleMode') { BR.loopId = null; return; }
                const now = performance.now();
                // ---- Check if enemy fainting animation is done ----
                if (BR.enemyFainting && (now - BR.enemyFaintAt) >= 1200) {
                    BR.enemyFainting = false;
                    const b = gameState.currentBattle;
                    // Multi-enemy story lineup: advance to the next enemy if any remain.
                    if (b && b.enemyTeam && b.enemyIndex < b.enemyTeam.length - 1) {
                        b.enemyTeam[b.enemyIndex].fainted = true;
                        b.enemyIndex++;
                        syncActiveEnemy(b);
                        // Fresh enemy steps in: reset its power bar, recompute its cap, clear AI turn state.
                        BR.ai.powerBar = 0;
                        BR.ai.powerCap = calcPowerCap(b.enemy);
                        BR.ai.capMod = 0; BR.ai.capModPending = 0; BR.ai.powerElements = {};
                        BR.ai.phase = 'idle'; BR.aiPhase2 = false; BR.ai.firstMatchEl = null;
                        BR.ai.combo = 1; BR.ai.matchedThisTurn = false; BR.ai.cascadeCount = 0;
                        BR.ai.locked = new Set(); BR.ai.selected = null; BR.ai.pendingSwap = null;
                        // Fresh enemy: clear status effects/buffs that were on the previous enemy.
                        // (The player's own poison/burn persist — it's a continuous fight.)
                        BR.enemyPoison = 0; BR.enemyPoisonDmg = 0;
                        BR.enemyBurnTicks = 0; BR.enemyBurnBase = 0; BR.enemyBurnBonus = 0;
                        BR.enemyReflect = 0; BR.enemyShield = 0;
                        BR.enemyAb1Ready = false; BR.enemyAb2Ready = false; BR.enemyEmpowerMult = 0;
                        BR.enemyDoubleStrikeCharging = false; BR.enemyDoubleStrikeReady = false;
                        BR.enemyTileLockTurns = 0;
                        BR.turn = 'player';        // player acts against the new enemy
                        BR.enemyStunned = false;
                        b.log.push(`${creatureDatabase[b.enemy.baseId].name} steps in!`);
                        updateBattlePanel();
                        // keep the loop running — fall through to draw + reschedule
                    } else {
                        if (b && b.enemyTeam) b.enemyTeam[b.enemyIndex].fainted = true;
                        stopBattleLoop(); battleWon(); return;
                    }
                }
                // ---- Check if player creature fainting animation is done ----
                if (BR.playerFainting && (now - BR.playerFaintAt) >= 1200) {
                    BR.playerFainting = false;
                    BR._faintingId = null;
                    const resolver = BR._faintResolver; BR._faintResolver = null;
                    finishResolve(resolver || BR.ai); // swaps in your next creature, or ends the battle if your team is wiped
                    // If the team was wiped, finishResolve() already ended the battle — stop the loop here.
                    if (gameState.currentScreen !== 'battleMode' || BR.loopId === null) return;
                    // Otherwise the battle continues with your next creature: fall through to draw + reschedule.
                }
                // ---- Enemy turn ----
                if (BR.turn === 'ai' && BR.ai.phase === 'idle' && now >= BR.aiTimer && !BR.enemyFainting) {
                    if (BR.enemyStunned) {
                        BR.enemyStunned = false; BR.ai.firstMatchEl = null; onBoardResolved(BR.ai);
                    } else if (!BR.aiPhase2) {
                        const r = aiUseAbilities();
                        if (r === 'ended') { return; }            // battle over
                        if (r === 'fired') { BR.aiPhase2 = true; BR.aiTimer = now + AI_DELAY; } // brief pause before the match
                        else { aiTakeTurn(); }                    // nothing armed: match immediately
                    } else {
                        BR.aiPhase2 = false; aiTakeTurn();        // now make the match
                    }
                }
                // ---- Player stunned: skip the player's turn after a brief beat ----
                if (BR.turn === 'player' && BR.player.phase === 'idle' && BR.playerStunned) {
                    if (!BR.playerStunAt) BR.playerStunAt = now + AI_DELAY;
                    if (now >= BR.playerStunAt) {
                        BR.playerStunned = false; BR.playerStunAt = 0;
                        BR.player.firstMatchEl = null; onBoardResolved(BR.player);
                    }
                }
                updateBoard(BR.turn === 'player' ? BR.player : BR.ai);
                if (gameState.currentBattle && gameState.currentBattle.mode === 'tutorial') updateTutorialCoach();
                drawBattleScene();
                BR.loopId = requestAnimationFrame(step);
            };
            BR.loopId = requestAnimationFrame(step);
        }

        function stopBattleLoop() { if (BR.loopId) { cancelAnimationFrame(BR.loopId); BR.loopId = null; } }

        function setupBattleBoard() {
            const battle = gameState.currentBattle;
            let teamIds = gameState.team.filter(id => id !== null);
            if (teamIds.length === 0 && gameState.creatures.length) teamIds = [gameState.creatures[0].id];

            battle.teamIds = teamIds.slice();
            battle.activeId = teamIds[0];
            battle.synergy = computeTeamSynergy(battle.teamIds);
            battle.hp = {};
            battle.switchCount = 0;
            battle.membersHitSet = [];
            battle.turnCount = 0;
            battle.ironWillUsed = {};   // {creatureId: true} — tracks Iron Will uses this battle
            teamIds.forEach(id => {
                const c = gameState.creatures.find(x => x.id === id);
                let hp = c ? getCreatureStats(c).hp : 50;
                if (hasTalent('resilience')) hp = Math.round(hp * 1.10); // +10% HP
                battle.hp[id] = hp;
            });

            const enemyEl = enemyElementOf();
            BR.player = createBoard(6, 6, 'player');
            BR.ai = createBoard(6, 6, 'ai');
            BR.player.pool = weightedPool(activeElementOf(), enemyEl);
            BR.ai.pool = weightedPool(enemyEl, activeElementOf());
            // Dynamic power caps: scale with creature rarity, level, and merge tier
            BR.player.powerCap = calcPowerCap(activeCreatureInst());
            BR.ai.powerCap    = calcPowerCap(battle.enemy);
            makeBoard(BR.player); ensurePlayable(BR.player);
            makeBoard(BR.ai); ensurePlayable(BR.ai);
            if (hasTalent('swift')) BR.player.combo = 1.05; // Swift major: base combo head-start
            BR.player.combo = (BR.player.combo || 1) + skillStartingComboBonus(); // Focus minor: stacks on top
            BR.turn = 'player'; BR.aiTimer = 0;
            BR.ab1Ready = false; BR.ab2Ready = false; BR.empowerMult = 0; BR.playerShield = 0; BR.enemyStunned = false;
            BR.enemyAb1Ready = false; BR.enemyAb2Ready = false; BR.enemyEmpowerMult = 0; BR.enemyShield = 0;
            BR.playerStunned = false; BR.playerStunAt = 0; BR.aiPhase2 = false; BR.enemyAbilityFlash = null; BR.cascadeBanner = null; BR.vfx = [];
            BR.shake = null; BR.powerFlash = null; BR.tilePops = [];
            BR.enemyFainting = false; BR.enemyFaintAt = 0; BR.playerFainting = false; BR.playerFaintAt = 0; BR._faintResolver = null; BR._faintingId = null;
            BR.anim = { player: { atkAt: 0, hitAt: 0, floaters: [] }, ai: { atkAt: 0, hitAt: 0, floaters: [] } };

            // Clear all status-effect / buff runtime state so nothing leaks from a previous battle
            // (poison, burn, reflect, double-strike, tile locks, power-cap modifiers).
            BR.playerReflect = 0; BR.enemyReflect = 0;
            // Electric Trinity: persistent reflect fraction applied each time the enemy attacks.
            // Stored separately from BR.playerReflect (which is a one-shot ability reflect).
            BR.synergyReflect = (battle.synergy && battle.synergy.electricReflect) || 0;
            BR.doubleStrikeCharging = false; BR.doubleStrikeReady = false;
            BR.enemyDoubleStrikeCharging = false; BR.enemyDoubleStrikeReady = false;
            BR.playerPoison = 0; BR.enemyPoison = 0; BR.playerPoisonDmg = 0; BR.enemyPoisonDmg = 0;
            BR.playerBurnTicks = 0; BR.enemyBurnTicks = 0;
            BR.playerBurnBase = 0; BR.playerBurnBonus = 0; BR.enemyBurnBase = 0; BR.enemyBurnBonus = 0;
            BR.enemyTileLockTurns = 0; BR.playerTileLockTurns = 0;
            BR.player.capMod = 0; BR.player.capModPending = 0;
            BR.ai.capMod = 0; BR.ai.capModPending = 0;

            startBattleLoop();
        }

        function updateBattlePanel() {
            const battle = gameState.currentBattle;
            if (!battle) return;
            const act = activeCreatureInst();
            const specs = act ? ABILITIES[act.baseId] : null;

            // Refresh switch row so the newly active creature gets highlighted
            // and the fainted one gets the KO state immediately
            const switchRow = document.getElementById('switchRow');
            if (switchRow) {
                let switchBtns = '';
                battle.teamIds.forEach(id => {
                    const c = gameState.creatures.find(x => x.id === id);
                    if (!c) return;
                    const hp = battle.hp[id];
                    const isActive = id === battle.activeId;
                    const fainted = hp <= 0;
                    const bg = isActive ? '#e94560' : fainted ? '#333' : '#1a3a52';
                    const label = `${spriteImg(c.baseId, 20, 'vertical-align:middle; margin-right:2px;')}${fainted ? 'KO' : Math.max(0, hp)}`;
                    switchBtns += `<button onclick="switchActive(${id})" ${fainted || isActive ? 'disabled' : ''}
                        style="flex:1; min-width:0; padding:6px 4px; margin:0 2px; font-size:12px; background:${bg};">${label}</button>`;
                });
                switchRow.innerHTML = switchBtns;
            }

            // Refresh gather row (wild only) so chance % and button state stay live
            const gatherRow = document.getElementById('gatherRow');
            if (gatherRow && battle.mode === 'random') {
                const hpFrac  = Math.max(0, battle.enemyHP / battle.enemyMaxHP);
                const rate    = gatherRate(battle.enemy.baseId, hpFrac);
                const pct     = Math.round(rate * 100);
                const rarity  = creatureDatabase[battle.enemy.baseId].rarity;
                const pctCol  = pct >= 60 ? '#7bed9f' : pct >= 30 ? '#f39c12' : '#e94560';
                const canGather = BR.turn === 'player' && !BR.playerStunned && BR.player && BR.player.phase === 'idle' && hpFrac < 1.0;
                const gatherBg  = canGather ? '#1a4a2a' : '#222';
                const gatherBdr = canGather ? '#2ecc71' : '#333';
                gatherRow.innerHTML = `
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:11px; color:#7bed9f; font-weight:bold;">🌿 Gather Creature</div>
                        <div style="font-size:10px; color:#555; margin-top:1px;">${rarity} · ${hpFrac >= 1.0 ? '<span style=\'color:#555;\'>deal damage first</span>' : 'chance: <span style=\'color:' + pctCol + '; font-weight:bold;\'>' + pct + '%</span>'}</div>
                    </div>
                    <button id="gatherBtn" onclick="tryGather();" ${canGather ? '' : 'disabled'}
                        style="margin:0; padding:7px 14px; font-size:12px; font-weight:bold;
                               background:${gatherBg}; color:${canGather ? '#7bed9f' : '#444'};
                               border:1px solid ${gatherBdr}; border-radius:6px; flex-shrink:0;">
                        Gather
                    </button>`;
            }

            // Refresh ability buttons for the new active creature
            [1, 2].forEach(slot => {
                const btn = document.getElementById('abBtn' + slot);
                if (!btn || !specs) return;
                const spec = slot === 1 ? specs.a1 : specs.a2;
                const unlocked = abilityUnlocked(act, slot);
                const ready = unlocked && (slot === 1 ? BR.ab1Ready : BR.ab2Ready) && BR.turn === 'player' && BR.player.phase === 'idle' && !BR.playerStunned;
                btn.disabled = !ready;
                btn.style.background = ready ? (slot === 1 ? '#e67e22' : '#8e44ad') : '#444';
                btn.style.color = ready ? '#fff' : '#9aa3ad';
                const sub = !unlocked ? `🔒 Unlocks at Lv ${ABILITY_UNLOCK_LV[slot]}`
                    : (ready ? describeAbilitySpec(spec, slot) : (slot === 1 ? `Match ${ARM_A1_LEN} to arm` : `Match ${ARM_A2_LEN} to arm`));
                btn.innerHTML = `<div style="font-weight:bold;">${ready ? '✨ ' : '🔒 '}${spec.name}</div><div style="font-size:9px; opacity:0.85;">${sub}</div>`;
            });
        }

        // Player presses the Gather button during a wild battle.
        // Costs their turn; if roll succeeds the battle ends in a gather,
        // if it fails the enemy gets a free attack before play resumes.
        function tryGather() {
            const battle = gameState.currentBattle;
            if (!battle || battle.mode !== 'random') return;
            if (BR.turn !== 'player' || BR.player.phase !== 'idle' || BR.playerStunned) return;

            const hpFrac  = Math.max(0, battle.enemyHP / battle.enemyMaxHP);
            const rate    = gatherRate(battle.enemy.baseId, hpFrac);
            const success = Math.random() < rate;

            // Record attempt on the battle object so battleWon() can pick it up
            battle.gatherAttempted = true;
            battle.gatherHpFrac    = hpFrac;
            battle.gatherChance    = Math.round(rate * 100);
            battle.gatherSucceeded = success;

            if (success) {
                // Immediately add creature and end the battle as a win
                const caughtCreature = addCreatureToInventory(battle.enemy.baseId);
                battle.gatheredRank = rankFromRoll(caughtCreature.statRoll);
                stopBattleLoop();
                battleWon();
            } else {
                // Fail: show a brief flash on the enemy, then enemy gets a free attack
                BR.anim.ai.floaters.push({ dmg: 0, startedAt: performance.now(), gatherFail: true });
                // Hand turn to AI immediately (player used their turn attempting the gather)
                BR.turn = 'ai';
                BR.ai.phase = 'idle';
                ensurePlayable(BR.ai);
                BR.aiTimer = performance.now() + 400; // short pause so fail message shows
                updateBattlePanel();
            }
        }

        function forfeitBattle() {
            // Forfeiting is disabled during the tutorial battles — leaving mid-tutorial
            // can leave the onboarding flow in a broken state.
            const b = gameState.currentBattle;
            if (b && b.mode === 'tutorial') return;
            stopBattleLoop();
            gameState.currentBattle = null;
            gameState.currentScreen = 'mainMenu';
            render();
        }

        function startStoryBattle(levelNum) {
            const lvl = levelNum || gameState.currentLevel;
            // Show any pending story beat (floor intro / boss intro) before the fight begins.
            // maybeShowStoryBeat returns true if it took over (it will re-call startStoryBattle
            // once the narration is dismissed); in that case we bail out here.
            if (maybeShowStoryBeat(lvl)) return;
            beginStoryBattle(lvl);
        }

        // Point the legacy battle.enemy / enemyHP / enemyMaxHP / isBoss fields at the active
        // lineup member, so all existing single-enemy battle code keeps working unchanged.
        function syncActiveEnemy(b) {
            if (!b || !b.enemyTeam) return;
            const e = b.enemyTeam[b.enemyIndex];
            if (!e) return;
            b.enemy = e.inst;
            b.enemyHP = e.hp;
            b.enemyMaxHP = e.maxHp;
            b.isBoss = e.isBoss;
        }

        // The actual battle setup, called once any pre-battle story beat has been shown.
        function beginStoryBattle(levelNum) {
            if (!consumeEnergy()) { showEnergyModal(); return; }
            const lvl = levelNum || gameState.currentLevel;
            const levelConfig = getLevelConfig(lvl);
            if (!levelConfig) { gameState.currentScreen = 'mainMenu'; render(); return; }

            // Build the enemy lineup (fought in fixed order). Boss enemy is the last in the list.
            const lineup = (levelConfig.enemies || [{ id: levelConfig.enemyId }]);
            const enemyTeam = lineup.map((e, i) => {
                const inst = { baseId: e.id, level: levelConfig.enemyLevel, mergeLevel: 0 };
                const isBossEnemy = !!levelConfig.isBoss && i === lineup.length - 1;
                const hp = Math.round(getCreatureStats(inst).hp * (isBossEnemy ? BOSS_HP_MULT : 1));
                return { inst, hp, maxHp: hp, isBoss: isBossEnemy, fainted: false };
            });

            gameState.currentBattle = {
                mode: 'story',
                enemyTeam: enemyTeam,
                enemyIndex: 0,
                playerDamage: 0,
                round: 0,
                log: [],
                catchable: levelConfig.catchableIds,
                levelNumber: lvl
            };
            syncActiveEnemy(gameState.currentBattle);

            gameState.currentScreen = 'battleMode';
            setupBattleBoard();
            saveGameData();
            render();
        }

        // If a story beat should play before this level's battle, show it and return true.
        // Beats: a floor INTRO before the first level of each floor (lvl 1/11/21), and a
        // BOSS intro before each floor's boss (lvl 10/20/30). Each fires at most once.
        function maybeShowStoryBeat(lvl) {
            const floor = floorOfLevel(lvl);
            const story = FLOOR_STORY[floor];
            if (!story) return false;
            const ss = gameState.storyShown || (gameState.storyShown = {});

            const isFloorFirst = ((lvl - 1) % LEVELS_PER_FLOOR) === 0; // 1, 11, 21
            const cfg = getLevelConfig(lvl);
            const isBoss = cfg && cfg.isBoss;

            if (isFloorFirst && !ss['intro' + floor]) {
                ss['intro' + floor] = true;
                saveGameData();
                showNarrative(story.intro, () => beginStoryBattle(lvl), { allowSkip: true, header: story.act });
                return true;
            }
            if (isBoss && !ss['boss' + floor]) {
                ss['boss' + floor] = true;
                saveGameData();
                showNarrative(story.boss, () => beginStoryBattle(lvl), { allowSkip: true, header: story.act });
                return true;
            }
            return false;
        }

        // Played from the battle-result Continue button after a boss is beaten and a floor clears.
        // Shows that floor's clear beat (or the finale for floor 3), then returns to the main menu.
        function showStoryClear(floor) {
            const story = FLOOR_STORY[floor];
            const ss = gameState.storyShown || (gameState.storyShown = {});
            const goHome = () => { gameState.currentScreen = 'mainMenu'; render(); };
            if (!story || ss['clear' + floor]) { goHome(); return; }
            ss['clear' + floor] = true;
            saveGameData();
            const header = floor === 3 ? 'The End' : story.act;
            showNarrative(story.clear, goHome, { allowSkip: true, header });
        }

        // ===== CREATURE SYSTEM =====
        function getCreatureStats(creature) {
            const base = creatureDatabase[creature.baseId];
            const merged = creature.mergeLevel > 0 ? 1 + (creature.mergeLevel * 0.10) : 1;
            const evo = 1 + evoTierOf(creature) * EVO_STAT_MULT;   // +10% per evolution tier (stacks with merge)
            const leveled = 1 + (creature.level - 1) * 0.1;       // HP & DEF: +10%/level
            const leveledAtk = 1 + (creature.level - 1) * 0.08;   // ATK: gentler +8%/level

            // Individual variation: -1/0/+1 added to each base stat (set at capture).
            const roll = creature.statRoll || { hp: 0, atk: 0, def: 0 };
            const bHP  = base.baseHP  + (roll.hp  || 0);
            const bATK = base.baseATK + (roll.atk || 0);
            const bDEF = base.baseDEF + (roll.def || 0);

            return {
                hp:  Math.round(bHP  * merged * evo * leveled * HP_MULT * skillHpMult()),
                atk: Math.round(bATK * merged * evo * leveledAtk * skillAtkMult()),
                def: Math.round(bDEF * merged * evo * leveled)
            };
        }

        // ===== Individual stat variation & rank =====
        // On capture each creature rolls a variation on each base stat:
        //   HP: -5 / 0 / +5   (bigger swing — HP is a large pool, so small rolls were barely felt)
        //   ATK: -1 / 0 / +1
        //   DEF: -1 / 0 / +1
        // Rank counts the SIGN of each roll (good / neutral / bad), summed to -3..+3:
        //   +3=S, +2=A, +1=B, 0=C, -1=D, -2=E, -3=F. Starters/tutorial/story = C (all zeros).
        function rollStatVariation() {
            const r1 = () => Math.floor(Math.random() * 3) - 1;       // -1, 0, +1
            return { hp: r1() * 5, atk: r1(), def: r1() };            // HP scaled to -5/0/+5
        }
        function neutralStatRoll() {
            return { hp: 0, atk: 0, def: 0 };
        }
        function rankFromRoll(roll) {
            if (!roll) return 'C';
            const sum = Math.sign(roll.hp) + Math.sign(roll.atk) + Math.sign(roll.def);
            return ['F', 'E', 'D', 'C', 'B', 'A', 'S'][sum + 3] || 'C';
        }
        function rankColor(rank) {
            return ({ S: '#f1c40f', A: '#2ecc71', B: '#3498db', C: '#aaa', D: '#888', E: '#e67e22', F: '#e74c3c' })[rank] || '#aaa';
        }

        function addCreatureToInventory(baseId, rolled = true) {
            const creature = {
                id: Date.now() + Math.random(),
                baseId: baseId,
                level: 1,
                mergeLevel: 0,
                mergeProgress: 0,
                xp: 0,
                statRoll: rolled ? rollStatVariation() : neutralStatRoll()
            };
            gameState.creatures.push(creature);
            
            if (!gameState.pokedex[baseId]) {
                gameState.pokedex[baseId] = true;
                addAchievement('pokedex', `Caught ${creatureDatabase[baseId].name}!`);
            }
            trackQuestEvent('creature_caught', { element: creatureDatabase[baseId].element });
            
            return creature;
        }

        // Catch chance after defeating a creature, by rarity
        // Gather rates by rarity and enemy HP remaining (as fraction of max).
        // 0% at full HP — player must land at least one hit before gathering.
        // hpFrac thresholds: =1.0 (full) | >0.75 | >0.40 | >0.15 | ≤0.15
        const GATHER_RATES = {
            common:    [0.00, 0.15, 0.45, 0.80, 0.95],
            rare:      [0.00, 0.08, 0.25, 0.55, 0.80],
            epic:      [0.00, 0.03, 0.12, 0.30, 0.55],
            legendary: [0.00, 0.01, 0.05, 0.12, 0.25]
        };

        // Returns the base gather probability (0–1) for a given baseId + current enemy HP fraction.
        function gatherRate(baseId, hpFrac) {
            if (hpFrac >= 1.0) return 0; // must deal damage first
            const rarity = creatureDatabase[baseId].rarity;
            const tiers  = GATHER_RATES[rarity] || GATHER_RATES.common;
            const base   = hpFrac > 0.75 ? tiers[1]
                         : hpFrac > 0.40 ? tiers[2]
                         : hpFrac > 0.15 ? tiers[3]
                         :                 tiers[4];
            return Math.min(0.98, base
                * skillCatchMult()
                * (hasTalent('keen_eye') ? 1.15 : 1)
                * (gameState.nextCatchGuaranteed ? 99 : 1));
        }

        // Attempt a gather roll. hpFrac = enemyHP / enemyMaxHP at moment of button press.
        function attemptGather(baseId, hpFrac) {
            if (gameState.nextCatchGuaranteed) {
                gameState.nextCatchGuaranteed = false;
                return true;
            }
            return Math.random() < gatherRate(baseId, hpFrac);
        }

        // Legacy alias used by boss first-clear catch (kept as guaranteed)
        function attemptCatch(baseId) {
            if (gameState.nextCatchGuaranteed) { gameState.nextCatchGuaranteed = false; return true; }
            return Math.random() < gatherRate(baseId, 0); // treat as low HP for boss reward
        }

        // The wild enemy level the player has dialed in. Defaults to story progress (currentLevel),
        // and is always clamped to [1, currentLevel] so you can farm easier fights but never out-level
        // your story progress.
        function wildLevelMax() { return Math.max(1, gameState.currentLevel || 1); }
        function getWildLevelChoice() {
            const max = wildLevelMax();
            let lvl = gameState.wildLevelChoice;
            if (lvl == null) lvl = max;          // unset → track the frontier
            return Math.max(1, Math.min(max, lvl));
        }
        function stepWildLevel(delta) {
            const max = wildLevelMax();
            const cur = getWildLevelChoice();
            const next = Math.max(1, Math.min(max, cur + delta));
            const prevBand = Math.min(3, Math.max(1, floorOfLevel(cur)));
            const nextBand = Math.min(3, Math.max(1, floorOfLevel(next)));
            gameState.wildLevelChoice = next;
            // Crossing into a different rarity band re-rolls the encounter so what's shown matches the odds.
            if (nextBand !== prevBand) rollWildEncounter();
            saveGameData();
            render();
        }

        function startRandomBattle(enemyId) {
            if (!consumeEnergy()) { showEnergyModal(); return; }
            // Use the player's chosen wild level (clamped to story progress), with a small ±1 jitter.
            const chosen = getWildLevelChoice();
            const enemyLevel = Math.max(1, chosen + Math.floor(Math.random() * 3) - 1);
            const enemyCreature = { baseId: enemyId, level: enemyLevel, mergeLevel: 0 };

            gameState.currentBattle = {
                mode: 'random',
                enemy: enemyCreature,
                enemyHP: getCreatureStats(enemyCreature).hp,
                enemyMaxHP: getCreatureStats(enemyCreature).hp,
                playerDamage: 0,
                round: 0,
                log: [],
                isBoss: false,
                catchable: [enemyId]
            };

            gameState.currentScreen = 'battleMode';
            setupBattleBoard();
            saveGameData();
            render();
        }

        // ===== TUTORIAL BATTLES (Floor 0) =====
        const TUTORIAL_ENEMY_COMMON = { fire: 1, water: 4, grass: 7, electric: 10, dark: 13 }; // element -> a weak common creature

        // Battle configs. Battle 1 picks an enemy the player's starter holds the
        // advantage over, so the first fight is a confidence-building win.
        function getTutorialBattle(battleNum) {
            const starterEl = gameState.selectedStarterElement || 'fire';
            if (battleNum === 1) {
                // Pick an enemy element the starter beats (first in its advantage list)
                const enemyEl = (elementAdvantages[starterEl] || [])[0] || 'grass';
                return { battleNum: 1, enemyId: TUTORIAL_ENEMY_COMMON[enemyEl] || 7, enemyLevel: 1, enemyHP: 70, focus: 'matching' };
            }
            if (battleNum === 2) {
                // Enemy is something only the Battle 1 recruit can beat — forces a switch.
                // Hardcoded so the recruit is always the correct counter regardless of element table order.
                const battle2EnemyEl = { fire: 'water', water: 'grass', grass: 'fire' }[starterEl] || 'fire';
                return { battleNum: 2, enemyId: TUTORIAL_ENEMY_COMMON[battle2EnemyEl] || 7, enemyLevel: 2, enemyHP: 110, focus: 'elements' };
            }
            if (battleNum === 3) {
                // Abilities fight. Enemy is an element the STARTER beats, so the player can lead with
                // their (now Lv2, ability-armed) starter and focus on learning the ability mechanic.
                // Slightly tankier so the fight lasts long enough to arm and fire an ability.
                const enemyEl = (elementAdvantages[starterEl] || [])[0] || 'grass';
                return { battleNum: 3, enemyId: TUTORIAL_ENEMY_COMMON[enemyEl] || 7, enemyLevel: 2, enemyHP: 140, focus: 'abilities' };
            }
            return null;
        }

        // Which tutorial battle (if any) the player still owes, based on phase.
        // Later phases extend this mapping for battles 2-4.
        function pendingTutorialBattle() {
            const t = gameState.tutorial;
            if (!t || t.isComplete) return 0;
            if (t.currentPhase === 1) return 1; // starter chosen, Battle 1 not yet won
            if (t.currentPhase === 2) return 2; // Battle 1 won, Battle 2 not yet won
            if (t.currentPhase === 3) return 3; // Battle 2 won, Battle 3 (abilities) not yet won
            return 0;
        }

        // Show the battle's intro narration, then drop into the fight.
        function beginTutorialBattle(battleNum) {
            const cfg = getTutorialBattle(battleNum);
            if (!cfg) { gameState.currentScreen = 'mainMenu'; render(); return; }
            const introKey = 'battle' + battleNum + 'Intro';
            showNarrative(TUTORIAL_DATA.narration[introKey], () => {
                gameState.tutorial.narrativeShown[introKey] = true;
                startTutorialBattle(battleNum);
            }, { allowSkip: true });
        }

        function startTutorialBattle(battleNum) {
            const cfg = getTutorialBattle(battleNum);
            if (!cfg) { gameState.currentScreen = 'mainMenu'; render(); return; }

            // Tutorial fights never cost energy.
            const enemyCreature = { baseId: cfg.enemyId, level: cfg.enemyLevel, mergeLevel: 0 };
            gameState.currentBattle = {
                mode: 'tutorial',
                tutorialBattle: battleNum,
                enemy: enemyCreature,
                enemyHP: cfg.enemyHP,
                enemyMaxHP: cfg.enemyHP,
                playerDamage: 0,
                round: 0,
                log: [],
                isBoss: false,
                catchable: []
            };

            // Reset in-battle coach state
            BR._coachSawMatch = false;
            BR._coachPrevPower = 0;
            BR._coachKey = null;

            gameState.currentScreen = 'battleMode';
            setupBattleBoard();
            saveGameData();
            render();

            // First battle only: walk the player through the screen before they play.
            if (battleNum === 1 && !gameState.tutorial.narrativeShown.battle1Orient) {
                // Defer one frame so battle controls are laid out (battleLayouts reads their height).
                requestAnimationFrame(() => showBattleOrientation(() => {
                    gameState.tutorial.narrativeShown.battle1Orient = true;
                    saveGameData();
                }));
            }

            // Second battle: element chart + switch-row spotlight.
            if (battleNum === 2 && !gameState.tutorial.narrativeShown.battle2Orient) {
                requestAnimationFrame(() => showBattle2Orientation(() => {
                    gameState.tutorial.narrativeShown.battle2Orient = true;
                    saveGameData();
                }));
            }

            // Third battle: spotlight the (now-unlocked) 4-match ability button.
            if (battleNum === 3 && !gameState.tutorial.narrativeShown.battle3Orient) {
                requestAnimationFrame(() => showAbilityOrientation(() => {
                    gameState.tutorial.narrativeShown.battle3Orient = true;
                    // Mark the generic ability tip as seen too, so it never double-fires in story mode.
                    gameState.tutorial.narrativeShown.abilityOrient = true;
                    saveGameData();
                }));
            }
        }

        // Two-step orientation for Tutorial Battle 2: element advantage chart, then switch-row spotlight.
        function showBattle2Orientation(onDone) {
            const starterEl = gameState.selectedStarterElement || 'fire';
            // Use the same hardcoded map as getTutorialBattle so the text matches the actual enemy
            const battle2EnemyEl = { fire: 'water', water: 'grass', grass: 'fire' };
            const enemyEl = battle2EnemyEl[starterEl] || 'water';

            // Find allyEl from the actual team recruit (Battle 1 catch), not from a table lookup.
            // The starter occupies team[0]; the recruit is any other team member with an advantage.
            const allyInst  = gameState.creatures.find(c => {
                const base = creatureDatabase && creatureDatabase[c.baseId];
                return base && c.id !== gameState.team[0] && gameState.team.includes(c.id)
                    && elementBeats(base.element, enemyEl);
            }) || gameState.creatures.find(c => {
                // Fallback: any non-starter team member

                                       : elementBeatenBy(enemyEl)[0] || 'grass';

        // Drives the contextual coach banner during tutorial battles.
        function updateTutorialCoach() {
            const battle = gameState.currentBattle;

            if (!el) return;
            const bn = battle.tutorialBattle || 1;
            if (bn === 2) {

                return;
            }
            const set = TUTORIAL_DATA.coach['battle' + bn];
            if (!set) return;
