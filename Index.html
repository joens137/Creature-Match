                g.shadowColor = col; g.shadowBlur = 6; g.fill();
                g.fillStyle = '#ffffffcc'; g.beginPath(); g.moveTo(0, -s); g.lineTo(s * 0.18, 0); g.lineTo(0, s * 0.35); g.lineTo(-s * 0.18, 0); g.closePath(); g.fill();
                g.restore();
            };
            if (tier >= 1) { // shoulder shards
                shard(26, 50, 5, -0.5);
                shard(74, 50, 5, 0.5);
            }
            if (tier >= 2) { // crown of three shards above the head
                shard(38, 20, 6, -0.3);
                shard(50, 14, 8, 0);
                shard(62, 20, 6, 0.3);
            }
            // sparkles
            g.fillStyle = '#ffffff';
            const sparks = tier >= 2 ? [[22, 30], [78, 32], [30, 80], [70, 78], [50, 90]] : [[24, 34], [76, 36], [50, 86]];
            sparks.forEach(([x, y], i) => { const s = 1.4 + (i % 2) * 0.8; g.beginPath(); g.moveTo(x, y - s); g.lineTo(x + s * 0.5, y); g.lineTo(x, y + s); g.lineTo(x - s * 0.5, y); g.closePath(); g.fill(); });
            g.restore();
        }

        function getCreatureSprite(baseId, evoTier) {
            evoTier = evoTier || 0;
            const key = evoTier ? baseId + '_e' + evoTier : '' + baseId;
            if (SPRITE_CACHE[key]) return SPRITE_CACHE[key];
            const c = document.createElement('canvas'); c.width = 200; c.height = 200;
            const g = c.getContext('2d'); g.save(); g.scale(2, 2);
            const el = creatureDatabase[baseId] ? creatureDatabase[baseId].element : 'fire';
            if (evoTier) drawEvoAura(g, el, evoTier);                                  // behind creature
            (SPRITE_DRAW[baseId] || (gg => drawDefaultSprite(gg, baseId)))(g);          // the creature
            if (evoTier) drawEvoAccents(g, el, evoTier);                               // in front
            g.restore(); SPRITE_CACHE[key] = c; return c;
        }

        function getCreatureFlash(baseId, evoTier) {
            evoTier = evoTier || 0;
            const key = evoTier ? baseId + '_e' + evoTier : '' + baseId;
            if (FLASH_CACHE[key]) return FLASH_CACHE[key];
            const src = getCreatureSprite(baseId, evoTier);
            const c = document.createElement('canvas'); c.width = src.width; c.height = src.height;
            const g = c.getContext('2d'); g.drawImage(src, 0, 0);
            g.globalCompositeOperation = 'source-in'; g.fillStyle = '#fff'; g.fillRect(0, 0, c.width, c.height);
            FLASH_CACHE[key] = c; return c;
        }

        // ---- Screen shake ------------------------------------------------
        function triggerShake(intensity, dur) {
            if (!BR.shake || (performance.now() - BR.shake.startAt > BR.shake.dur) || intensity > BR.shake.intensity) {
                BR.shake = { intensity, dur, startAt: performance.now() };
            }
        }
        function applyShake(now) {
            if (!BR.shake) return;
            const elapsed = now - BR.shake.startAt;
            if (elapsed >= BR.shake.dur) { BR.shake = null; return; }
            const t = elapsed / BR.shake.dur;
            const mag = BR.shake.intensity * Math.pow(1 - t, 1.8);
            ctx.translate(
                (Math.random() - 0.5) * 2 * mag * (1 + 0.4 * Math.sin(now / 9)),
                (Math.random() - 0.5) * 2 * mag
            );
        }

        // ---- Impact VFX (shockwave + sparks on hit) ----------------------
        function spawnImpactVfx(x, y, size, el) {
            if (!BR.vfx) return;
            BR.vfx.push({
                kind: 'impact', el,
                startAt: performance.now(), dur: 420,
                cX: x, cY: y, cS: size, tX: x, tY: y, tS: size, shape: 'shard', nova: false,
                parts: Array.from({ length: 14 }, (_, i) => ({
                    ang: (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.3,
                    spd: 0.28 + Math.random() * 0.55, sz: 0.4 + Math.random() * 0.7,
                    ph: Math.random(), delay: 0, off: 0
                }))
            });
            if (BR.vfx.length > 12) BR.vfx.shift();
        }

        // Trigger a lunge on the attacker and a hit-flash + damage floater on its target
        function triggerAttack(attacker, dmg) {
            const now = performance.now();
            BR.anim[attacker].atkAt = now;
            const target = attacker === 'player' ? 'ai' : 'player';
            BR.anim[target].hitAt = now + 130;
            if (dmg > 0) {
                BR.anim[target].floaters.push({ dmg: Math.round(dmg), startedAt: now + 130 });
                if (BR.anim[target].floaters.length > 4) BR.anim[target].floaters.shift();
            }
            // Screen shake — intensity scales with damage tier
            const shakeI = dmg > 80 ? 8 : dmg > 40 ? 5.5 : 3.5;
            triggerShake(shakeI, 240);
            // Delayed impact VFX at the target (matches hitAt timing)
            setTimeout(() => {
                if (!BR.player) return;
                try {
                    const L = battleLayouts();
                    const sp = target === 'player' ? L.pSprite : L.aiSprite;
                    const el = target === 'player' ? activeElementOf() : enemyElementOf();
                    spawnImpactVfx(sp.cx, sp.cy, sp.size, el);
                } catch (e) {}
            }, 130);
        }

        // Sprite as an <img> for the DOM-based screens (cached data URLs)
        const SPRITE_URL = {};
        function spriteImg(baseId, px, extra, evoTier) {
            evoTier = evoTier || 0;
            const key = evoTier ? baseId + '_e' + evoTier : '' + baseId;
            if (!SPRITE_URL[key]) {
                try {
                    SPRITE_URL[key] = getCreatureSprite(baseId, evoTier).toDataURL();
                } catch (e) {
                    // Canvas tainted (e.g. opened via file:// instead of a local server).
                    // Fall back to the sprite file path directly so the game keeps running.
                    const cs = (CUSTOM_SPRITES[baseId] && CUSTOM_SPRITES[baseId][evoTier]) || null;
                    if (cs) return `<img src="${cs}" width="${px}" height="${px}" style="vertical-align:middle; ${extra || ''}">`;
                    SPRITE_URL[key] = '';
                }
            }
            return `<img src="${SPRITE_URL[key]}" width="${px}" height="${px}" style="vertical-align:middle; ${extra || ''}">`;
        }

        // ===== Custom hand-drawn sprites for Sprout (baseId 7) and its evolutions =====
        // Tier 0 = Sprout, tier 1 = Saplet, tier 2 = Verdania. These data-URL images
        // are painted into SPRITE_CACHE so BOTH the battle canvas (getCreatureSprite)
        // and the DOM <img> path (spriteImg) use the custom art automatically.
        // Custom hand-drawn sprites are disabled for now — every creature uses the
        // procedural canvas art. To re-enable later, add entries like:
        //   1: { 0: "sprites/creature_1_tier0.png", 1: "...", 2: "..." }
        // (and serve the game via a local server so the browser can load the files).
        const CUSTOM_SPRITES = {};
        function installCustomSprites() {
            Object.keys(CUSTOM_SPRITES).forEach(baseId => {
                const tiers = CUSTOM_SPRITES[baseId];
                Object.keys(tiers).forEach(tierStr => {
                    const tier = parseInt(tierStr, 10);
                    const key = tier ? baseId + '_e' + tier : '' + baseId;
                    const img = new Image();
                    img.onload = () => {
                        const cv = document.createElement('canvas');
                        cv.width = 200; cv.height = 200;
                        const g = cv.getContext('2d');
                        g.clearRect(0, 0, 200, 200);
                        g.drawImage(img, 0, 0, 200, 200);
                        SPRITE_CACHE[key] = cv;       // battle canvas path
                        delete SPRITE_URL[key];       // force DOM <img> to regenerate from new canvas
                        delete FLASH_CACHE[key];      // hit-flash regenerates from new canvas
                    };
                    img.onerror = () => {
                        // Sprite file missing/unreachable — leave the procedural fallback in place.
                        console.warn('Custom sprite failed to load:', tiers[tierStr]);
                    };
                    img.src = tiers[tierStr];
                });
            });
        }
        installCustomSprites();


        function createBoard(rows, cols, owner) {
            return { rows, cols, owner, board: [], selected: null, phase: 'idle', phaseStart: 0,
                     pendingSwap: null, clearing: [], combo: 1, cascadeCount: 0, locked: new Set(),
                     pool: ELEMENT_POOL.slice(), firstMatchEl: null, matchedThisTurn: false,
                     powerBar: 0, powerElements: {}, powerCap: POWER_CAP_BASE, capMod: 0, capModPending: 0 };
        }

        function makeTile(element, gx, gy) { return { element, gx, gy }; }

        function makeBoard(S) {
            const pool = S.pool;
            for (let r = 0; r < S.rows; r++) {
                S.board[r] = [];
                for (let c = 0; c < S.cols; c++) {
                    let ch = pool.slice();
                    if (c >= 2 && S.board[r][c-1].element === S.board[r][c-2].element) ch = ch.filter(e => e !== S.board[r][c-1].element);
                    if (r >= 2 && S.board[r-1][c].element === S.board[r-2][c].element) ch = ch.filter(e => e !== S.board[r-1][c].element);
                    S.board[r][c] = makeTile(ch[Math.floor(Math.random() * ch.length)], c, r);
                }
            }
        }

        // Runs of 3+, skipping any element currently locked on this board
        function findRuns(S) {
            const clear = new Set(), runs = [];
            for (let r = 0; r < S.rows; r++) {
                let c = 0;
                while (c < S.cols) {
                    const e = S.board[r][c].element; let len = 1;
                    while (c + len < S.cols && S.board[r][c+len].element === e) len++;
                    if (len >= 3 && !S.locked.has(e)) { runs.push({ element: e, length: len }); for (let k = 0; k < len; k++) clear.add(r + ',' + (c+k)); }
                    c += len;
                }
            }
            for (let c = 0; c < S.cols; c++) {
                let r = 0;
                while (r < S.rows) {
                    const e = S.board[r][c].element; let len = 1;
                    while (r + len < S.rows && S.board[r+len][c].element === e) len++;
                    if (len >= 3 && !S.locked.has(e)) { runs.push({ element: e, length: len }); for (let k = 0; k < len; k++) clear.add((r+k) + ',' + c); }
                    r += len;
                }
            }
            return { clear, runs };
        }

        // Ability damage: power × ATK, modified by the CREATURE's element vs the enemy's element
        function abilityDamage(power, atk, creatureEl, enemyEl) {
            let dmg = power * atk * skillAbilityPowerMult();
            if (elementBeats(creatureEl, enemyEl))      dmg *= SE_MULT;
            else if (elementBeats(enemyEl, creatureEl)) dmg *= NVE_MULT;
            return Math.round(dmg);
        }

        const adjacent = (a, b) => (Math.abs(a.r - b.r) + Math.abs(a.c - b.c)) === 1;

        function swapData(S, a, b) { const t = S.board[a.r][a.c]; S.board[a.r][a.c] = S.board[b.r][b.c]; S.board[b.r][b.c] = t; }

        function swapAnimated(S, a, b) {
            const ta = S.board[a.r][a.c], tb = S.board[b.r][b.c];
            ta.fromX = a.c; ta.fromY = a.r; ta.toX = b.c; ta.toY = b.r;
            tb.fromX = b.c; tb.fromY = b.r; tb.toX = a.c; tb.toY = a.r;
            swapData(S, a, b);
        }

        function trySwap(S, a, b) {
            if (S.phase !== 'idle' || !adjacent(a, b)) return;
            swapAnimated(S, a, b);
            S.pendingSwap = { a, b };
            S.phase = 'swap';
            S.phaseStart = performance.now();
        }

        function activeCreatureInst() { return gameState.creatures.find(c => c.id === gameState.currentBattle.activeId); }
        function activeElementOf() { const c = activeCreatureInst(); return c ? creatureDatabase[c.baseId].element : 'fire'; }
        function enemyElementOf() { return creatureDatabase[gameState.currentBattle.enemy.baseId].element; }
        function weightedPool(primary, secondary) { return [...ELEMENT_POOL, primary, primary, secondary]; }

        function enterClear(S) {
            const { clear, runs } = findRuns(S);
            if (!S.matchedThisTurn) { S.matchedThisTurn = true; S.firstMatchEl = runs.length ? runs[0].element : null; }

            // ---- Accumulate power bar (replaces per-match damage) ----
            let tilesThisMatch = 0;
            runs.forEach(rn => {
                const tiles = rn.length;
                tilesThisMatch += tiles;
                // Track element contribution for dominant-element bonus at release
                S.powerElements[rn.element] = (S.powerElements[rn.element] || 0) + tiles;
            });
            // Each cascade wave adds a +1 chain bonus on top of raw tile count
            const chainBonus = S.cascadeCount > 0 ? S.cascadeCount : 0;
            const gained = tilesThisMatch + chainBonus;
            S.powerBar = Math.max(0, Math.min(effCap(S), (S.powerBar || 0) + gained));

            // ---- Arm abilities: needs both a long enough run AND the creature's level ----
            const maxRun = runs.reduce((m, r) => Math.max(m, r.length), 0);
            if (S.owner === 'player') {
                const act = activeCreatureInst();
                if (maxRun >= ARM_A1_LEN && abilityUnlocked(act, 1)) BR.ab1Ready = true;
                if (maxRun >= ARM_A2_LEN && abilityUnlocked(act, 2)) BR.ab2Ready = true;
            } else {
                const enLv = (gameState.currentBattle.enemy.level) || 1;
                if (maxRun >= ARM_A1_LEN && enLv >= ABILITY_UNLOCK_LV[1]) BR.enemyAb1Ready = true;
                if (maxRun >= ARM_A2_LEN && enLv >= ABILITY_UNLOCK_LV[2]) BR.enemyAb2Ready = true;
            }

            // ---- Visual clearing (unchanged) ----
            S.clearing = [];
            clear.forEach(key => {
                const [r, c] = key.split(',').map(Number);
                const t = S.board[r][c];
                S.clearing.push({ gx: t.gx, gy: t.gy, element: t.element });
                S.board[r][c] = null;
            });
            updateBattlePanel();
            S.phase = 'clear';
            S.phaseStart = performance.now();
        }

        // Release accumulated power bar as a single attack at end of turn.
        // Handles double_strike (hold on charge turn, release x1.5 on next) and
        // reflect (attacker takes half, victim mirrors half back).
        function releasePower(S) {
            const p = S.powerBar || 0;
            if (p === 0) { S.powerElements = {}; return; }

            const battle = gameState.currentBattle;
            const atkEl  = S.owner === 'player' ? activeElementOf() : enemyElementOf();
            const defEl  = S.owner === 'player' ? enemyElementOf() : activeElementOf();
            const atkATK = S.owner === 'player'
                ? getCreatureStats(activeCreatureInst()).atk
                : getCreatureStats(battle.enemy).atk;

            // ── Double Strike: hold power on charge turn, release x1.5 on next ──
            if (S.owner === 'player' && BR.doubleStrikeCharging) {
                // Charge turn: hold the power bar (don't release), just show the indicator
                BR.doubleStrikeReady = true;
                BR.doubleStrikeCharging = false;
                S.powerBar = p; // keep bar full
                S.powerElements = { ...S.powerElements }; // preserve dominant element
                S.lastPowerRelease = null;
                return; // skip normal release — finishResolve will hand turn to AI
            }
            if (S.owner === 'ai' && BR.enemyDoubleStrikeCharging) {
                BR.enemyDoubleStrikeReady = true;
                BR.enemyDoubleStrikeCharging = false;
                S.powerBar = p;
                S.powerElements = { ...S.powerElements };
                return;
            }

            // Dominant element matched this turn determines elemental bonus
            const entries = Object.entries(S.powerElements || {});
            const dominantEl = entries.length
                ? entries.sort((a, b) => b[1] - a[1])[0][0]
                : atkEl;

            // Linear power-to-damage: power 3 = 1 match-3, power 6 = 2 match-3s, etc.
            let dmg = Math.round(atkATK * POWER_DMG_K * p);

            // If double strike is ready, scale up then clear the flag
            const dsMultiplier = (S.owner === 'player' && BR.doubleStrikeReady) ? 1.5
                               : (S.owner === 'ai' && BR.enemyDoubleStrikeReady)  ? 1.5 : 1.0;
            if (S.owner === 'player' && BR.doubleStrikeReady) BR.doubleStrikeReady = false;
            if (S.owner === 'ai'     && BR.enemyDoubleStrikeReady) BR.enemyDoubleStrikeReady = false;
            dmg = Math.round(dmg * dsMultiplier);

            // Element multipliers: creature synergy + tile-vs-defender advantage/resistance
            if (dominantEl === atkEl)                    dmg = Math.round(dmg * SYN_MULT);
            if (elementBeats(dominantEl, defEl))         dmg = Math.round(dmg * SE_MULT);
            else if (elementBeats(defEl, dominantEl))    dmg = Math.round(dmg * NVE_MULT);

            // Helper: apply burn dominant-element tracking
            const _trackBurnTile = () => {
                if (S.owner === 'ai' && BR.playerBurnTicks > 0) {
                    BR._lastAIDominantEl = dominantEl; // used in finishResolve tick
                }
                if (S.owner === 'player' && BR.enemyBurnTicks > 0) {
                    BR._lastPlayerDominantEl = dominantEl;
                }
            };
            _trackBurnTile();

            if (S.owner === 'player') {
                dmg = Math.round(dmg * playerOutgoingSynergyMult(dominantEl));
                if (BR.empowerMult)  dmg = Math.round(dmg * BR.empowerMult);
                if (BR.enemyShield)  dmg = Math.round(dmg * (1 - BR.enemyShield));
                // Enemy reflect: half goes back to player
                let enemyReflectBack = 0;
                if (BR.enemyReflect > 0) {
                    enemyReflectBack = Math.round(dmg * BR.enemyReflect);
                    dmg = dmg - enemyReflectBack;
                    BR.enemyReflect = 0;
                }
                const _preDrDmg = dmg; // capture before DEF reduction for accurate log display
                const _enemyDRfrac = 1 - enemyIncomingDR(); // true reduction fraction (deterministic)
                dmg = Math.round(dmg * enemyIncomingDR()); // enemy DEF mitigation
                battle.enemyHP -= dmg;
                battle.playerDamage += dmg;
                if (enemyReflectBack > 0) {
                    battle.hp[battle.activeId] -= enemyReflectBack;
                    setTimeout(() => triggerAttack('ai', enemyReflectBack), 200);
                }
                // Battle log
                if (!battle.log) battle.log = [];
                const _teamSynMult = playerOutgoingSynergyMult(dominantEl);
                battle.log.push({
                    turn: 'player',
                    who: (activeCreatureInst() ? creatureDatabase[activeCreatureInst().baseId].name : 'Player'),
                    type: 'match',
                    power: p,
                    baseAtk: atkATK,
                    dominantEl, atkEl, defEl,
                    synergy: dominantEl === atkEl,
                    teamSynMult: _teamSynMult > 1 ? _teamSynMult : null,
                    elAdvantage: elementBeats(dominantEl, defEl) ? 'super' : elementBeats(defEl, dominantEl) ? 'resist' : 'neutral',
                    empower: BR.empowerMult || null,
                    shield: BR.enemyShield || null,
                    doubleStrike: dsMultiplier > 1,
                    preDrDmg: _preDrDmg !== dmg ? _preDrDmg : null, // only set if DR actually changed the value
                    drFrac: _preDrDmg !== dmg ? _enemyDRfrac : null,
                    dmg
                });
                if (dmg > 0) {
                    if (!battle.membersHitSet) battle.membersHitSet = [];
                    if (!battle.membersHitSet.includes(battle.activeId)) battle.membersHitSet.push(battle.activeId);
                }
                if (dmg > 0) triggerAttack('player', dmg);
            } else {
                // ── Enemy attack: apply reflect BEFORE dealing damage ──────────
                let reflectDmg = 0;
                if (BR.playerReflect > 0) {
                    // Player takes half, enemy takes the reflected half
                    const reflected = Math.round(dmg * BR.playerReflect);
                    dmg = dmg - reflected; // player takes the remainder
                    reflectDmg = reflected;
                    BR.playerReflect = 0;
                }
                // Electric Trinity: persistent synergy reflect (stacks with ability reflect)
                if (BR.synergyReflect > 0) {
                    const synReflected = Math.round(dmg * BR.synergyReflect);
                    dmg = dmg - synReflected;
                    reflectDmg += synReflected;
                }
                if (BR.enemyEmpowerMult) dmg = Math.round(dmg * BR.enemyEmpowerMult);
                if (BR.playerShield)     dmg = Math.round(dmg * (1 - BR.playerShield));
                const _preDrDmgEnemy = dmg; // capture before DEF reduction
                const _playerDRfrac = 1 - playerIncomingSynergyMult(); // true reduction fraction (deterministic)
                dmg = Math.round(dmg * playerIncomingSynergyMult());
                battle.hp[battle.activeId] -= dmg;
                // Apply reflected damage to enemy
                if (reflectDmg > 0) {
                    battle.enemyHP -= reflectDmg;
                    battle.playerDamage += reflectDmg;
                    // Small delay so reflect floater appears after the incoming hit
                    setTimeout(() => triggerAttack('player', reflectDmg), 200);
                }
                // Battle log
                if (!battle.log) battle.log = [];
                battle.log.push({
                    turn: 'enemy',
                    who: creatureDatabase[battle.enemy.baseId].name,
                    type: 'match',
                    power: p,
                    baseAtk: atkATK,
                    dominantEl, atkEl, defEl,
                    elAdvantage: elementBeats(dominantEl, defEl) ? 'super' : elementBeats(defEl, dominantEl) ? 'resist' : 'neutral',
                    shield: BR.playerShield || null,
                    doubleStrike: dsMultiplier > 1,
                    reflected: reflectDmg || null,
                    preDrDmg: _preDrDmgEnemy !== dmg ? _preDrDmgEnemy : null,
                    drFrac: _preDrDmgEnemy !== dmg ? _playerDRfrac : null,
                    dmg
                });
                // Iron Will
                if (battle.hp[battle.activeId] <= 0 && hasTalent('iron_will') && !battle.ironWillUsed[battle.activeId]) {
                    battle.ironWillUsed[battle.activeId] = true;
                    battle.hp[battle.activeId] = 1;
                }
                if (dmg > 0) triggerAttack('ai', dmg);
            }

            S.lastPowerRelease = { power: p, at: performance.now(), owner: S.owner };
            const flashEl = S.owner === 'player' ? activeElementOf() : enemyElementOf();
            BR.powerFlash = { at: performance.now(), el: flashEl, power: p };
            triggerShake(Math.min(10, 4 + p * 0.25), 300);
            S.powerBar = 0;
            S.powerElements = {};
        }

        function gravityRefill(S) {
            for (let c = 0; c < S.cols; c++) {
                const stack = [];
                for (let r = S.rows - 1; r >= 0; r--) if (S.board[r][c]) stack.push(S.board[r][c]);
                let idx = 0, newCount = 0;
                for (let r = S.rows - 1; r >= 0; r--) {
                    if (idx < stack.length) {
                        const t = stack[idx++];
                        t.fromX = t.gx; t.fromY = t.gy; t.toX = c; t.toY = r;
                        S.board[r][c] = t;
                    } else {
                        const el = S.pool[Math.floor(Math.random() * S.pool.length)];
                        const spawnY = -(++newCount);
                        const t = makeTile(el, c, spawnY);
                        t.fromX = c; t.fromY = spawnY; t.toX = c; t.toY = r;
                        S.board[r][c] = t;
                    }
                }
            }
            S.phase = 'fall';
            S.phaseStart = performance.now();
        }

        function animateMoving(S, e) {
            for (let r = 0; r < S.rows; r++) for (let c = 0; c < S.cols; c++) {
                const t = S.board[r][c];
                if (t && t.fromX !== undefined) { t.gx = lerp(t.fromX, t.toX, e); t.gy = lerp(t.fromY, t.toY, e); }
            }
        }

        function snapAll(S) {
            for (let r = 0; r < S.rows; r++) for (let c = 0; c < S.cols; c++) {
                const t = S.board[r][c];
                if (t) { t.gx = c; t.gy = r; delete t.fromX; delete t.fromY; delete t.toX; delete t.toY; }
            }
        }

        function hasMoves(S) {
            for (let r = 0; r < S.rows; r++) for (let c = 0; c < S.cols; c++) {
                if (c < S.cols - 1) { swapData(S,{r,c},{r,c:c+1}); const m = findRuns(S).runs.length > 0; swapData(S,{r,c},{r,c:c+1}); if (m) return true; }
                if (r < S.rows - 1) { swapData(S,{r,c},{r:r+1,c}); const m = findRuns(S).runs.length > 0; swapData(S,{r,c},{r:r+1,c}); if (m) return true; }
            }
            return false;
        }

        function ensurePlayable(S) {
            let guard = 0;
            while (!hasMoves(S) && guard++ < 30) makeBoard(S);
            snapAll(S);
        }

        function goIdle(S) {
            ensurePlayable(S);
            S.phase = 'idle';
            S.pendingSwap = null;
        }

        function updateBoard(S) {
            const now = performance.now();
            if (S.phase === 'swap' || S.phase === 'swapback') {
                const t = Math.min(1, (now - S.phaseStart) / SWAP_MS);
                animateMoving(S, easeOut(t));
                if (t >= 1) {
                    snapAll(S);
                    if (S.phase === 'swap') {
                        if (findRuns(S).runs.length) { S.combo = 1; enterClear(S); }
                        else { swapAnimated(S, S.pendingSwap.a, S.pendingSwap.b); S.phase = 'swapback'; S.phaseStart = now; }
                    } else { goIdle(S); }
                }
            } else if (S.phase === 'clear') {
                if ((now - S.phaseStart) / CLEAR_MS >= 1) { S.clearing = []; gravityRefill(S); }
            } else if (S.phase === 'fall') {
                const t = Math.min(1, (now - S.phaseStart) / FALL_MS);
                animateMoving(S, easeOut(t));
                if (t >= 1) {
                    snapAll(S);
                    if (findRuns(S).runs.length) {
                        S.combo = Math.min(COMBO_CAP, S.combo + COMBO_INC);
                        S.cascadeCount++;
                        if (S.owner === 'player') {
                            trackQuestEvent('cascade', { depth: S.cascadeCount });
                            if (S.combo >= 2.0) trackQuestEvent('combo', { mult: S.combo });
                        }
                        // fire cascade feedback
                        const cascadeEl = S.firstMatchEl || (S.owner === 'player' ? activeElementOf() : enemyElementOf());
                        const labels = ['CASCADE!','DOUBLE!','TRIPLE!','CHAIN!'];
                        const powNow = S.powerBar || 0;
                        const powLabel = powNow >= effCap(S) ? '⚡ MAX!' : `⚡ ${powNow}/${effCap(S)}`;
                        const label = (labels[S.cascadeCount - 1] || 'CHAIN!') + '  ' + powLabel;
                        BR.cascadeBanner = { text: label, at: now, level: S.cascadeCount };
                        // board center for the VFX nova
                        try {
                            const L = S.owner === 'player' ? battleLayouts().pL : battleLayouts().aiL;
                            spawnCascadeVfx(L.x + L.w / 2, L.y + L.h / 2, L.w, cascadeEl, S.cascadeCount);
                        } catch(e) {}
                        enterClear(S);
                    } else onBoardResolved(S);
                }
            }
        }

        // Called after a board finishes resolving all cascades for the current turn
        function onBoardResolved(S) {
            const battle = gameState.currentBattle;

            // ---- Release accumulated power as one attack ----
            releasePower(S);

            // Enemy defeated -> play its faint animation, then battleWon (handled in the loop).
            if (battle.enemyHP <= 0 && !BR.enemyFainting) { BR.enemyFainting = true; BR.enemyFaintAt = performance.now(); return; }
            // Active creature defeated -> play its faint animation first, then resume (handled in the loop).
            if (battle.hp[battle.activeId] <= 0 && !BR.playerFainting) {
                BR.playerFainting = true;
                BR.playerFaintAt = performance.now();
                BR._faintingId = battle.activeId; // lock the draw to this creature throughout the animation
                BR._faintResolver = S;
                return;
            }
            finishResolve(S);
        }

        // The post-attack tail of a resolved board: swap in a fresh creature if the active one
        // fainted, expire one-turn locks/buffs, and hand the turn over. Split out so it can run
        // *after* a faint animation finishes playing.
        function finishResolve(S) {
            const battle = gameState.currentBattle;
            // active creature fainted?
            if (battle.hp[battle.activeId] <= 0) {
                const alive = battle.teamIds.filter(id => battle.hp[id] > 0);
                if (alive.length === 0) { stopBattleLoop(); battleLost(); return; }
                battle.activeId = alive[0];
                BR.player.powerCap = calcPowerCap(activeCreatureInst()); // new active creature
                shiftBoardForElement(BR.player, activeElementOf());
            }
            // lock handling: mover's own lock expires; opponent gets locked from the first match element
            const opp = S.owner === 'player' ? BR.ai : BR.player;
            S.locked = new Set();
            opp.locked = S.firstMatchEl ? new Set([S.firstMatchEl]) : new Set();
            S.firstMatchEl = null; S.matchedThisTurn = false; S.combo = 1; S.cascadeCount = 0;
            S.powerBar = 0; S.powerElements = {}; // safety reset (releasePower clears these, but guard here too)
            // expire one-turn buffs tied to the mover (Persistence talent extends each buff once)
            if (S.owner === 'player') {
                if (BR.empowerMult) {
                    if (hasTalent('persistence') && !BR.empowerExtended) { BR.empowerExtended = true; }
                    else { BR.empowerMult = 0; BR.empowerExtended = false; }
                }
                if (BR.enemyShield) {
                    if (hasTalent('persistence') && !BR.enemyShieldExtended) { BR.enemyShieldExtended = true; }
                    else { BR.enemyShield = 0; BR.enemyShieldExtended = false; }
                }
            } else {
                if (BR.playerShield) {
                    if (hasTalent('persistence') && !BR.playerShieldExtended) { BR.playerShieldExtended = true; }
                    else { BR.playerShield = 0; BR.playerShieldExtended = false; }
                }
                BR.enemyEmpowerMult = 0;  // enemy empower: no Persistence benefit for enemy
            }

            // ── Discharge/Siphon cap modifier lifecycle ───────────────────────
            // The mover's own temporary cap modifier expires now that their turn (and its power
            // release) is done. The opponent — about to play next — gets any pending cap reduction
            // promoted to active (as a negative), with their current bar clamped to the new cap.
            S.capMod = 0;
            const next = S.owner === 'player' ? BR.ai : BR.player;
            if (next.capModPending) {
                next.capMod = -(next.capModPending);
                next.capModPending = 0;
                next.powerBar = Math.min(next.powerBar || 0, effCap(next));
            }

            // ── Status effect ticks (fire at turn END, before handing over) ────
            if (S.owner === 'ai') {
                // Enemy finished its turn — apply poison/burn ticks to enemy
                if (BR.enemyPoison > 0) {
                    const poisonDmg = BR.enemyPoisonDmg || 0;
                    battle.enemyHP -= poisonDmg;
                    BR.enemyPoison--;
                    if (poisonDmg > 0) BR.anim.ai.floaters.push({ dmg: poisonDmg, startedAt: performance.now(), poison: true });
                    if (battle.enemyHP <= 0 && !BR.enemyFainting) { BR.enemyFainting = true; BR.enemyFaintAt = performance.now(); }
                }
                if (BR.enemyBurnTicks > 0) {
                    const wasFire = (BR._lastPlayerDominantEl === 'fire');
                    const burnDmg = BR.enemyBurnBase + (wasFire ? BR.enemyBurnBonus : 0);
                    battle.enemyHP -= burnDmg;
                    BR.enemyBurnTicks--;
                    if (burnDmg > 0) BR.anim.ai.floaters.push({ dmg: burnDmg, startedAt: performance.now(), burn: true });
                    if (battle.enemyHP <= 0 && !BR.enemyFainting) { BR.enemyFainting = true; BR.enemyFaintAt = performance.now(); }
                }
                // Expire multi-turn tile lock on enemy board
                if (BR.enemyTileLockTurns > 0) {
                    BR.enemyTileLockTurns--;
                    if (BR.enemyTileLockTurns === 0) BR.ai.locked = new Set();
                }
            } else {
                // Player finished their turn — apply poison/burn to player
                if (BR.playerPoison > 0) {
                    const poisonDmg = BR.playerPoisonDmg || 0;
                    battle.hp[battle.activeId] -= poisonDmg;
                    BR.playerPoison--;
                    if (poisonDmg > 0) BR.anim.player.floaters.push({ dmg: poisonDmg, startedAt: performance.now(), poison: true });
                }
                if (BR.playerBurnTicks > 0) {
                    const wasFire = (BR._lastAIDominantEl === 'fire');
                    const burnDmg = BR.playerBurnBase + (wasFire ? BR.playerBurnBonus : 0);
                    battle.hp[battle.activeId] -= burnDmg;
                    BR.playerBurnTicks--;
                    if (burnDmg > 0) BR.anim.player.floaters.push({ dmg: burnDmg, startedAt: performance.now(), burn: true });
                }
                if (BR.playerTileLockTurns > 0) {
                    BR.playerTileLockTurns--;
                    if (BR.playerTileLockTurns === 0) BR.player.locked = new Set();
                }
                // Grass Trinity: restore 5% of active creature's max HP each player turn
                if (battle.synergy && battle.synergy.grassRegen > 0) {
                    const act = activeCreatureInst();
                    if (act) {
                        const maxHp = getCreatureStats(act).hp;
                        const regen = Math.round(maxHp * battle.synergy.grassRegen);
                        battle.hp[battle.activeId] = Math.min(maxHp, (battle.hp[battle.activeId] || 0) + regen);
                        if (regen > 0) BR.anim.player.floaters.push({ heal: regen, startedAt: performance.now() });
                    }
                }
            }

            BR.turn = S.owner === 'player' ? 'ai' : 'player';
            if (S.owner === 'player' && gameState.currentBattle) gameState.currentBattle.turnCount = (gameState.currentBattle.turnCount || 0) + 1;
            if (BR.turn === 'ai') { BR.ai.phase = 'idle'; ensurePlayable(BR.ai); BR.aiTimer = performance.now() + aiDelay(); }
            else { goIdle(BR.player); }
            updateBattlePanel();
        }

        // When the active creature changes, update the pool AND nudge ~30% of existing
        // board tiles toward the new element so the shift feels immediate.
        // Only idle tiles (not mid-clear or mid-fall) are re-coloured.
        function shiftBoardForElement(S, newPrimaryEl) {
            S.pool = weightedPool(newPrimaryEl, enemyElementOf());
            if (S.phase !== 'idle') return; // mid-animation: pool updated, tiles will follow naturally
            const SWAP_RATE = 0.30;
            for (let r = 0; r < S.rows; r++) {
                for (let c = 0; c < S.cols; c++) {
                    const t = S.board[r][c];
                    if (!t || t.element === newPrimaryEl) continue;
                    if (Math.random() < SWAP_RATE) t.element = newPrimaryEl;
                }
            }
            // Re-run the no-immediate-run guard so we don't accidentally hand the
            // player a free match right at the moment of switching.
            ensurePlayable(S);
        }

        // Player swaps active creature; this costs the player's turn
        function switchActive(creatureId) {
            if (BR.turn !== 'player' || BR.player.phase !== 'idle') return;
            const battle = gameState.currentBattle;
            if (creatureId === battle.activeId) return;
            if (!battle.hp[creatureId] || battle.hp[creatureId] <= 0) return;
            battle.activeId = creatureId;
            battle.switchCount = (battle.switchCount || 0) + 1; // quest: solo_creature
            BR.player.powerCap = calcPowerCap(activeCreatureInst()); // new creature may have different cap
            shiftBoardForElement(BR.player, activeElementOf());
            BR.player.firstMatchEl = null; // switching applies no lock
            onBoardResolved(BR.player);
            render();
        }

        // Activate one of the active creature's abilities (free bonus action; gated by arm state)
        function useAbility(slot) {
            if (BR.turn !== 'player' || BR.player.phase !== 'idle' || BR.playerStunned) return;
            if (slot === 1 && !BR.ab1Ready) return;
            if (slot === 2 && !BR.ab2Ready) return;
            const battle = gameState.currentBattle;
            const act = activeCreatureInst();
            if (!act) return;
            const specs = ABILITIES[act.baseId];
            if (!specs) return;
            const spec = slot === 1 ? specs.a1 : specs.a2;
            const stats = getCreatureStats(act);
            const creatureEl = creatureDatabase[act.baseId].element;
            const enemyEl = enemyElementOf();
            spawnVfx(act.baseId, slot, 'player'); // custom ability VFX
            trackQuestEvent('ability_used', {}); // quest: ability_x5

            // Damage portion (scaled by the creature's element vs the enemy)
            if (spec.power) {
                let dmg = abilityDamage(spec.power, stats.atk, creatureEl, enemyEl);
                dmg = Math.round(dmg * playerOutgoingSynergyMult()); // team synergy ATK boost
                // Fire Trinity: ability power multiplier
                const _syn = battle.synergy;
                if (_syn && _syn.abilityPowerMult && _syn.abilityPowerMult > 1) {
                    dmg = Math.round(dmg * _syn.abilityPowerMult);
                }
                const _abilPreDrDmg = dmg; // capture before DEF reduction
                const _abilDRfrac = 1 - enemyIncomingDR(); // true reduction fraction (deterministic)
                dmg = Math.round(dmg * enemyIncomingDR()); // enemy DEF mitigation
                battle.enemyHP -= dmg;
                battle.playerDamage += dmg;
                // Dark Trinity: life steal — heal 15% of ability damage dealt
                if (_syn && _syn.darkLifeSteal > 0 && dmg > 0) {
                    const heal = Math.round(dmg * _syn.darkLifeSteal);
                    const act = activeCreatureInst();
                    if (act) {
                        const maxHp = getCreatureStats(act).hp;
                        battle.hp[battle.activeId] = Math.min(maxHp, (battle.hp[battle.activeId] || 0) + heal);
                        if (heal > 0) BR.anim.player.floaters.push({ heal, startedAt: performance.now() });
                    }
                }
                // Battle log entry
                if (!battle.log) battle.log = [];
                battle.log.push({
                    turn: 'player',
                    who: creatureDatabase[act.baseId].name,
                    type: 'ability',
                    abilityName: spec.name || (slot === 1 ? 'A1' : 'A2'),
                    atkEl: creatureEl,
                    defEl: enemyEl,
                    power: spec.power,
                    baseAtk: stats.atk,
                    elAdvantage: elementBeats(creatureEl, enemyEl) ? 'super' : elementBeats(enemyEl, creatureEl) ? 'resist' : 'neutral',
                    abilityPowerMult: (_syn && _syn.abilityPowerMult > 1) ? _syn.abilityPowerMult : null,
                    preDrDmg: _abilPreDrDmg !== dmg ? _abilPreDrDmg : null,
                    drFrac: _abilPreDrDmg !== dmg ? _abilDRfrac : null,
                    dmg
                });
                if (dmg > 0) { // track for all_hit quest
                    if (!battle.membersHitSet) battle.membersHitSet = [];
                    if (!battle.membersHitSet.includes(battle.activeId)) battle.membersHitSet.push(battle.activeId);
                }
                triggerAttack('player', dmg);
            }
            // Buff / debuff portion (ability 2 only)
            if (slot === 2 && spec.buff) {
                switch (spec.buff) {
                    case 'empower':
                        BR.empowerMult = spec.mult; BR.empowerExtended = false; break;
                    case 'heal':
                        battle.hp[battle.activeId] = Math.min(stats.hp, battle.hp[battle.activeId] + Math.round(spec.frac * stats.hp)); break;
                    case 'shield':
                        BR.playerShield = spec.frac; BR.playerShieldExtended = false; break;
                    case 'stun':
                        BR.enemyStunned = true; break;

                    // ── New buff types ──────────────────────────────────────────
                    case 'burn':
                        BR.enemyBurnTicks = spec.ticks;
                        BR.enemyBurnBase  = Math.round((spec.baseMult || 0) * stats.atk);
                        BR.enemyBurnBonus = Math.round((spec.bonusMult || 0) * stats.atk); break;

                    case 'poison':
                        BR.enemyPoison    = spec.ticks;
                        BR.enemyPoisonDmg = Math.round((spec.tickMult || 0) * stats.atk); break;

                    case 'reflect':
                        BR.playerReflect = spec.frac; break;

                    case 'double_strike':
                        BR.doubleStrikeCharging = true; break;

                    case 'leech': {
                        // Damage already applied above (spec.power > 0); heal = frac of dmg dealt
                        const leechHeal = Math.round((battle.log && battle.log.length ? battle.log[battle.log.length - 1].dmg : 0) * spec.healFrac);
                        battle.hp[battle.activeId] = Math.min(stats.hp, battle.hp[battle.activeId] + leechHeal);
                        if (leechHeal > 0) addHealFloater('player', leechHeal);
                        break;
                    }

                    case 'siphon': {
                        // Overcharge: temporarily raise YOUR power cap by stealAmt for the attack you
                        // fire this turn, and lower the ENEMY's cap by stealAmt for their next turn.
                        const amt = spec.stealAmt;
                        BR.player.capMod = (BR.player.capMod || 0) + amt;   // expires after this turn's release
                        BR.ai.capModPending = (BR.ai.capModPending || 0) + amt; // applied on the enemy's next turn
                        BR.anim.player.floaters.push({ dmg: amt, startedAt: performance.now(), siphonGain: true });
                        BR.anim.ai.floaters.push({ dmg: amt, startedAt: performance.now(), siphon: true });
                        break;
                    }

                    case 'board_corrupt': {
                        // Flip spec.count random enemy tiles to caster's element
                        const corruptEl = creatureEl;
                        const tiles = [];
                        for (let r = 0; r < BR.ai.rows; r++)
                            for (let c = 0; c < BR.ai.cols; c++)
                                if (BR.ai.board[r][c] && BR.ai.board[r][c].element !== corruptEl) tiles.push(BR.ai.board[r][c]);
                        // Shuffle and pick up to spec.count
                        for (let i = tiles.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [tiles[i], tiles[j]] = [tiles[j], tiles[i]]; }
                        tiles.slice(0, spec.count).forEach(t => { t.element = corruptEl; });
                        break;
                    }

                    case 'lock_tiles': {
                        // Lock spec.count random element types on enemy board for spec.duration turns
                        const allEls = [...new Set(
                            (() => { const els = []; for (let r = 0; r < BR.ai.rows; r++) for (let c = 0; c < BR.ai.cols; c++) if (BR.ai.board[r][c]) els.push(BR.ai.board[r][c].element); return els; })()
                        )];
                        for (let i = allEls.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [allEls[i], allEls[j]] = [allEls[j], allEls[i]]; }
                        const toLock = allEls.slice(0, spec.count);
                        BR.ai.locked = new Set(toLock);
                        BR.enemyTileLockTurns = spec.duration;
                        break;
                    }
                }
            }
            if (slot === 1) BR.ab1Ready = false; else BR.ab2Ready = false;
            if (battle.enemyHP <= 0) { if (!BR.enemyFainting) { BR.enemyFainting = true; BR.enemyFaintAt = performance.now(); } updateBattlePanel(); return; }
            updateBattlePanel();
            render(); // refresh ability buttons
        }

        function flashEnemyAbility(name) { BR.enemyAbilityFlash = { name, at: performance.now() }; }
        function addHealFloater(side, amount) {
            BR.anim[side].floaters.push({ dmg: amount, startedAt: performance.now(), heal: true });
            if (BR.anim[side].floaters.length > 4) BR.anim[side].floaters.shift();
        }

        // Enemy fires any armed abilities at the start of its turn. Returns 'ended' (battle over),
        // 'fired' (an ability went off), or 'none'.
        function aiUseAbilities() {
            const battle = gameState.currentBattle;
            // Tutorial Battle 1 teaches plain matching — the enemy never uses abilities.
            if (battle && battle.mode === 'tutorial' && battle.tutorialBattle === 1) return 'none';
            const specs = ABILITIES[battle.enemy.baseId];
            if (!specs) return 'none';
            const stats = getCreatureStats(battle.enemy);
            const enemyEl = enemyElementOf();      // enemy's own element (attacker)
            const playerEl = activeElementOf();    // player's active creature (defender)
            let fired = false;

            const dealToPlayer = (power) => {
                let dmg = abilityDamage(power, stats.atk, enemyEl, playerEl);
                if (BR.playerShield) dmg = Math.round(dmg * (1 - BR.playerShield));
                dmg = Math.round(dmg * playerIncomingSynergyMult());
                battle.hp[battle.activeId] -= dmg;
                if (battle.hp[battle.activeId] <= 0 && hasTalent('iron_will') && !battle.ironWillUsed[battle.activeId]) {
                    battle.ironWillUsed[battle.activeId] = true;
                    battle.hp[battle.activeId] = 1;
                }
                triggerAttack('ai', dmg);
            };

            // Ability 2 (damage + buff/debuff) — fired with a little strategy
            if (BR.enemyAb2Ready) {
                const spec = specs.a2;
                let use = true;
                // Strategy gates
                if (spec.buff === 'heal' && battle.enemyHP > battle.enemyMaxHP * 0.6) use = false;
                if (spec.buff === 'reflect' && (BR.player.powerBar || 0) < 3) use = false; // only reflect if player has power built up
                if (spec.buff === 'siphon' && (BR.player.powerBar || 0) < 2) use = false;
                if (spec.buff === 'double_strike' && (BR.ai.powerBar || 0) < 4) use = false; // only charge if enough power to matter
                if (use) {
                    if (spec.power) dealToPlayer(spec.power);
                    switch (spec.buff) {
                        case 'empower': BR.enemyEmpowerMult = spec.mult; break;
                        case 'heal': { const h = Math.round(spec.frac * battle.enemyMaxHP); battle.enemyHP = Math.min(battle.enemyMaxHP, battle.enemyHP + h); addHealFloater('ai', h); break; }
                        case 'shield': BR.enemyShield = spec.frac; break;
                        case 'stun': BR.playerStunned = true; break;

                        // ── New AI buff types ────────────────────────────────────
                        case 'burn':
                            BR.playerBurnTicks = spec.ticks;
                            BR.playerBurnBase  = Math.round((spec.baseMult || 0) * stats.atk);
                            BR.playerBurnBonus = Math.round((spec.bonusMult || 0) * stats.atk); break;

                        case 'poison':
                            BR.playerPoison    = spec.ticks;
                            BR.playerPoisonDmg = Math.round((spec.tickMult || 0) * stats.atk); break;

                        case 'reflect':
                            BR.enemyReflect = spec.frac; break;

                        case 'double_strike':
                            BR.enemyDoubleStrikeCharging = true; break;

                        case 'leech': {
                            // Damage already dealt by dealToPlayer above; heal enemy
                            const aiStats = getCreatureStats(battle.enemy);
                            const leechHeal = Math.round((spec.power * aiStats.atk) * spec.healFrac);
                            battle.enemyHP = Math.min(battle.enemyMaxHP, battle.enemyHP + leechHeal);
                            if (leechHeal > 0) addHealFloater('ai', leechHeal);
                            break;
                        }

                        case 'siphon': {
                            const amt = spec.stealAmt;
                            BR.ai.capMod = (BR.ai.capMod || 0) + amt;             // expires after this turn's release
                            BR.player.capModPending = (BR.player.capModPending || 0) + amt; // applied on player's next turn
                            BR.anim.ai.floaters.push({ dmg: amt, startedAt: performance.now(), siphonGain: true });
                            BR.anim.player.floaters.push({ dmg: amt, startedAt: performance.now(), siphon: true });
                            break;
                        }

                        case 'board_corrupt': {
                            const corruptEl = enemyEl;
                            const tiles = [];
                            for (let r = 0; r < BR.player.rows; r++)
                                for (let c = 0; c < BR.player.cols; c++)
                                    if (BR.player.board[r][c] && BR.player.board[r][c].element !== corruptEl) tiles.push(BR.player.board[r][c]);
                            for (let i = tiles.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [tiles[i], tiles[j]] = [tiles[j], tiles[i]]; }
                            tiles.slice(0, spec.count).forEach(t => { t.element = corruptEl; });
                            break;
                        }

                        case 'lock_tiles': {
                            const allEls = [...new Set(
                                (() => { const els = []; for (let r = 0; r < BR.player.rows; r++) for (let c = 0; c < BR.player.cols; c++) if (BR.player.board[r][c]) els.push(BR.player.board[r][c].element); return els; })()
                            )];
                            for (let i = allEls.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [allEls[i], allEls[j]] = [allEls[j], allEls[i]]; }
                            const toLock = allEls.slice(0, spec.count);
                            BR.player.locked = new Set(toLock);
                            BR.playerTileLockTurns = spec.duration;
                            break;
                        }
                    }
                    flashEnemyAbility(spec.name);
                    spawnVfx(battle.enemy.baseId, 2, 'ai');
                    BR.enemyAb2Ready = false;
                    fired = true;
                }
            }
            // Ability 1 (straight damage) — always worth firing
            if (BR.enemyAb1Ready) {
                dealToPlayer(specs.a1.power);
                flashEnemyAbility(specs.a1.name);
                spawnVfx(battle.enemy.baseId, 1, 'ai');
                BR.enemyAb1Ready = false;
                fired = true;
            }

            // Did ability damage knock out the active creature / whole team?
            // Route through the faint animation instead of instant swap or instant loss.
            if (battle.hp[battle.activeId] <= 0 && !BR.playerFainting) {
                BR.playerFainting = true;
                BR.playerFaintAt = performance.now();
                BR._faintingId = battle.activeId;
                BR._faintResolver = BR.ai; // finishResolve will swap or call battleLost after anim
            }
            return fired ? 'fired' : 'none';
        }

        function findAIMove(S) {
            let best = null, bestScore = -1;
            const atkEl = enemyElementOf(), defEl = activeElementOf();
            for (let r = 0; r < S.rows; r++) for (let c = 0; c < S.cols; c++) {
                const tries = [];
                if (c < S.cols - 1) tries.push([{r,c},{r,c:c+1}]);
                if (r < S.rows - 1) tries.push([{r,c},{r:r+1,c}]);
                for (const [a, b] of tries) {
                    swapData(S, a, b);
                    const { runs } = findRuns(S);
                    let score = 0;
                    runs.forEach(rn => { 
                        score += rn.length; 
                        if (rn.element === atkEl) score += 1;            // synergy bonus
                        // advantage bonus: standard cycle + dark special
                        if (elementBeats(rn.element, defEl)) score += 2;
                        else if (rn.element === 'dark' && ['fire', 'grass', 'water'].includes(defEl)) score += 2;
                    });
                    swapData(S, a, b);
                    if (runs.length && score > bestScore) { bestScore = score; best = { a, b }; }
                }
            }
            return best;
        }

        function aiTakeTurn() {
            if (BR.turn !== 'ai' || BR.ai.phase !== 'idle') return;
            let move = findAIMove(BR.ai);
            if (!move) { makeBoard(BR.ai); snapAll(BR.ai); ensurePlayable(BR.ai); move = findAIMove(BR.ai); }
            if (!move) { BR.ai.firstMatchEl = null; onBoardResolved(BR.ai); return; }
            BR.ai.combo = 1; BR.ai.matchedThisTurn = false; BR.ai.selected = null;
            swapAnimated(BR.ai, move.a, move.b);
            BR.ai.pendingSwap = move;
            BR.ai.phase = 'swap'; BR.ai.phaseStart = performance.now();
        }

        function battleLayouts() {
            const cols = 6, rows = 6;
            const battle = gameState.currentBattle;
            const aiScale = (battle && battle.isBoss) ? 1.0 : 0.82;

            const topReserve = 8;
            let bottomReserve = 110;
            const ctrl = document.getElementById('battleControls');
            if (ctrl && typeof ctrl.getBoundingClientRect === 'function') {
                const h = ctrl.getBoundingClientRect().height;
                if (h && h > 0) bottomReserve = h + 12;
            }

            // Sprite column: scales with narrow screens, capped at 170px on desktop
            const spriteColW = Math.max(96, Math.min(170, canvas.width * 0.34));
            const powerLaneW = Math.max(16, Math.min(22, canvas.width * 0.05)); // vertical power gauge lane
            const gapA = 8;    // gap: board column → power lane
            const gapB = 10;   // gap: power lane → sprite column

            // Vertical chrome
            const enemyBarH = 28, turnH = 22, playerBarH = 28, gaps = 12;
            const avail = canvas.height - topReserve - bottomReserve - enemyBarH - turnH - playerBarH - gaps;

            // Cap board width so it doesn't sprawl across a wide desktop screen
            const maxBoardW = Math.min(canvas.width - spriteColW - powerLaneW - gapA - gapB - 16, 400);

            let pCell = avail / (rows * (1 + aiScale));           // fit both boards vertically
            pCell = Math.min(pCell, (maxBoardW * 0.98) / cols);   // cap to max board width
            pCell = Math.max(pCell, 18);                           // never fully collapse
            const aCell = pCell * aiScale;
            const pW = pCell * cols, pH = pCell * rows, aW = aCell * cols, aH = aCell * rows;

            // Center the combined layout (boards + power lane + sprites) horizontally
            const totalW  = pW + gapA + powerLaneW + gapB + spriteColW;
            const offsetX = Math.max(6, Math.floor((canvas.width - totalW) / 2));

            // Boards: AI on top, player on bottom — both left-edge at offsetX
            const aiL = { x: offsetX, y: topReserve + enemyBarH, cell: aCell, w: aW, h: aH };
            const pL  = { x: offsetX, y: canvas.height - bottomReserve - pH, cell: pCell, w: pW, h: pH };

            // Power gauge lane sits between the boards and the creatures
            const laneX = offsetX + pW + gapA;
            const powerLane = { x: laneX, w: powerLaneW };

            // Sprites: right of the power lane, centered within the sprite column
            const spriteCX  = laneX + powerLaneW + gapB + spriteColW / 2;
            const spriteSize = Math.min(spriteColW * 0.94, 160);
            const aiSprite  = { cx: spriteCX, cy: aiL.y + aH / 2, size: spriteSize };
            const pSprite   = { cx: spriteCX, cy: pL.y  + pH / 2, size: spriteSize };

            return { aiL, pL, aiSprite, pSprite, powerLane };
        }

        function drawTile(L, gx, gy, element, scale, dim) {
            const cell = L.cell, px = L.x + gx * cell, py = L.y + gy * cell;
            const pad = cell * 0.08 + (1 - scale) * cell * 0.45;
            ctx.globalAlpha = dim ? 0.3 : 1;
            ctx.fillStyle = elementColors[element];
            roundRect(px + pad, py + pad, cell - 2 * pad, cell - 2 * pad, 6); ctx.fill();
            ctx.globalAlpha = 1;
            if (scale > 0.35) {
                ctx.globalAlpha = dim ? 0.6 : scale;
                ctx.font = `${Math.floor(cell * 0.5)}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(dim ? '🔒' : tileEmoji[element], px + cell / 2, py + cell / 2 + 1);
                ctx.globalAlpha = 1;
            }
        }

        function drawBoard(S, L, allowSelect) {
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            roundRect(L.x - 5, L.y - 5, L.w + 10, L.h + 10, 10); ctx.fill();
            for (let r = 0; r < S.rows; r++) for (let c = 0; c < S.cols; c++) {
                const t = S.board[r][c];
                if (t) drawTile(L, t.gx, t.gy, t.element, 1, S.locked.has(t.element));
            }
            const ct = S.phase === 'clear' ? Math.min(1, (performance.now() - S.phaseStart) / CLEAR_MS) : 0;
            S.clearing.forEach(cl => drawTile(L, cl.gx, cl.gy, cl.element, 1 - ct, false));
            if (allowSelect && S.selected && S.phase === 'idle') {
                const s = S.selected;
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                roundRect(L.x + s.c * L.cell + 2, L.y + s.r * L.cell + 2, L.cell - 4, L.cell - 4, 6); ctx.stroke();
            }
            // Power bar board tint: grows from subtle blue to cyan to gold at max
            const pNow = performance.now();
            const pb = S.powerBar || 0;
            if (pb > 0) {
                const frac = pb / effCap(S);
                const glowColor = frac >= 1 ? '#ffd700' : frac >= 0.5 ? '#4ecdc4' : '#74b9ff';
                ctx.fillStyle = glowColor;
                ctx.globalAlpha = 0.08 + frac * 0.18;
                ctx.fillRect(L.x, L.y, L.w, L.h);
                ctx.globalAlpha = 1;
                // Pulsing gold border at max power
                if (frac >= 1) {
                    const pulse = 0.5 + 0.5 * Math.sin(pNow / 180);
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2 + pulse * 2;
                    ctx.globalAlpha = 0.6 + pulse * 0.4;
                    roundRect(L.x - 2, L.y - 2, L.w + 4, L.h + 4, 10); ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            // ── Poison tint: green overlay pulses on afflicted board ─────────
            const _poison = (S.owner === 'player') ? BR.playerPoison : BR.enemyPoison;
            const _burn   = (S.owner === 'player') ? BR.playerBurnTicks : BR.enemyBurnTicks;
            if (_poison > 0) {
                const pulse = 0.04 + 0.04 * Math.sin(pNow / 220);
                ctx.fillStyle = 'rgba(50, 220, 80, ' + pulse + ')';
                ctx.fillRect(L.x, L.y, L.w, L.h);
                // Drifting spore dots
                ctx.save();
                ctx.globalAlpha = 0.55;
                ctx.font = Math.floor(L.cell * 0.38) + 'px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 0; i < 4; i++) {
                    const phase = (pNow / 1800 + i * 0.7) % 1;
                    const sx = L.x + (i * 0.28 + 0.1) * L.w;
                    const sy = L.y + L.h - phase * (L.h + 10);
                    ctx.fillStyle = 'rgba(80,255,100,0.6)';
                    ctx.fillText('☠', sx, sy);
                }
                ctx.restore();
            }
            if (_burn > 0) {
                const pulse = 0.04 + 0.05 * Math.abs(Math.sin(pNow / 180));
                ctx.fillStyle = 'rgba(255, 80, 20, ' + pulse + ')';
                ctx.fillRect(L.x, L.y, L.w, L.h);
                // Rising ember dots
                ctx.save();
                ctx.globalAlpha = 0.55;
                ctx.font = Math.floor(L.cell * 0.38) + 'px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 0; i < 4; i++) {
                    const phase = (pNow / 1400 + i * 0.55) % 1;
                    const sx = L.x + (i * 0.27 + 0.08) * L.w;
                    const sy = L.y + L.h - phase * (L.h + 10);
                    ctx.fillStyle = 'rgba(255,120,30,0.7)';
                    ctx.fillText('🔥', sx, sy);
                }
                ctx.restore();
            }

            // Release flash: bright pulse when power fires
            if (S.lastPowerRelease) {
                const elapsed = (pNow - S.lastPowerRelease.at) / 350;
                if (elapsed < 1) {
                    ctx.fillStyle = S.owner === 'player' ? '#ffffff' : '#ff4466';
                    ctx.globalAlpha = (1 - elapsed) * 0.35;
                    ctx.fillRect(L.x, L.y, L.w, L.h);
                    ctx.globalAlpha = 1;
                } else {
                    S.lastPowerRelease = null;
                }
            }
        }

        // Draw an animated creature sprite with a Pokemon-style HP nameplate
        // Vertical "charge meter" drawn in the power lane beside a creature.
        // Fills bottom→top in 20 segments (blue → cyan → gold), pulses gold at MAX.
        function drawPowerGauge(sp, S, lane, side) {
            const pb  = S.powerBar || 0;
            const cap = effCap(S);
            const frac = Math.min(1, pb / cap);
            const now = performance.now();

            const w = lane.w;
            const x = lane.x;
            const h = sp.size * 0.92;          // gauge spans most of the creature's height
            const y = sp.cy - h / 2;           // vertically centered on the creature
            const rad = w / 2;

            // Recessed track (drop shadow + translucent fill)
            ctx.fillStyle = 'rgba(0,0,0,0.38)';
            roundRect(x - 1, y - 1, w + 2, h + 2, rad + 1); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            roundRect(x, y, w, h, rad); ctx.fill();

            // Segmented fill, stacked from the bottom up
            const SEG = cap;
            const segSpan = (h - 4) / SEG;
            const segGap = Math.min(1.5, segSpan * 0.28);
            for (let i = 0; i < SEG && i < pb; i++) {
                const segFrac = i / SEG;
                const r = segFrac < 0.5 ? 116 : Math.round(116 + (segFrac - 0.5) * 2 * (255 - 116));
                const g = segFrac < 0.5 ? Math.round(185 + segFrac * 2 * (215 - 185)) : Math.round(215 - (segFrac - 0.5) * 2 * 215);
                const b = segFrac < 0.5 ? Math.round(255 - segFrac * 2 * 255) : 0;
                const segBottom = y + h - 2 - i * segSpan;
                const segTop = segBottom - (segSpan - segGap);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.globalAlpha = 0.95;
                roundRect(x + 1.5, segTop, w - 3, Math.max(1, segSpan - segGap), Math.min(2.5, (w - 3) / 2)); ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Gold glow + shimmer at max power
            if (frac >= 1) {
                const pulse = 0.5 + 0.5 * Math.sin(now / 200);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5 + pulse * 0.5;
                ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
                roundRect(x, y, w, h, rad); ctx.stroke();
                ctx.shadowBlur = 0; ctx.globalAlpha = 1;
            }

            // ⚡ icon above the gauge, numeric counter below it
            const accent = frac >= 1 ? '#ffd700' : (side === 'ai' ? '#ff9b9b' : '#8be8df');
            ctx.textAlign = 'center';
            ctx.font = 'bold 12px Arial'; ctx.textBaseline = 'bottom';
            ctx.fillStyle = accent;
            ctx.fillText('⚡', x + w / 2, y - 2);
            ctx.font = 'bold 9px Arial'; ctx.textBaseline = 'top';
            ctx.fillStyle = frac >= 1 ? '#ffd700' : '#cfd8e3';
            ctx.fillText(`${pb}/${cap}`, x + w / 2, y + h + 3);
        }

        // Compact strip of small enemy portraits for multi-enemy story battles. Active enemy is
        // ringed, defeated ones are greyed with an ✕, upcoming ones show their element color.
        function drawEnemyLineup(battle, aiSprite) {
            const team = battle.enemyTeam;
            const n = team.length;
            const dot = 24, gap = 7;
            // Anchor to the top-left of the battlefield so it never overlaps the enemy's
            // HP nameplate (which sits above the enemy sprite on the right side).
            const pad = 8;
            const labelH = 12;
            const x0 = pad;
            const y = pad + labelH;

            // "x / n down" counter above the strip, left-aligned
            const downCount = team.filter(e => e.fainted).length;
            ctx.save();
            ctx.font = 'bold 10px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
            ctx.fillStyle = '#cfcfcf';
            ctx.fillText(`Enemies  ${downCount} / ${n} down`, x0, y - 2);
            ctx.restore();

            let x = x0;
            for (let i = 0; i < n; i++) {
                const e = team[i];
                const el = (creatureDatabase[e.inst.baseId] || {}).element || 'fire';
                const isActive = i === battle.enemyIndex && !e.fainted;
                const cx = x + dot / 2, cy = y + dot / 2;

                ctx.save();
                // base chip
                ctx.beginPath(); ctx.arc(cx, cy, dot / 2, 0, Math.PI * 2);
                ctx.fillStyle = e.fainted ? '#2a2a32' : (elementColors[el] || '#888');
                ctx.globalAlpha = e.fainted ? 0.5 : 1;
                ctx.fill();

                // mini sprite on top
                ctx.globalAlpha = e.fainted ? 0.35 : 1;
                try {
                    const img = getCreatureSprite(e.inst.baseId, 0);
                    const s = dot * 0.92;
                    ctx.drawImage(img, cx - s / 2, cy - s / 2, s, s);
                } catch (err) {}

                ctx.globalAlpha = 1;
                if (e.fainted) {
                    // ✕ over defeated
                    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
                    const r = dot * 0.26;
                    ctx.beginPath(); ctx.moveTo(cx - r, cy - r); ctx.lineTo(cx + r, cy + r);
                    ctx.moveTo(cx + r, cy - r); ctx.lineTo(cx - r, cy + r); ctx.stroke();
                } else if (isActive) {
                    // highlight ring on the active enemy
                    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(cx, cy, dot / 2 + 1.5, 0, Math.PI * 2); ctx.stroke();
                } else {
                    // thin border on upcoming
                    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(cx, cy, dot / 2, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.restore();
                x += dot + gap;
            }
        }

        // layer: 'back' draws the ground shadow + sprite (rendered behind the boards so oversized
        // sprites — e.g. winged tier-2 forms — can extend behind the board/HP). 'front' draws the
        // nameplate, power gauge, and damage floaters on top of the boards. Defaults to both.
        function drawCreatureInBattle(side, baseId, sp, hp, maxHp, name, level, evoTier, lane, layer) {
            layer = layer || 'all';
            evoTier = evoTier || 0;
            const now = performance.now();
            const a = BR.anim[side];
            const fainted = hp <= 0;
            let dx = 0, dy = 0, scale = 1, flash = 0, alpha = 1, rot = 0;

            // idle bob
            dy += Math.sin(now / 650 + (side === 'ai' ? 1.6 : 0)) * (sp.size * 0.018);
            // attack lunge (player lunges up toward AI; AI lunges down toward player)
            if (a.atkAt) {
                const t = (now - a.atkAt) / ATK_ANIM_MS;
                if (t < 1) { const p = Math.sin(Math.PI * Math.min(1, t * 1.15)); dy += (side === 'player' ? -1 : 1) * sp.size * 0.2 * p; scale += 0.07 * p; }
                else a.atkAt = 0;
            }
            // hit reaction (flash + shake)
            if (a.hitAt && now >= a.hitAt) {
                const t = (now - a.hitAt) / HIT_ANIM_MS;
                if (t < 1) { flash = Math.max(0, 1 - t * 1.4); dx += Math.sin((now - a.hitAt) / 20) * 5 * (1 - t); }
                else a.hitAt = 0;
            }
            // faint / fainting animation
            if (BR.enemyFainting && side === 'ai') {
                // Enemy defeated: animate fainting (shrink + fade + fall)
                const elapsed = performance.now() - BR.enemyFaintAt;
                const t = Math.min(1, elapsed / 1200); // 1.2 second animation
                scale *= (1 - t * 0.6);  // shrink from 1.0 to 0.4
                alpha *= (1 - t);        // fade out
                dy += t * t * 80;        // accelerating fall
                rot = t * (side === 'ai' ? 1.2 : -1.2); // tilt while falling
            } else if (BR.playerFainting && side === 'player') {
                // Your creature defeated: same fainting animation, mirrored
                const elapsed = performance.now() - BR.playerFaintAt;
                const t = Math.min(1, elapsed / 1200);
                scale *= (1 - t * 0.6);
                alpha *= (1 - t);
                dy += t * t * 80;
                rot = t * -1.2;
            } else if (fainted) { 
                alpha = 0.45; rot = side === 'ai' ? 0.5 : -0.5; 
            }

            const el = creatureDatabase[baseId].element;
            // Render the sprite IMAGE larger than its layout footprint (sp.size). Higher evo tiers
            // get a bigger boost because their wider winged silhouettes otherwise read small once
            // squared into the sprite box. The nameplate/gauge still anchor to sp.size, so HP stays
            // put while the art grows behind the boards.
            const EVO_RENDER_SCALE = [1.15, 1.3, 1.5];
            const renderBoost = EVO_RENDER_SCALE[Math.min(evoTier, 2)] || 1.15;
            const size = sp.size * scale * renderBoost;

            // ===== BACK LAYER: ground shadow + sprite =====
            if (layer === 'back' || layer === 'all') {
                // ground shadow
                ctx.fillStyle = 'rgba(0,0,0,0.28)';
                _el(ctx, sp.cx, sp.cy + sp.size * 0.42, sp.size * 0.32, sp.size * 0.09); ctx.fill();

                const img = getCreatureSprite(baseId, evoTier);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(sp.cx + dx, sp.cy + dy); ctx.rotate(rot);
                ctx.shadowColor = elementColors[el]; ctx.shadowBlur = 12;
                ctx.drawImage(img, -size / 2, -size / 2, size, size);
                ctx.shadowBlur = 0;
                if (flash > 0) { ctx.globalAlpha = flash * 0.75; ctx.drawImage(getCreatureFlash(baseId, evoTier), -size / 2, -size / 2, size, size); }
                ctx.restore();
            }

            // ===== FRONT LAYER: nameplate + power gauge + floaters (drawn on top of boards) =====
            if (layer === 'back') return; // back layer done; the rest is front-only

            // nameplate (AI above its sprite, player below its sprite)
            const advantages = elementAdvantages[el] || [];
            const npW = Math.min(sp.size * 1.3, 144);
            const npH = advantages.length ? 56 : 42; // extra row for element icons
            let npX = sp.cx - npW / 2;
            npX = Math.min(Math.max(4, npX), canvas.width - npW - 4); // keep on-screen
            const npY = side === 'ai' ? Math.max(2, sp.cy - sp.size * 0.55 - npH) : sp.cy + sp.size * 0.55;
            ctx.fillStyle = 'rgba(0,0,0,0.62)';
            roundRect(npX, npY, npW, npH, 6); ctx.fill();
            // row 1: name + level
            ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(name, npX + 6, npY + 9);
            ctx.fillStyle = '#cfd8e3'; ctx.font = '10px Arial'; ctx.textAlign = 'right';
            ctx.fillText('Lv' + level, npX + npW - 6, npY + 9);
            // row 2: hp bar
            const frac = Math.max(0, Math.min(1, hp / maxHp));
            const barX = npX + 6, barY = npY + 18, barW = npW - 12;
            ctx.fillStyle = 'rgba(255,255,255,0.18)'; roundRect(barX, barY, barW, 6, 3); ctx.fill();
            const barColor = frac > 0.5 ? '#4ecdc4' : frac > 0.22 ? '#f39c12' : '#e94560';
            ctx.fillStyle = barColor; roundRect(barX, barY, barW * frac, 6, 3); ctx.fill();
            // row 3: hp numbers + gather zone bracket for wild enemy
            ctx.fillStyle = barColor; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(`${Math.max(0, hp)} / ${maxHp}`, npX + npW / 2, npY + 34);

            // row 4: element advantage icons  ("strong vs: 🔥 💧")
            if (advantages.length) {
                const elEmoji = { fire:'🔥', water:'💧', grass:'🌿', electric:'⚡', dark:'🌑' };
                const iconY = npY + npH - 10;
                ctx.font = '9px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillStyle = 'rgba(255,255,255,0.50)';
                ctx.fillText('strong vs', npX + 6, iconY);
                const labelW = ctx.measureText('strong vs').width;
                ctx.font = '11px Arial';
                advantages.forEach((advEl, i) => {
                    const iconX = npX + 6 + labelW + 4 + i * 16;
                    ctx.fillStyle = elementColors[advEl] || '#fff';
                    ctx.fillText(elEmoji[advEl] || '?', iconX, iconY);
                });
            }

            // Vertical power gauge beside the creature — a prominent "charge meter"
            // showing how much attack power is building up this turn.
            const PS = side === 'ai' ? BR.ai : BR.player;
            if (PS && lane) drawPowerGauge(sp, PS, lane, side);

            // floating damage numbers (rise and fade from sprite center)
            const FLOAT_MS = 1800;
            a.floaters = a.floaters.filter(f => now - f.startedAt < FLOAT_MS);
            a.floaters.forEach((f, i) => {
                const t = Math.max(0, (now - f.startedAt) / FLOAT_MS);
                const floatY = sp.cy - sp.size * 0.3 - t * 60 - i * 18;
                const fadeAlpha = t < 0.3 ? 1 : 1 - (t - 0.3) / 0.7;
                const dmgScale = t < 0.12 ? 1 + (0.12 - t) / 0.12 * 0.5 : 1; // pop-in scale
                ctx.save();
                ctx.globalAlpha = fadeAlpha;
                ctx.translate(sp.cx + dx, floatY);
                ctx.scale(dmgScale, dmgScale);
                ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                let label, fillColor;
                if (f.heal)       { label = '+' + f.heal;     fillColor = '#4ee87b'; }
                else if (f.poison){ label = '☠ ' + f.dmg;    fillColor = '#50dd60'; }
                else if (f.burn)  { label = '🔥 ' + f.dmg;   fillColor = '#ff8844'; }
                else if (f.siphon){ label = '−⚡' + f.dmg;   fillColor = '#aaaaff'; }
                else if (f.siphonGain){ label = '+⚡' + f.dmg; fillColor = '#88aaff'; }
                else if (f.gatherFail){ label = 'Fled! 🌿';   fillColor = '#f39c12'; }
                else              { label = '-' + f.dmg;      fillColor = '#ff4d4d'; }
                ctx.fillStyle = fillColor;
                ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 3;
                ctx.strokeText(label, 0, 0);
                ctx.fillText(label, 0, 0);
                ctx.restore();
            });
        }

        function drawBoardLockTag(L, S, who, color) {
            const lock = S.locked.size ? `  🔒${tileEmoji[[...S.locked][0]]}` : '';
            ctx.fillStyle = color; ctx.font = 'bold 11px Arial';
            // For AI board: draw at very top (above power bar). For player board: draw right above their board.
            const tagY = who === 'ENEMY' ? L.y - 26 : L.y - 3;
            ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
            ctx.fillText(who + lock, L.x + 2, tagY);
        }

        // ===== ABILITY VFX ENGINE =====
        // Spawn a nova-ring cascade burst at a board's center (cx, cy = board center in canvas px)
